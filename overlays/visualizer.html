  update(state,dt){
    const r=this._r,rH=r/2;

    // Rotation constante (approuvée)
    this._group.rotation.y+=dt*this._ROTATION_SPEED;

    // Self-model : surprise, volatilité, PE, activité
    this._computeSelfModel(state);
    if(this._surpriseAttr)this._surpriseAttr.needsUpdate=true;
    if(this._activityAttr)this._activityAttr.needsUpdate=true;

    // Box : gris → rouge selon crisis_level
    if(this._boxHelper){
      const c=state.crisis_level||0;
      this._boxHelper.material.color.setRGB(0.06+c*.5,0.04*(1-c),0.08*(1-c));
    }

    // Seuil proximité : haute divergence → clusters resserrés, basse → graphe étendu
    const div=Math.min(1,Math.max(0,state.source_divergence||0));
    const minDist=100+(1-div)*220; // 100 (fragmenté) → 320 (cohérent)

    // Luminosité globale (plancher 0.08 pour éviter écran mort)
    const wt=Math.max(0.08,Math.min(1,state.world_temperature||0));

    // Urgence → pulsation taille des nœuds (porteur conditionnel)
    const urgency=Math.min(1,Math.max(0,state.urgency||0));
    const t=this._clock.getElapsedTime();
    const pulse=1+Math.sin(t*urgency*12)*urgency*0.5; // zéro quand urgency=0 ✓
    if(this._pointMat){
      this._pointMat.uniforms.uTime.value=t;
      this._pointMat.uniforms.uUrgency.value=urgency;
    }
    if(this._connMat) this._connMat.uniforms.uTime.value=t;
    // Resize composer si la fenêtre a changé
    if(this._cam.aspect!==innerWidth/innerHeight){
      this._cam.aspect=innerWidth/innerHeight;
      this._cam.updateProjectionMatrix();
      if(this._composer)this._composer.setSize(innerWidth,innerHeight);
    }

    // Wonder → légère variation d'opacité du fond étoilé
    if(this._starField){
      const wonder=Math.min(1,Math.max(0,state.wonder||0));
      this._starField.material.opacity=0.4+wonder*Math.abs(Math.sin(t*2))*0.3;
    }

    // Poids drift_weights du territoire courant (arêtes sémantiques)
    const territory=state.drift_territory||'ambient';
    const dw=state.drift_weights;
    const weights=(dw&&dw[territory])||{};

    // Déplacement : activité brute (0.7) + volatilité (0.3)
    for(let i=0;i<this._N;i++){
      const spd=(this._activityVals[i]*0.7+this._volVals[i]*0.3)*80;
      const v=this._particleVelocities[i];
      this._particlePositions[i*3]  +=v.x*spd*dt;
      this._particlePositions[i*3+1]+=v.y*spd*dt;
      this._particlePositions[i*3+2]+=v.z*spd*dt;
      if(Math.abs(this._particlePositions[i*3])  >rH)v.x=-v.x;
      if(Math.abs(this._particlePositions[i*3+1])>rH)v.y=-v.y;
      if(Math.abs(this._particlePositions[i*3+2])>rH)v.z=-v.z;
    }

    // Seuil adaptatif : cible ~150 connexions — monte si trop, descend si trop peu
    const dynThreshold=Math.max(0.006, Math.min(0.05, 0.008*this._lastNConn/150));
    // Max connexions par nœud selon crisis_level (5 calme → 9 crise)
    const maxConn=5+Math.round((state.crisis_level||0)*4);
    const minDist2=minDist*minDist;
    this._connCount.fill(0); // reset compteur par nœud

    // Calcul des arêtes — 3 types cumulatifs
    let vp=0,cp=0,sp=0,nConn=0;
    for(let i=0;i<this._N;i++){
      for(let j=i+1;j<this._N;j++){
        if(vp+6>this._positions.length)break;

        // Fast-reject : sauter si les deux nœuds sont inactifs et sans poids sémantique
        const ki=this._PDEFS[i].key, kj=this._PDEFS[j].key;
        const wi=weights[ki]||0, wj=weights[kj]||0;
        const semantic=wi*wj*4;
        const actSum=this._activityVals[i]+this._activityVals[j];
        const peSum =this._peVals[i]      +this._peVals[j];
        if(actSum<0.02 && peSum<0.01 && semantic<dynThreshold)continue;

        // Max connexions par nœud — évite le hairball
        if(this._connCount[i]>=maxConn||this._connCount[j]>=maxConn)continue;

        // Distance — fast-reject carré avant sqrt
        const dx=this._particlePositions[i*3]  -this._particlePositions[j*3];
        const dy=this._particlePositions[i*3+1]-this._particlePositions[j*3+1];
        const dz=this._particlePositions[i*3+2]-this._particlePositions[j*3+2];
        const dist2=dx*dx+dy*dy+dz*dz;
        const prox=dist2<minDist2?(1-Math.sqrt(dist2)/minDist):0;

        // Arête A — activité × proximité
        const baseActivity=prox*actSum*0.18;
        // Arête C — anomalies simultanées proches
        const anomalyProx=prox*peSum*0.5;

        const strength=Math.max(baseActivity,semantic,anomalyProx);
        if(strength<dynThreshold)continue;

        this._connCount[i]++; this._connCount[j]++;

        // Alpha : base solide pour que le bloom élargisse la ligne 1px
        const alpha=Math.min(0.95,strength*(0.55+wt*0.40)*pulse);
        const ci=this._CATS[this._PDEFS[i].cat];
        const cj=this._CATS[this._PDEFS[j].cat];
        this._positions[vp++]=this._particlePositions[i*3];
        this._positions[vp++]=this._particlePositions[i*3+1];
        this._positions[vp++]=this._particlePositions[i*3+2];
        this._positions[vp++]=this._particlePositions[j*3];
        this._positions[vp++]=this._particlePositions[j*3+1];
        this._positions[vp++]=this._particlePositions[j*3+2];
        // Couleur pure (non prémultipliée) — le shader gère l'alpha via connStr
        this._lineColors[cp++]=ci.r;this._lineColors[cp++]=ci.g;this._lineColors[cp++]=ci.b;
        this._lineColors[cp++]=cj.r;this._lineColors[cp++]=cj.g;this._lineColors[cp++]=cj.b;
        // Flux per-arête : PE × 10 + activité × 3 + surprise × 6 (NO_FAKE, zéro si au repos)
        const peAvg   =(this._peVals[i]      +this._peVals[j])      *0.5;
        const actAvg  =(this._activityVals[i]+this._activityVals[j]) *0.5;
        const surprAvg=(this._surpriseVals[i]+this._surpriseVals[j]) *0.5;
        const edgeFlow=peAvg*10.0+actAvg*3.0+surprAvg*6.0;
        this._connStrengths[sp]=alpha; this._connFlows[sp]=edgeFlow; sp++;
        this._connStrengths[sp]=alpha; this._connFlows[sp]=edgeFlow; sp++;
        nConn++;
      }
    }

    this._lastNConn=nConn;
    this._linesMesh.geometry.setDrawRange(0,nConn*2);
    this._linesMesh.geometry.attributes.position.needsUpdate=true;
    this._linesMesh.geometry.attributes.connColor.needsUpdate=true;
    if(this._connStrAttr)  this._connStrAttr.needsUpdate=true;
    if(this._connFlowAttr) this._connFlowAttr.needsUpdate=true;
    this._pointCloud.geometry.attributes.position.needsUpdate=true;

    scene.background=new THREE.Color(0,0,0);
    if(this._composer) this._composer.render();
    else renderer.render(scene,this._cam);
    return true;
  }

  dispose(sc){
    if(this._composer){this._composer.dispose();this._composer=null;}
    if(this._group){sc.remove(this._group);this._group=null;}
    if(this._starField){sc.remove(this._starField);this._starField.geometry.dispose();this._starField=null;}
    scene.background=new THREE.Color(0x000000);
    // Rétablit la résolution correcte pour les autres scènes
    renderer.setSize(innerWidth,innerHeight);
  }
}

// ── Mode SPECTRE — réseau vivant fullscreen (adapté de "The Universe Within" BigWings 2018) ──
// Fullscreen quad GLSL. uTunnelT pilote tunnel + orbites (motion display, equiv. autoRotate).
// 18 signaux GlobalState intégrés :
//   drift_energy       → amplitude orbites nœuds + halo central
//   world_temperature  → vitesse tunnel/orbites
//   drift_bpm          → vitesse rotation hypnotique + beat pulse rythmique
//   drift_velocity     → composante data rotation
//   anomaly_score      → scintillement principal (sPhase) + edgeFlow
//   crisis_level       → teinte rouge + épaisseur arêtes
//   drift_territory    → couleur de base (palette territoire)
//   audio_energy_level → glow bas + edgeFlow
//   source_divergence  → parallaxe latérale
//   excitement         → boost luminosité + amplification beat + edgeFlow
//   wonder             → teinte chaude dorée
//   melancholy         → désaturation
//   chat_rate          → densité scintillement secondaire
//   urgency            → resserrement vignette
//   audience_energy    → luminosité globale
//   prediction_errors  → flicker de dissonance sur les lignes
//   world_event_burst  → flash lumineux lors d'un événement
//   source_health      → bruit de dégradation si sources offline

class SpectreMode {
  constructor() {
    this._cam            = null;
    this._mesh           = null;
    this._mat            = null;
    this._clock          = new THREE.Clock();
    this._tunnelTime     = 0;
    this._rotAngle       = 0;
    this._beatPhase      = 0;
    this._territoryColor = new THREE.Color(0x00D4FF);
  }

  init(sc) {
    this._cam = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
    this._clock.start();

    const vs = `void main(){ gl_Position = vec4(position, 1.0); }`;

    const fs = `
precision highp float;
uniform vec2  uResolution;
uniform float uTunnelT;
uniform float uRotAngle;
uniform float uDriftEnergy;
uniform float uAudioEnergy;
uniform float uCrisisLevel;
uniform float uAnomalyScore;
uniform float uExcitement;
uniform float uWonder;
uniform float uMelancholy;
uniform float uChatNorm;
uniform float uUrgency;
uniform float uAudienceEnergy;
uniform float uBeatPhase;
uniform float uBeatStrength;
uniform float uMaxPredError;
uniform vec3  uTerritoryColor;
uniform float uSourceDivergence;
uniform float uEventBurst;
uniform float uNetworkHealth;

#define NUM_LAYERS 3.0

float N21(vec2 p){
  vec3 a=fract(vec3(p.xyx)*vec3(213.897,653.453,253.098));
  a+=dot(a,a.yzx+79.76);
  return fract((a.x+a.y)*a.z);
}

// Orbites nœuds : motion display (equiv. autoRotate, vitesse modulée par world_temp via uTunnelT)
// Amplitude 0.20 base + uDriftEnergy*0.20 boost data-driven — fréquences uniques par hash
vec2 GetPos(vec2 id,vec2 offs,float t){
  float n=N21(id+offs);
  float n1=fract(n*10.0),n2=fract(n*100.0);
  float a=t+n;
  return offs+vec2(sin(a*n1),cos(a*n2))*(0.20+uDriftEnergy*0.20);
}

// flow : porteur conditionnel — onde voyageante amplitude=0 si tous signaux nuls
float line(vec2 a,vec2 b,vec2 uv,float flow){
  vec2 pa=uv-a,ba=b-a;
  float h=clamp(dot(pa,ba)/dot(ba,ba),0.0,1.0);
  float d=length(pa-ba*h);
  float d2=length(ba);
  float fade=smoothstep(1.5,0.5,d2)+smoothstep(0.05,0.02,abs(d2-0.75));
  // Épaisseur arête : crisis élargit l'aura — porteur conditionnel
  float base=smoothstep(0.04+uCrisisLevel*0.025,0.01,d)*fade;
  // onde voyageante de a→b, phase nulle si flow=0
  float wave=(sin(h*6.283-uTunnelT*12.0)*0.5+0.5)*flow;
  return base*(1.0+wave*0.85);
}

float sparkleAt(vec2 p,vec2 st,float t){
  float d=length(st-p);
  float s=0.005/(d*d);
  s*=smoothstep(1.0,0.7,d);
  float pulse=sin((fract(p.x)+fract(p.y)+t)*5.0)*0.4+0.6;
  pulse=pow(pulse,20.0);
  return s*pulse;
}

float NetLayer(vec2 st,float n,float t,float flow){
  vec2 id=floor(st)+n;
  st=fract(st)-0.5;
  vec2 p0=GetPos(id,vec2(-1,-1),t),p1=GetPos(id,vec2(0,-1),t),p2=GetPos(id,vec2(1,-1),t);
  vec2 p3=GetPos(id,vec2(-1, 0),t),p4=GetPos(id,vec2(0, 0),t),p5=GetPos(id,vec2(1, 0),t);
  vec2 p6=GetPos(id,vec2(-1, 1),t),p7=GetPos(id,vec2(0, 1),t),p8=GetPos(id,vec2(1, 1),t);
  float m=line(p4,p0,st,flow)+line(p4,p1,st,flow)+line(p4,p2,st,flow)
         +line(p4,p3,st,flow)+line(p4,p5,st,flow)
         +line(p4,p6,st,flow)+line(p4,p7,st,flow)+line(p4,p8,st,flow)
         +line(p1,p3,st,flow)+line(p1,p5,st,flow)+line(p7,p5,st,flow)+line(p7,p3,st,flow);
  float sparkle=sparkleAt(p0,st,t)+sparkleAt(p1,st,t)+sparkleAt(p2,st,t)
               +sparkleAt(p3,st,t)+sparkleAt(p4,st,t)+sparkleAt(p5,st,t)
               +sparkleAt(p6,st,t)+sparkleAt(p7,st,t)+sparkleAt(p8,st,t);
  // sPhase multi-source : anomalie + chat + crisis — porteur conditionnel
  // floor 0.03 (~3% du range 0-1) — évite écran mort total
  float sPhase=max(0.03,uAnomalyScore*0.50+uChatNorm*0.25+uCrisisLevel*0.25);
  return m+sparkle*sPhase;
}

void main(){
  vec2 uv=(gl_FragCoord.xy-uResolution*0.5)/uResolution.y;

  // Rotation hypnotique : uRotAngle (display 0.05/s + BPM + drift_velocity)
  float s=sin(uRotAngle),c=cos(uRotAngle);
  mat2 rot=mat2(c,-s,s,c);
  vec2 st=uv*rot;

  // Parallaxe latérale depuis source_divergence
  vec2 M=vec2((uSourceDivergence-0.5)*1.5,0.0)*rot;

  // edgeFlow : porteur conditionnel — onde 0 si tous signaux nuls
  float edgeFlow=uAudioEnergy*0.5+uExcitement*0.3+uAnomalyScore*0.2;
  float m=0.0;
  for(float i=0.0;i<1.0;i+=1.0/NUM_LAYERS){
    float z=fract(uTunnelT+i);
    float size=mix(15.0,1.0,z);
    float fade=smoothstep(0.0,0.6,z)*smoothstep(1.0,0.8,z);
    m+=fade*NetLayer(st*size-M*z,i,uTunnelT,edgeFlow);
  }

  // Beat pulse BPM — porteur conditionnel sur uBeatStrength
  float beatPulse=pow(max(0.0,sin(uBeatPhase)),12.0)*uBeatStrength;

  // Flicker prédiction — dissonance lignes, change 8×/s — porteur conditionnel sur uMaxPredError
  float flicker=N21(uv*87.3+vec2(floor(uTunnelT*8.0),0.0))*uMaxPredError*0.35;

  float mFinal=m*(1.0+beatPulse*uExcitement*0.6+flicker);

  // Glow bas — audio_energy — porteur conditionnel
  float glow=-uv.y*uAudioEnergy*2.0;
  // Halo central — drift_energy (porteur conditionnel)
  float halo=exp(-dot(uv,uv)*5.0)*uDriftEnergy*0.18;

  // Couleur base : territoire → crisis (rouge) → wonder (doré)
  vec3 crisisCol=vec3(1.0,0.15,0.1);
  vec3 wonderCol=vec3(1.0,0.88,0.55);
  vec3 baseCol=mix(uTerritoryColor,crisisCol,uCrisisLevel*0.55);
  baseCol=mix(baseCol,wonderCol,uWonder*0.40);

  vec3 col=baseCol*(mFinal+glow+halo);

  // Luminosité globale — audience_energy (plancher 0.75 pour éviter écran mort)
  col*=(0.75+uAudienceEnergy*0.50);

  // Flash beat amplifié par excitement — porteur conditionnel sur les deux
  col+=baseCol*beatPulse*uExcitement*0.25;

  // Flash world_event_burst — porteur conditionnel
  col+=baseCol*uEventBurst*0.65;

  // Dégradation réseau : bruit si sources offline — porteur conditionnel sur 1-uNetworkHealth
  float unhealthy=1.0-uNetworkHealth;
  float netNoise=N21(uv*173.1+vec2(floor(uTunnelT*6.0),0.0))*unhealthy;
  col=mix(col,vec3(netNoise*0.3),unhealthy*0.20);

  // Désaturation melancholy — porteur conditionnel
  float luma=dot(col,vec3(0.299,0.587,0.114));
  col=mix(col,vec3(luma),uMelancholy*0.55);

  // Vignette data-driven : urgency resserre le cadre
  col*=1.0-dot(uv,uv)*(0.4+uUrgency*0.9);

  gl_FragColor=vec4(col,1.0);
}`;

    const geo = new THREE.PlaneGeometry(2, 2);
    this._mat = new THREE.ShaderMaterial({
      uniforms: {
        uResolution:       { value: new THREE.Vector2(innerWidth, innerHeight) },
        uTunnelT:          { value: 0 },
        uRotAngle:         { value: 0 },
        uDriftEnergy:      { value: 0 },
        uAudioEnergy:      { value: 0 },
        uCrisisLevel:      { value: 0 },
        uAnomalyScore:     { value: 0 },
        uExcitement:       { value: 0 },
        uWonder:           { value: 0 },
        uMelancholy:       { value: 0 },
        uChatNorm:         { value: 0 },
        uUrgency:          { value: 0 },
        uAudienceEnergy:   { value: 0 },
        uBeatPhase:        { value: 0 },
        uBeatStrength:     { value: 0 },
        uMaxPredError:     { value: 0 },
        uTerritoryColor:   { value: new THREE.Color(0x00D4FF) },
        uSourceDivergence: { value: 0.5 },
        uEventBurst:       { value: 0 },
        uNetworkHealth:    { value: 1 },
      },
      vertexShader: vs,
      fragmentShader: fs,
      depthTest: false,
      depthWrite: false,
    });
    this._mesh = new THREE.Mesh(geo, this._mat);
    this._mesh.frustumCulled = false;
    sc.add(this._mesh);
  }

  update(state, dt) {
    const u = this._mat.uniforms;

    const we   = Math.max(0, Math.min(1, state.drift_energy      || 0));
    const wt   = Math.max(0, Math.min(1, state.world_temperature || 0));
    const bpm  = Math.max(60, Math.min(180, state.drift_bpm      || 90));
    const bpmN = (bpm - 60) / 120; // 0 à 60BPM → 1 à 180BPM

    // Tunnel + orbites : display + world_temp accélère jusqu'à ×2.5
    this._tunnelTime += dt * (0.08 + wt * 0.12);

    // Rotation hypnotique : 0.05 rad/s base + BPM + drift_velocity — wrap pour éviter perte précision float
    const dv = Math.max(0, Math.min(1, state.drift_velocity || 0));
    this._rotAngle = (this._rotAngle + dt * (0.05 + bpmN * 0.06 + dv * 0.04)) % (Math.PI * 2);

    // Beat phase synchronisé BPM exact
    this._beatPhase += dt * (bpm / 60) * Math.PI * 2;

    // Territoire → lerp couleur (~25s)
    const territory = state.drift_territory || 'ambient';
    const tCol = _NN_TERRITORY_COLORS[territory] || _NN_TERRITORY_COLORS.ambient;
    this._territoryColor.lerp(tCol, Math.min(1, dt * 1.5));

    // Prediction errors : max PE/σ normalisé
    const pe      = state.prediction_errors   || {};
    const vol     = state.signal_volatilities || {};
    const peKeys  = Object.keys(pe);
    const maxPe   = peKeys.length
      ? Math.min(1, Math.max(0, ...peKeys.map(k =>
          Math.abs(Number(pe[k]) || 0) / Math.max(Number(vol[k]) || 0.001, 0.001) / 3)))
      : 0;

    u.uTunnelT.value          = this._tunnelTime;
    u.uRotAngle.value         = this._rotAngle;
    u.uDriftEnergy.value      = we;
    u.uAudioEnergy.value      = Math.max(0, Math.min(1, state.audio_energy_level || 0));
    u.uCrisisLevel.value      = Math.max(0, Math.min(1, state.crisis_level       || 0));
    u.uAnomalyScore.value     = Math.max(0, Math.min(1, state.anomaly_score      || 0));
    u.uExcitement.value       = Math.max(0, Math.min(1, state.excitement         || 0));
    u.uWonder.value           = Math.max(0, Math.min(1, state.wonder             || 0));
    u.uMelancholy.value       = Math.max(0, Math.min(1, state.melancholy         || 0));
    u.uChatNorm.value         = Math.max(0, Math.min(1, (state.chat_rate         || 0) / 30));
    u.uUrgency.value          = Math.max(0, Math.min(1, state.urgency            || 0));
    u.uAudienceEnergy.value   = Math.max(0, Math.min(1, state.audience_energy    || 0));
    u.uBeatPhase.value        = this._beatPhase;
    u.uBeatStrength.value     = bpmN * 0.7 + we * 0.3;
    u.uMaxPredError.value     = maxPe;
    u.uTerritoryColor.value.copy(this._territoryColor);
    u.uSourceDivergence.value = Math.max(0, Math.min(1, state.source_divergence  || 0.5));
    u.uEventBurst.value       = Math.max(0, Math.min(1, state.world_event_burst  || 0));
    const health = state.source_health || {};
    const hKeys  = Object.keys(health);
    u.uNetworkHealth.value    = hKeys.length ? hKeys.filter(k => health[k]).length / hKeys.length : 1;
    u.uResolution.value.set(innerWidth, innerHeight);

    scene.background = new THREE.Color(0, 0, 0);
    renderer.render(scene, this._cam);
    return true;
  }

  dispose(sc) {
    if (this._mesh) {
      sc.remove(this._mesh);
      this._mesh.geometry.dispose();
      this._mesh.material.dispose();
      this._mesh = null;
    }
    this._mat = null;
    scene.background = new THREE.Color(0x000000);
    renderer.setSize(innerWidth, innerHeight);
  }
}

// ── Système de modes ──────────────────────────────────────────────────────────

const MODES = { neural: NeuralMode, chaos: ChaosMode, globe: GlobeMode, network: NetworkMode, spectre: SpectreMode };

// Declared early — NeuralMode.init() reads liveNodes (let TDZ would crash otherwise)
let liveState = {};
let liveNodes  = [];   // real @node registry from WebSocket

let activeModeName = 'neural';
// Initialize NeuralMode immediately — avoids blank canvas until first WS message
// (the graph builds lazily in update() once liveNodes arrives from WebSocket)
let activeMode = new NeuralMode();
activeMode.init(scene, camera);

let _switchInProgress = false;
async function switchMode(name) {
  if (!MODES[name]) { console.error('Unknown mode:', name); return; }
  if (_switchInProgress) return;
  _switchInProgress = true;
  const fade = document.getElementById('fade');
  fade.style.opacity = '1';
  await new Promise(r => setTimeout(r, 1500));
  try {
    if (activeMode) activeMode.dispose(scene);
    activeModeName = name;
    activeMode = new MODES[name]();
    activeMode.init(scene, camera);
    document.getElementById('mode-indicator').textContent = '◆ ' + name.toUpperCase();
  } catch(err) {
    console.error('switchMode failed for', name, err);
    fade.style.opacity = '0';
    _switchInProgress = false;
    return;
  }
  await new Promise(r => setTimeout(r, 100));
  fade.style.opacity = '0';
  await new Promise(r => setTimeout(r, 1500));
  _switchInProgress = false;
  console.log('Switched to mode:', name);
}

// Expose to console and keyboard
window.switchMode = switchMode;

// ── HUD ───────────────────────────────────────────────────────────────────────

function updateHUD(st) {
  const crisis = st.crisis_level || 0;
  const wt = st.world_temperature || 0;
  const progress = st.current_song_progress || 0;
  const qlen = st.queue_length || 0;
  const uptime = st.uptime_h || 0;

  // world_temperature → hue interpolation cold(180°)→warm(0°) via green
  const wtHue = Math.round(180 - wt * 180);
  const wtColor = `hsl(${wtHue},70%,55%)`;

  // crisis color + blink
  const crisisColor = crisis > 0.5 ? '#FF4444' : crisis > 0.2 ? '#FF8844' : '#558866';
  const crisisBlink = crisis > 0.5 ? 'animation:blink 1s step-end infinite' : '';

  // uptime formatting
  const uh = Math.floor(uptime);
  const um = Math.floor((uptime - uh) * 60);
  const uptimeStr = uh > 0 ? `${uh}h${String(um).padStart(2,'0')}` : um > 0 ? `${um}m` : '';

  document.getElementById('drift').innerHTML =
    `<div>♪ ${Math.round(st.drift_bpm||90)} BPM · ${st.drift_key||'C minor'} · ${st.drift_timbre||'warm'}</div>` +
    `<div style="color:${crisisColor};${crisisBlink}">◈ CRISIS_LEVEL ${Math.round(crisis*100)}%</div>` +
    `<div style="color:${wtColor}">⬤ TEMP ${Math.round(wt*100)}%</div>` +
    (qlen > 0 ? `<div style="color:#556677">⏎ ${qlen} in queue</div>` : '');

  document.getElementById('on-air-uptime').textContent = uptimeStr;

  // Track name + progress bar: stable DOM elements — never rebuilt, only updated in place
  const trackEl = document.getElementById('track-info');
  const wrapEl = document.getElementById('track-progress-wrap');
  const barEl = document.getElementById('track-progress-bar');
  if (st.current_track_name) {
    trackEl.textContent = '♫ ' + st.current_track_name;
    trackEl.style.display = '';
    wrapEl.style.display = 'block';
    barEl.style.width = Math.round(progress * 100) + '%';
  } else {
    trackEl.style.display = 'none';
    wrapEl.style.display = 'none';
    barEl.style.width = '0%';
  }

  // viewer command notification
  const vcEl = document.getElementById('viewer-cmd');
  if (st.viewer_cmd_label) {
    vcEl.textContent = '◈ ' + st.viewer_cmd_label;
    vcEl.classList.add('active');
  } else {
    vcEl.classList.remove('active');
  }

  // sources: compact count + detail
  const sh = st.source_health || {};
  const entries = Object.entries(sh);
  const ok = entries.filter(([,v]) => v).length;
  const total = entries.length;
  const countColor = ok === total ? '#446644' : ok > total * 0.5 ? '#886633' : '#663333';
  const detail = entries.map(([k,v]) =>
    `<span style="color:${v?'#446644':'#663333'}">${v?'●':'○'} ${k}</span>`
  ).join('<br>');
  document.getElementById('sources').innerHTML =
    (total > 0 ? `<div style="color:${countColor};margin-bottom:4px">✓ ${ok}/${total} sources</div>` : '') +
    detail;

  if (st.journal_text) document.getElementById('journal').textContent = st.journal_text;

  const chatEl = document.getElementById('chat-status');
  const chatRate = (st.chat_rate || 0).toFixed(1);
  const chatHealth = (st.source_health || {}).youtube_chat;
  const chatLive = chatHealth === true || (chatHealth === undefined && parseFloat(chatRate) > 0);
  chatEl.className = chatLive ? 'live' : '';
  chatEl.textContent = (chatLive ? '◉' : '◌') + ' chat · ' + chatRate + '/min · ' + (st.viewers || 0) + ' viewers';

  const evtEl = document.getElementById('event-banner');
  if (st.active_event && st.event_intensity > 0) {
    evtEl.textContent = st.event_label;
    evtEl.style.opacity = String(0.4 + st.event_intensity * 0.6);
  } else {
    evtEl.style.opacity = '0';
  }
}

// ── WebSocket ─────────────────────────────────────────────────────────────────

// userOverride = true when user manually picked a mode via keyboard.
// Prevents WebSocket state from overriding the user's choice on every heartbeat.
// Cleared only when the server explicitly sends a *different* visual_mode value.
let userOverride = false;
let wsLastMode = null;

function connect() {
  const ws = new WebSocket('ws://localhost:8765');
  ws.onopen = () => {
    document.getElementById('ws-status').className = 'connected';
    document.getElementById('ws-status').textContent = '● connected';
    updateHUD(liveState);  // preserve last known state on reconnect — avoids track name flash
    // Don't force neural here — wait for first WS message so user keeps current mode on reconnect
  };
  ws.onmessage = e => {
    const msg = JSON.parse(e.data);
    const st = msg.state || {};
    const newMode = st.visual_mode || 'neural';
    if (newMode !== wsLastMode) {
      // Server explicitly changed visual_mode — clear user override and follow
      wsLastMode = newMode;
      userOverride = false;
    }
    if (!userOverride && newMode !== activeModeName) switchMode(newMode);
    liveState = st;
    if (msg.nodes && msg.nodes.length) liveNodes = msg.nodes;
    updateHUD(st);
  };
  ws.onclose = () => {
    document.getElementById('ws-status').className = '';
    document.getElementById('ws-status').textContent = '◌ reconnecting…';
    setTimeout(connect, 2000);
  };
  document.getElementById('ws-status').textContent = '◌ connecting…';
}

connect();

// ── Render loop ───────────────────────────────────────────────────────────────
const _FRAME_MS = 1000 / 30;  // 30fps — bloom removed, setTimeout loop
let _lastFrameTime = 0;

function animate() {
  const now = performance.now();
  const dt = Math.min((now - _lastFrameTime) * 0.001, 0.05); // capped at 50ms — prevents jump on lag spike
  _lastFrameTime = now;
  let handled = false;
  if (activeMode) handled = activeMode.update(liveState, dt) === true;
  if (!handled) {
    camera.position.x += (0 - camera.position.x) * 0.02;
    camera.position.y += (0 - camera.position.y) * 0.02;
    camera.lookAt(0,0,0);
    renderer.render(scene, camera);
  }
  setTimeout(animate, _FRAME_MS);
}
animate();

// Keyboard shortcuts: 1=neural 2=chaos 3=globe 4=network 5=spectre
window.addEventListener('keydown', (e) => {
  const map = { '1':'neural', '2':'chaos', '3':'globe', '4':'network', '5':'spectre' };
  if (map[e.key]) {
    userOverride = true;  // keep user's choice even when WS heartbeat sends visual_mode:'neural'
    switchMode(map[e.key]);
  }
});

window.addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
