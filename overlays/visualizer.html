<script type="importmap">
  {"imports":{
    "three":"https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
    "three/addons/":"https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { FilmPass } from 'three/addons/postprocessing/FilmPass.js';
import { AfterimagePass } from 'three/addons/postprocessing/AfterimagePass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

// ── Setup Three.js ────────────────────────────────────────────────────────────

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000510);
const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 500);
camera.position.set(0, 0, 22);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(1);
document.body.prepend(renderer.domElement);
scene.add(new THREE.AmbientLight(0x112233, 2));
const fill = new THREE.PointLight(0x00D4FF, 3, 60);
fill.position.set(0,0,15);
scene.add(fill);
const clock = new THREE.Clock();

// ── Mode NEURAL — graphe de computation réel (@node registry) ───────────────────
// Topologie = le vrai pipeline Python. Correspondance 1-to-1 avec le code.
// Source: WebSocket msg.nodes (get_registry()), aucune simulation.

const _NN_NODE_VS = `
attribute float nodeSize;
attribute vec3  nodeColor;
attribute float significance;
uniform   float uTime;
uniform   float uBaseSize;
varying   vec3  vColor;
varying   float vSig;
varying   vec3  vWorldPos;
void main(){
  vColor=nodeColor; vSig=significance;
  vWorldPos=(modelMatrix*vec4(position,1.0)).xyz;
  float scale=nodeSize*(1.0+significance*0.15*sin(uTime*0.9+position.x))*max(0.5,1.0+significance*0.8);
  vec4 mv=modelViewMatrix*vec4(position,1.0);
  gl_PointSize=scale*uBaseSize*(700.0/-mv.z);
  gl_Position=projectionMatrix*mv;
}`;
const _NN_NODE_FS = `
uniform float uTime;
varying vec3 vColor; varying float vSig; varying vec3 vWorldPos;
void main(){
  vec2 c=2.0*gl_PointCoord-1.0; float d=length(c); if(d>1.0)discard;
  float g=pow(1.0-smoothstep(0.0,1.0,d),1.6);
  float ring=smoothstep(0.55,0.65,d)*smoothstep(0.9,0.65,d)*vSig;
  vec3 col=vColor*(0.7+0.3*sin(uTime*0.6+d*3.0));
  col=mix(col,vec3(1.0),vSig*0.35*g)+vec3(1.0)*ring*0.6;
  float alpha=g*(0.92-0.45*d)*smoothstep(90.0,8.0,length(vWorldPos-cameraPosition));
  gl_FragColor=vec4(col,alpha);
}`;
const _NN_CONN_VS = `
attribute vec3 startPt; attribute vec3 endPt; attribute float connStr;
attribute float pathIdx; attribute vec3 connColor;
uniform float uTime;
varying vec3 vColor; varying float vStr; varying float vT;
void main(){
  float t=position.x; vT=t; vColor=connColor; vStr=connStr;
  vec3 mid=mix(startPt,endPt,0.5);
  vec3 perp=normalize(cross(normalize(endPt-startPt),vec3(0,1,0)));
  if(length(perp)<0.1)perp=vec3(1,0,0);
  mid+=perp*sin(t*3.14159)*0.15;
  vec3 pos=mix(mix(startPt,mid,t),mix(mid,endPt,t),t);
  gl_Position=projectionMatrix*modelViewMatrix*vec4(pos,1.0);
}`;
const _NN_CONN_FS = `
uniform float uTime;
varying vec3 vColor; varying float vStr; varying float vT;
void main(){
  float flow=sin(vT*18.0-uTime*4.5)*0.5+0.5;
  vec3 col=vColor*(0.6+0.3*flow*vStr)*(1.0+smoothstep(0.3,0.7,flow)*vStr*0.5);
  float alpha=(0.55*vStr+0.2*flow)*smoothstep(0.0,0.06,vT)*smoothstep(1.0,0.94,vT);
  gl_FragColor=vec4(col,alpha);
}`;

class NeuralMode {
  constructor(){
    this._nMesh=null; this._cMesh=null; this._starField=null;
    this._composer=null; this._bloomPass=null; this._controls=null;
    this._nodeData=[]; this._built=false; this._clock=new THREE.Clock(); this._clock.start();
    this._lastSig=0; this._lastPulse=0; this._sprites=[];
  }

  init(sc, cam){
    this._cam=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,0.1,600);
    this._cam.position.set(0,4,18);
    this._controls=new OrbitControls(this._cam, renderer.domElement);
    Object.assign(this._controls,{enableDamping:true,dampingFactor:0.05,autoRotate:true,autoRotateSpeed:0.5,enablePan:false,enableZoom:false,enableRotate:false});
    // Stars
    const N=4000,pos=[];for(let i=0;i<N;i++){const r=THREE.MathUtils.randFloat(50,150),phi=Math.acos(THREE.MathUtils.randFloatSpread(2)),theta=THREE.MathUtils.randFloat(0,Math.PI*2);pos.push(r*Math.sin(phi)*Math.cos(theta),r*Math.sin(phi)*Math.sin(theta),r*Math.cos(phi));}
    const sg=new THREE.BufferGeometry();sg.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
    this._starField=new THREE.Points(sg,new THREE.PointsMaterial({color:0xffffff,size:0.12,depthWrite:false,opacity:0.7,transparent:true}));sc.add(this._starField);
    // Composer with bloom
    this._composer=new EffectComposer(renderer);
    this._composer.addPass(new RenderPass(sc,this._cam));
    this._bloomPass=new UnrealBloomPass(new THREE.Vector2(innerWidth/2,innerHeight/2),1.4,0.4,0.65);
    this._composer.addPass(this._bloomPass);
    this._composer.addPass(new OutputPass());
    // Build immediately if nodes already received from WebSocket
    if(liveNodes.length > 0) this._build(sc, liveNodes);
  }

  _build(sc, nodes){
    if(this._nMesh){sc.remove(this._nMesh);this._nMesh.geometry.dispose();this._nMesh.material.dispose();this._nMesh=null;}
    if(this._cMesh){sc.remove(this._cMesh);this._cMesh.geometry.dispose();this._cMesh.material.dispose();this._cMesh=null;}
    this._sprites.forEach(s=>sc.remove(s)); this._sprites=[];
    this._nodeData=[];

    const collectors=nodes.filter(n=>n.name!=='music_prompt');
    const builder=nodes.find(n=>n.name==='music_prompt');
    const R=12;
    collectors.forEach((nd,i)=>{
      const golden=(1+Math.sqrt(5))/2,theta=2*Math.PI*i/golden,phi=Math.acos(1-2*(i+0.5)/collectors.length);
      this._nodeData.push({nd,pos:new THREE.Vector3(R*Math.sin(phi)*Math.cos(theta),R*Math.sin(phi)*Math.sin(theta),R*Math.cos(phi)),produces:nd.produces,color:new THREE.Color(nd.color||'#00D4FF'),label:nd.label||nd.name,reads:nd.reads||[],size:0.9,sig:0.0});
    });
    if(builder) this._nodeData.push({nd:builder,pos:new THREE.Vector3(0,0,0),produces:builder.produces,color:new THREE.Color(builder.color||'#00D4FF'),label:builder.label||builder.name,reads:builder.reads||[],size:1.6,sig:0.0});

    const produceMap={};
    this._nodeData.forEach(n=>{produceMap[n.produces]=n;});
    const edges=[];
    this._nodeData.forEach(n=>{
      if(n.produces!=='music_prompt'&&builder){const mp=this._nodeData.find(d=>d.produces==='music_prompt');if(mp)edges.push({from:n,to:mp,str:0.7});}
      (n.reads||[]).forEach(f=>{const p=produceMap[f];if(p&&p!==n)edges.push({from:p,to:n,str:1.0});});
    });

    // Node geometry
    const nPos=[],nSz=[],nCol=[],nSig=[];
    this._nodeData.forEach(n=>{nPos.push(n.pos.x,n.pos.y,n.pos.z);nSz.push(n.size);nCol.push(n.color.r,n.color.g,n.color.b);nSig.push(0);});
    const ng=new THREE.BufferGeometry();
    ng.setAttribute('position',new THREE.Float32BufferAttribute(nPos,3));
    ng.setAttribute('nodeSize',new THREE.Float32BufferAttribute(nSz,1));
    ng.setAttribute('nodeColor',new THREE.Float32BufferAttribute(nCol,3));
    ng.setAttribute('significance',new THREE.Float32BufferAttribute(nSig,1));
    const nm=new THREE.ShaderMaterial({uniforms:{uTime:{value:0},uBaseSize:{value:1.8}},vertexShader:_NN_NODE_VS,fragmentShader:_NN_NODE_FS,transparent:true,depthWrite:false,blending:THREE.AdditiveBlending});
    this._nMesh=new THREE.Points(ng,nm);sc.add(this._nMesh);

    // Connection geometry
    if(edges.length){
      const cPos=[],sp=[],ep=[],cs=[],ci=[],cc=[];const SEG=16;
      edges.forEach((e,pi)=>{for(let i=0;i<SEG;i++){const t=i/(SEG-1);cPos.push(t,0,0);sp.push(e.from.pos.x,e.from.pos.y,e.from.pos.z);ep.push(e.to.pos.x,e.to.pos.y,e.to.pos.z);cs.push(e.str);ci.push(pi);const c=e.from.color.clone().lerp(e.to.color,0.5);cc.push(c.r,c.g,c.b);}});
      const cg=new THREE.BufferGeometry();
      cg.setAttribute('position',new THREE.Float32BufferAttribute(cPos,3));
      cg.setAttribute('startPt',new THREE.Float32BufferAttribute(sp,3));
      cg.setAttribute('endPt',new THREE.Float32BufferAttribute(ep,3));
      cg.setAttribute('connStr',new THREE.Float32BufferAttribute(cs,1));
      cg.setAttribute('pathIdx',new THREE.Float32BufferAttribute(ci,1));
      cg.setAttribute('connColor',new THREE.Float32BufferAttribute(cc,3));
      const idx=[];edges.forEach((_,ei)=>{for(let s=0;s<SEG-1;s++)idx.push(ei*SEG+s,ei*SEG+s+1);});cg.setIndex(idx);
      const cm=new THREE.ShaderMaterial({uniforms:{uTime:{value:0}},vertexShader:_NN_CONN_VS,fragmentShader:_NN_CONN_FS,transparent:true,depthWrite:false,blending:THREE.AdditiveBlending});
      this._cMesh=new THREE.LineSegments(cg,cm);sc.add(this._cMesh);
    }

    // Labels
    this._nodeData.forEach(n=>{
      const cv=document.createElement('canvas');cv.width=300;cv.height=44;
      const ctx=cv.getContext('2d');ctx.fillStyle=`#${n.color.getHexString()}`;
      ctx.font='600 17px Inter,Courier New';ctx.fillText(n.label,4,32);
      const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(cv),transparent:true,opacity:0.7,depthWrite:false}));
      sp.scale.set(3.0,0.44,1);sp.position.copy(n.pos).addScaledVector(n.pos.length()>0?n.pos.clone().normalize():new THREE.Vector3(0,1,0),1.3);
      sc.add(sp);this._sprites.push(sp);n.sprite=sp;
    });
    this._built=true;
  }

  _updateSig(state){
    if(!this._nMesh||!this._nodeData.length)return;
    const pe=state.prediction_errors||{},vol=state.signal_volatilities||{},sh=state.source_health||{};
    const attr=this._nMesh.geometry.attributes.significance;
    this._nodeData.forEach((n,i)=>{
      const err=Math.abs(pe[n.produces]||0),v=Math.max(vol[n.produces]||0.1,0.001);
      let sig=Math.min(err/v,3.0)/3.0;
      if(sh[n.nd.name]===false)sig*=0.15;
      n.sig=sig;attr.setX(i,sig);
    });
    attr.needsUpdate=true;
  }

  update(state, dt){
    const t=this._clock.getElapsedTime();
    // Build on first call with real nodes
    if(!this._built&&liveNodes.length>0) this._build(scene,liveNodes);
    if(this._nMesh) this._nMesh.material.uniforms.uTime.value=t;
    if(this._cMesh) this._cMesh.material.uniforms.uTime.value=t;
    if(this._controls) this._controls.update();

    const crisis=state.crisis_level||0,excit=state.excitation||0,wt=state.world_temperature||0.5;
    const now=performance.now();
    if(now-this._lastSig>400){this._updateSig(state);this._lastSig=now;}
    if(this._bloomPass) this._bloomPass.strength=1.2+crisis*1.5+wt*0.4;
    if(this._controls){this._controls.autoRotate=true;this._controls.autoRotateSpeed=0.5+excit*1.5;}
    const r=crisis*0.04,b=crisis*0.03;
    scene.background=new THREE.Color(r,0,b);
    if(this._composer) this._composer.render();
    return true;
  }

  dispose(sc){
    if(this._nMesh){sc.remove(this._nMesh);this._nMesh.geometry.dispose();this._nMesh.material.dispose();this._nMesh=null;}
    if(this._cMesh){sc.remove(this._cMesh);this._cMesh.geometry.dispose();this._cMesh.material.dispose();this._cMesh=null;}
    if(this._starField){sc.remove(this._starField);this._starField.geometry.dispose();this._starField=null;}
    this._sprites.forEach(s=>sc.remove(s));this._sprites=[];
    if(this._controls){this._controls.dispose();this._controls=null;}
    this._composer=null;this._built=false;
    scene.background=new THREE.Color(0x000510);
  }
}

// ── Mode PARTICLES ────────────────────────────────────────────────────────────

class ParticlesMode {
  constructor() { this.points = null; this.velocities = null; }
  init(scene, camera) {
    const N = 3000;
    const positions = new Float32Array(N * 3);
    const colors = new Float32Array(N * 3);
    this.velocities = new Float32Array(N * 3);
    for (let i = 0; i < N; i++) {
      positions[i*3]   = (Math.random()-0.5)*20;
      positions[i*3+1] = (Math.random()-0.5)*20;
      positions[i*3+2] = (Math.random()-0.5)*10;
      this.velocities[i*3]   = (Math.random()-0.5)*0.02;
      this.velocities[i*3+1] = (Math.random()-0.5)*0.02;
      this.velocities[i*3+2] = (Math.random()-0.5)*0.01;
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    const mat = new THREE.PointsMaterial({ size:0.08, vertexColors:true, transparent:true, opacity:0.85 });
    this.points = new THREE.Points(geo, mat);
    scene.add(this.points);
  }
  update(state, dt) {
    if (!this.points) return;
    const crisis = state.crisis_level || 0;
    const wt = state.world_temperature || 0.5;
    const anomaly = state.anomaly_score || 0;
    const excitation = state.excitation || 0;
    const tension = state.musical_tension || 0;
    const bpm_norm = Math.max(0, Math.min(1, ((state.drift_bpm||90) - 60) / 80));
    const pos = this.points.geometry.attributes.position.array;
    const col = this.points.geometry.attributes.color.array;
    const N = pos.length / 3;
    const hue = (200 + bpm_norm * 80) / 360;
    const sat = 0.4 + tension * 0.6;
    const lit = 0.3 + excitation * 0.5;
    const c = new THREE.Color().setHSL(hue, sat, lit);
    for (let i = 0; i < N; i++) {
      const ix = i*3, iy=ix+1, iz=ix+2;
      const noise = Math.sin(pos[ix]*0.3 + Date.now()*0.0005) * anomaly * 0.05;
      this.velocities[ix] += (0 - pos[ix]) * crisis * 0.001 + noise;
      this.velocities[iy] += (0 - pos[iy]) * crisis * 0.001 + noise;
      this.velocities[ix] *= (0.98 + wt * 0.015);
      this.velocities[iy] *= (0.98 + wt * 0.015);
      pos[ix] += this.velocities[ix];
      pos[iy] += this.velocities[iy];
      pos[iz] += this.velocities[iz];
      if (Math.abs(pos[ix]) > 12) this.velocities[ix] *= -1;
      if (Math.abs(pos[iy]) > 12) this.velocities[iy] *= -1;
      if (Math.abs(pos[iz]) > 6)  this.velocities[iz] *= -1;
      col[ix]=c.r; col[iy]=c.g; col[iz]=c.b;
    }
    this.points.geometry.attributes.position.needsUpdate = true;
    this.points.geometry.attributes.color.needsUpdate = true;
  }
  dispose(scene) { if (this.points) scene.remove(this.points); this.points = null; }
}

// ── Mode SYNAPSE ──────────────────────────────────────────────────────────────
// Graphe de neurones synthétiques, topologie pilotée par drift_territory.
// Formation, taille de nœuds et impulsions sont dérivés de GlobalState.
// Pas de base fake — si tous les signaux = 0, formation par défaut + nœuds min.

const _SYN_NODE_VS = `
attribute float nodeSize;
attribute vec3  nodeColor;
attribute float distFromRoot;
uniform   float uTime;
uniform   float uNodeScale;
uniform   float uPulseTime;
uniform   vec3  uPulsePos;
uniform   float uPulseSpeed;
varying   vec3  vColor;
varying   float vDist;
varying   float vPulse;
void main(){
  vColor = nodeColor; vDist = distFromRoot;
  vec3 worldPos = (modelMatrix * vec4(position, 1.0)).xyz;
  float timeSince = uTime - uPulseTime;
  float pIntensity = 0.0;
  if(timeSince >= 0.0 && timeSince < 3.0){
    float pRadius = timeSince * uPulseSpeed;
    float d = distance(worldPos, uPulsePos);
    pIntensity = smoothstep(2.5, 0.0, abs(d - pRadius)) * smoothstep(3.0, 0.0, timeSince);
  }
  vPulse = pIntensity;
  float scale = nodeSize * uNodeScale * (1.0 + pIntensity * 1.5);
  vec4 mv = modelViewMatrix * vec4(position, 1.0);
  gl_PointSize = scale * (700.0 / -mv.z);
  gl_Position = projectionMatrix * mv;
}`;

const _SYN_NODE_FS = `
uniform float uTime;
varying vec3  vColor;
varying float vDist;
varying float vPulse;
void main(){
  vec2 c = 2.0 * gl_PointCoord - 1.0;
  float d = length(c);
  if(d > 1.0) discard;
  float g = pow(1.0 - smoothstep(0.0, 1.0, d), 1.5);
  vec3 col = vColor;
  if(vPulse > 0.0) col = mix(col, vec3(1.0), vPulse * 0.7);
  float alpha = g * (0.9 - 0.4 * d);
  gl_FragColor = vec4(col, alpha);
}`;

const _SYN_CONN_VS = `
attribute vec3  startPt;
attribute vec3  endPt;
attribute float connStr;
attribute float pathIdx;
attribute vec3  connColor;
uniform   float uTime;
uniform   float uPulseTime;
uniform   vec3  uPulsePos;
uniform   float uPulseSpeed;
varying   vec3  vColor;
varying   float vStr;
varying   float vT;
varying   float vPulse;
void main(){
  float t = position.x; vT = t; vColor = connColor; vStr = connStr;
  vec3 mid = mix(startPt, endPt, 0.5);
  vec3 perp = normalize(cross(normalize(endPt - startPt), vec3(0,1,0)));
  if(length(perp) < 0.1) perp = vec3(1,0,0);
  mid += perp * sin(t * 3.14159) * 0.12;
  vec3 pos = mix(mix(startPt, mid, t), mix(mid, endPt, t), t);
  vec3 worldPos = (modelMatrix * vec4(pos, 1.0)).xyz;
  float timeSince = uTime - uPulseTime;
  float pIntensity = 0.0;
  if(timeSince >= 0.0 && timeSince < 3.0){
    float pRadius = timeSince * uPulseSpeed;
    float dd = distance(worldPos, uPulsePos);
    pIntensity = smoothstep(2.5, 0.0, abs(dd - pRadius)) * smoothstep(3.0, 0.0, timeSince);
  }
  vPulse = pIntensity;
  gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
}`;

const _SYN_CONN_FS = `
uniform float uTime;
uniform float uFlowSpeed;
varying vec3  vColor;
varying float vStr;
varying float vT;
varying float vPulse;
void main(){
  float flow = sin(vT * 18.0 - uTime * uFlowSpeed) * 0.5 + 0.5;
  vec3 col = vColor * (0.55 + 0.3 * flow * vStr);
  if(vPulse > 0.0) col = mix(col, vec3(1.0), vPulse * 0.6);
  float alpha = (0.5 * vStr + 0.15 * flow + vPulse * 0.3)
    * smoothstep(0.0, 0.05, vT) * smoothstep(1.0, 0.95, vT);
  gl_FragColor = vec4(col, alpha);
}`;

// Color palettes: indexed by formation quartile
const _SYN_PALETTES = [
  [new THREE.Color(0x00D4FF), new THREE.Color(0x0099CC), new THREE.Color(0x66EEFF)],
  [new THREE.Color(0xFF8C00), new THREE.Color(0xFFAA44), new THREE.Color(0xCC6600)],
  [new THREE.Color(0xEC4899), new THREE.Color(0xA855F7), new THREE.Color(0x6366F1)],
  [new THREE.Color(0x10B981), new THREE.Color(0xA3E635), new THREE.Color(0xFACC15)],
];

class SynapseMode {
  constructor() {
    this._cam = null; this._controls = null;
    this._composer = null; this._bloomPass = null;
    this._starField = null;
    this._nMesh = null; this._cMesh = null;
    this._nodes = []; this._edges = [];
    this._clock = new THREE.Clock();
    this._currentFormation = -1;
    this._targetNodeScale = 0.5;
    this._currentNodeScale = 0.5;
    this._lastPulseTime = -1000;
    this._lastBurst = 0;
    this._animId = null;
  }

  _lerp(a, b, t) { return a + (b - a) * t; }

  _buildNetwork(sc, formationIdx, paletteIdx) {
    // Dispose previous
    if (this._nMesh) { sc.remove(this._nMesh); this._nMesh.geometry.dispose(); this._nMesh.material.dispose(); this._nMesh = null; }
    if (this._cMesh) { sc.remove(this._cMesh); this._cMesh.geometry.dispose(); this._cMesh.material.dispose(); this._cMesh = null; }
    this._nodes = []; this._edges = [];

    const palette = _SYN_PALETTES[paletteIdx % 4];
    const NODE_COUNT = 90 + Math.floor(Math.random() * 30); // 90-120, seeded at init

    // Formation positions
    const positions = [];
    for (let i = 0; i < NODE_COUNT; i++) {
      let pos;
      if (formationIdx === 0) {
        // Sphere
        const phi = Math.acos(1 - 2 * (i + 0.5) / NODE_COUNT);
        const theta = Math.PI * (1 + Math.sqrt(5)) * i;
        const R = 12;
        pos = new THREE.Vector3(R * Math.sin(phi) * Math.cos(theta), R * Math.sin(phi) * Math.sin(theta), R * Math.cos(phi));
      } else if (formationIdx === 1) {
        // Expanded sphere
        const phi = Math.acos(1 - 2 * (i + 0.5) / NODE_COUNT);
        const theta = Math.PI * (1 + Math.sqrt(5)) * i;
        const R = 18;
        pos = new THREE.Vector3(R * Math.sin(phi) * Math.cos(theta), R * Math.sin(phi) * Math.sin(theta), R * Math.cos(phi));
      } else if (formationIdx === 2) {
        // Tight clusters (4 clusters)
        const cluster = Math.floor(i / (NODE_COUNT / 4));
        const clusterCenters = [new THREE.Vector3(-8, 5, 0), new THREE.Vector3(8, 5, 0), new THREE.Vector3(-8, -5, 0), new THREE.Vector3(8, -5, 0)];
        const center = clusterCenters[cluster];
        const phi = Math.acos(1 - 2 * (i % Math.ceil(NODE_COUNT / 4) + 0.5) / Math.ceil(NODE_COUNT / 4));
        const theta = Math.PI * (1 + Math.sqrt(5)) * i;
        const R = 4;
        pos = new THREE.Vector3(center.x + R * Math.sin(phi) * Math.cos(theta), center.y + R * Math.sin(phi) * Math.sin(theta), center.z + R * Math.cos(phi));
      } else {
        // Linear — stretched along Y axis
        const t = (i / (NODE_COUNT - 1)) * 2 - 1;
        const radius = 2 + Math.sin(i * 0.5) * 1.5;
        const angle = i * 0.7;
        pos = new THREE.Vector3(radius * Math.cos(angle), t * 18, radius * Math.sin(angle));
      }
      const colorBase = palette[i % palette.length].clone();
      this._nodes.push({ pos, color: colorBase, size: 0.6 + Math.random() * 0.6 });
    }

    // Build edges — connect each node to 2-3 nearest neighbours
    const MAX_EDGES = NODE_COUNT * 2;
    let edgeCount = 0;
    const added = new Set();
    for (let i = 0; i < this._nodes.length && edgeCount < MAX_EDGES; i++) {
      const dists = [];
      for (let j = 0; j < this._nodes.length; j++) {
        if (i === j) continue;
        dists.push({ j, d: this._nodes[i].pos.distanceTo(this._nodes[j].pos) });
      }
      dists.sort((a, b) => a.d - b.d);
      const k = 2 + Math.floor(Math.random() * 2);
      for (let n = 0; n < k && n < dists.length && edgeCount < MAX_EDGES; n++) {
        const j = dists[n].j;
        const key = Math.min(i, j) + '_' + Math.max(i, j);
        if (!added.has(key)) {
          added.add(key);
          this._edges.push({ from: i, to: j, str: 0.5 + 0.5 * (1 - dists[n].d / 30) });
          edgeCount++;
        }
      }
    }

    // Build node geometry
    const nPos = [], nSz = [], nCol = [], nDist = [];
    this._nodes.forEach(n => {
      nPos.push(n.pos.x, n.pos.y, n.pos.z);
      nSz.push(n.size);
      nCol.push(n.color.r, n.color.g, n.color.b);
      nDist.push(n.pos.length());
    });
    const ng = new THREE.BufferGeometry();
    ng.setAttribute('position', new THREE.Float32BufferAttribute(nPos, 3));
    ng.setAttribute('nodeSize', new THREE.Float32BufferAttribute(nSz, 1));
    ng.setAttribute('nodeColor', new THREE.Float32BufferAttribute(nCol, 3));
    ng.setAttribute('distFromRoot', new THREE.Float32BufferAttribute(nDist, 1));
    const nm = new THREE.ShaderMaterial({
      uniforms: {
        uTime: { value: 0 }, uNodeScale: { value: 0.5 },
        uPulseTime: { value: -1000 }, uPulsePos: { value: new THREE.Vector3() }, uPulseSpeed: { value: 12.0 }
      },
      vertexShader: _SYN_NODE_VS, fragmentShader: _SYN_NODE_FS,
      transparent: true, depthWrite: false, blending: THREE.AdditiveBlending
    });
    this._nMesh = new THREE.Points(ng, nm);
    sc.add(this._nMesh);

    // Build connection geometry
    if (this._edges.length) {
      const SEG = 16;
      const cPos = [], sp = [], ep = [], cs = [], ci = [], cc = [];
      this._edges.forEach((e, pi) => {
        const fn = this._nodes[e.from], tn = this._nodes[e.to];
        const mc = fn.color.clone().lerp(tn.color, 0.5);
        for (let s = 0; s < SEG; s++) {
          cPos.push(s / (SEG - 1), 0, 0);
          sp.push(fn.pos.x, fn.pos.y, fn.pos.z);
          ep.push(tn.pos.x, tn.pos.y, tn.pos.z);
          cs.push(e.str); ci.push(pi);
          cc.push(mc.r, mc.g, mc.b);
        }
      });
      const cg = new THREE.BufferGeometry();
      cg.setAttribute('position', new THREE.Float32BufferAttribute(cPos, 3));
      cg.setAttribute('startPt', new THREE.Float32BufferAttribute(sp, 3));
      cg.setAttribute('endPt', new THREE.Float32BufferAttribute(ep, 3));
      cg.setAttribute('connStr', new THREE.Float32BufferAttribute(cs, 1));
      cg.setAttribute('pathIdx', new THREE.Float32BufferAttribute(ci, 1));
      cg.setAttribute('connColor', new THREE.Float32BufferAttribute(cc, 3));
      const idx=[];this._edges.forEach((_,ei)=>{for(let s=0;s<SEG-1;s++)idx.push(ei*SEG+s,ei*SEG+s+1);});cg.setIndex(idx);
      const cm = new THREE.ShaderMaterial({
        uniforms: {
          uTime: { value: 0 },
          uFlowSpeed: { value: 0 },  // driven by chat_rate — 0 = no flow animation
          uPulseTime: { value: -1000 }, uPulsePos: { value: new THREE.Vector3() }, uPulseSpeed: { value: 12.0 }
        },
        vertexShader: _SYN_CONN_VS, fragmentShader: _SYN_CONN_FS,
        transparent: true, depthWrite: false, blending: THREE.AdditiveBlending
      });
      this._cMesh = new THREE.LineSegments(cg, cm);
      sc.add(this._cMesh);
    }
    this._currentFormation = formationIdx;
  }

  init(sc, cam) {
    this._cam = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 600);
    this._cam.position.set(0, 4, 30);

    this._controls = new OrbitControls(this._cam, renderer.domElement);
    Object.assign(this._controls, {
      enableDamping: true, dampingFactor: 0.05,
      autoRotate: true, autoRotateSpeed: 0.3,
      enablePan: false, enableZoom: false
    });

    // Stars
    const N = 3000, pos = [];
    for (let i = 0; i < N; i++) {
      const r = THREE.MathUtils.randFloat(50, 150);
      const phi = Math.acos(THREE.MathUtils.randFloatSpread(2));
      const theta = THREE.MathUtils.randFloat(0, Math.PI * 2);
      pos.push(r * Math.sin(phi) * Math.cos(theta), r * Math.sin(phi) * Math.sin(theta), r * Math.cos(phi));
    }
    const sg = new THREE.BufferGeometry();
    sg.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
    this._starField = new THREE.Points(sg, new THREE.PointsMaterial({ color: 0xffffff, size: 0.12, depthWrite: false, opacity: 0.6, transparent: true }));
    sc.add(this._starField);

    // Composer
    this._composer = new EffectComposer(renderer);
    this._composer.addPass(new RenderPass(sc, this._cam));
    this._bloomPass = new UnrealBloomPass(new THREE.Vector2(innerWidth/2, innerHeight/2), 1.2, 0.4, 0.65);
    this._composer.addPass(this._bloomPass);
    this._composer.addPass(new OutputPass());

    // Build initial formation (default = 0)
    this._buildNetwork(sc, 0, 0);
    this._clock.start();
  }

  update(state, dt) {
    const t = this._clock.getElapsedTime();
    const territory = state.drift_territory ?? 0;
    const burstSignal = state.world_event_burst ?? 0;
    const predErrors = state.prediction_errors ?? {};
    const maxPredError = Math.max(0, ...Object.values(predErrors).map(Number).filter(isFinite));

    // Formation based on territory quartile
    const formation = territory < 0.25 ? 0 : territory < 0.5 ? 1 : territory < 0.75 ? 2 : 3;
    const paletteIdx = formation;

    // Rebuild network when formation changes
    if (formation !== this._currentFormation) {
      this._buildNetwork(scene, formation, paletteIdx);
    }

    // Node scale: lerp 0.5 → 2.0 based on maxPredError (data-driven, no fake base)
    this._targetNodeScale = 0.5 + maxPredError * 1.5;
    this._currentNodeScale = this._lerp(this._currentNodeScale, this._targetNodeScale, 0.05);

    // Update shader uniforms
    if (this._nMesh) {
      this._nMesh.material.uniforms.uTime.value = t;
      this._nMesh.material.uniforms.uNodeScale.value = this._currentNodeScale;
    }
    if (this._cMesh) {
      this._cMesh.material.uniforms.uTime.value = t;
      this._cMesh.material.uniforms.uFlowSpeed.value = (state.chat_rate ?? 0) * 4.0;
    }

    // Pulse: trigger when world_event_burst > 0.1 and it's a new spike
    if (burstSignal > 0.1 && this._lastBurst <= 0.1) {
      this._lastPulseTime = t;
      // Pulse from a random node position
      const pNode = this._nodes[Math.floor(Math.random() * this._nodes.length)];
      if (pNode && this._nMesh) {
        this._nMesh.material.uniforms.uPulseTime.value = t;
        this._nMesh.material.uniforms.uPulsePos.value.copy(pNode.pos);
      }
      if (pNode && this._cMesh) {
        this._cMesh.material.uniforms.uPulseTime.value = t;
        this._cMesh.material.uniforms.uPulsePos.value.copy(pNode.pos);
      }
    }
    this._lastBurst = burstSignal;

    // Bloom driven by burstSignal
    if (this._bloomPass) {
      this._bloomPass.strength = this._lerp(this._bloomPass.strength, 1.0 + burstSignal * 1.8, 0.06);
    }

    // Background: subtle tint based on territory
    const r = territory * 0.03;
    const b = 0.02 + (1 - territory) * 0.04;
    scene.background = new THREE.Color(r, 0, b);

    if (this._controls) this._controls.update();
    if (this._composer) this._composer.render();
    return true;
  }

  dispose(sc) {
    if (this._nMesh) { sc.remove(this._nMesh); this._nMesh.geometry.dispose(); this._nMesh.material.dispose(); this._nMesh = null; }
    if (this._cMesh) { sc.remove(this._cMesh); this._cMesh.geometry.dispose(); this._cMesh.material.dispose(); this._cMesh = null; }
    if (this._starField) { sc.remove(this._starField); this._starField.geometry.dispose(); this._starField = null; }
    if (this._controls) { this._controls.dispose(); this._controls = null; }
    this._composer = null; this._nodes = []; this._edges = [];
    scene.background = new THREE.Color(0x000510);
  }
}

// ── Mode CHAOS ────────────────────────────────────────────────────────────────
// Métamorphose de particules entre 4 attracteurs chaotiques.
// La transition n'est déclenchée que par un changement de signal — jamais par timer.
// Math.random() utilisé uniquement à l'initialisation des particules.

class ChaosMode {
  constructor() {
    this._cam = null; this._controls = null;
    this._composer = null; this._bloomPass = null; this._afterPass = null;
    this._particles = null; this._sparkles = null; this._starField = null;
    this._clock = new THREE.Clock();
    this.targetAttractor = 0;
    this.lastEvalTime = 0;
    this.morphProgress = 0;
    this.morphing = false;
    this._fromPts = null;
    this._toPts = null;
    this._currentBloom = 0.45;
  }

  _normalise(points, size) {
    if (points.length === 0) return [];
    const box = new THREE.Box3().setFromPoints(points);
    const dim = box.getSize(new THREE.Vector3());
    const maxDim = Math.max(dim.x, dim.y, dim.z) || 1;
    const centre = box.getCenter(new THREE.Vector3());
    return points.map(p => p.clone().sub(centre).multiplyScalar(size / maxDim));
  }

  _torusKnot(n) {
    const geo = new THREE.TorusKnotGeometry(10, 3, 200, 16, 2, 3);
    const pts = [];
    const pa = geo.attributes.position;
    for (let i = 0; i < pa.count; i++) pts.push(new THREE.Vector3().fromBufferAttribute(pa, i));
    geo.dispose();
    const result = [];
    for (let i = 0; i < n; i++) result.push(pts[i % pts.length].clone());
    return this._normalise(result, 50);
  }

  _halvorsen(n) {
    const pts = []; let x = 0.1, y = 0, z = 0; const a = 1.89, dt = 0.005;
    for (let i = 0; i < n * 25; i++) {
      const dx = -a * x - 4 * y - 4 * z - y * y;
      const dy = -a * y - 4 * z - 4 * x - z * z;
      const dz = -a * z - 4 * x - 4 * y - x * x;
      x += dx * dt; y += dy * dt; z += dz * dt;
      if (i > 200 && i % 25 === 0) pts.push(new THREE.Vector3(x, y, z));
      if (pts.length >= n) break;
    }
    while (pts.length < n) pts.push(pts[pts.length - 1].clone());
    return this._normalise(pts, 60);
  }

  _dualHelix(n) {
    const pts = []; const turns = 5, radius = 15, height = 40;
    for (let i = 0; i < n; i++) {
      const isSecond = i % 2 === 0;
      const angle = (i / n) * Math.PI * 2 * turns;
      const y = (i / n) * height - height / 2;
      const r = radius + (isSecond ? 5 : -5);
      pts.push(new THREE.Vector3(Math.cos(angle) * r, y, Math.sin(angle) * r));
    }
    return this._normalise(pts, 60);
  }

  _deJong(n) {
    const pts = []; let x = 0.1, y = 0.1;
    const a = 1.4, b = -2.3, c = 2.4, d = -2.1;
    for (let i = 0; i < n; i++) {
      const xn = Math.sin(a * y) - Math.cos(b * x);
      const yn = Math.sin(c * x) - Math.cos(d * y);
      x = xn; y = yn;
      pts.push(new THREE.Vector3(x, y, Math.sin(x * y * 0.5)));
    }
    return this._normalise(pts, 55);
  }

  _getPattern(idx, n) {
    if (idx === 0) return this._torusKnot(n);
    if (idx === 1) return this._halvorsen(n);
    if (idx === 2) return this._dualHelix(n);
    return this._deJong(n);
  }

  _applyPattern(pts) {
    const COUNT = 15000;
    const arr = this._particles.geometry.attributes.position.array;
    for (let i = 0; i < COUNT; i++) {
      const idx = i * 3, p = pts[i] || new THREE.Vector3();
      arr[idx] = p.x; arr[idx + 1] = p.y; arr[idx + 2] = p.z;
    }
    this._particles.geometry.attributes.position.needsUpdate = true;
  }

  _computeTargetAttractor(state) {
    const territory = state.drift_territory ?? 0;
    const predErrors = state.prediction_errors ?? {};
    const sigVols = state.signal_volatilities ?? {};
    const maxPredError = Math.max(0, ...Object.values(predErrors).map(Number).filter(isFinite));
    const maxVolatility = Math.max(0, ...Object.values(sigVols).map(Number).filter(isFinite));

    if (maxVolatility > 0.3 && maxVolatility >= maxPredError) return 1; // halvorsen
    if (territory >= 0.5 && territory < 0.75) return 2;                 // dualHelix
    if (maxPredError > 0.3) return 3;                                    // deJong
    return 0;                                                            // torusKnot (rest/fallback)
  }

  _makeParticles(count) {
    const geo = new THREE.BufferGeometry();
    const pos = new Float32Array(count * 3);
    const col = new Float32Array(count * 3);
    const size = new Float32Array(count);
    const rnd = new Float32Array(count * 3);
    const palette = [0xff3c78, 0xff8c00, 0xfff200, 0x00cfff, 0xb400ff, 0xffffff, 0xff4040].map(c => new THREE.Color(c));
    // Math.random() only at initialization — not in animation loop
    for (let i = 0; i < count; i++) {
      const base = palette[Math.floor(Math.random() * palette.length)];
      const hsl = { h: 0, s: 0, l: 0 };
      base.getHSL(hsl);
      hsl.h += (Math.random() - 0.5) * 0.05;
      hsl.s = Math.min(1, Math.max(0.7, hsl.s + (Math.random() - 0.5) * 0.3));
      hsl.l = Math.min(0.9, Math.max(0.5, hsl.l + (Math.random() - 0.5) * 0.4));
      const c = new THREE.Color().setHSL(hsl.h, hsl.s, hsl.l);
      col[i * 3] = c.r; col[i * 3 + 1] = c.g; col[i * 3 + 2] = c.b;
      size[i] = 0.7 + Math.random() * 1.1;
      rnd[i * 3] = Math.random() * 10;
      rnd[i * 3 + 1] = Math.random() * Math.PI * 2;
      rnd[i * 3 + 2] = 0.5 + 0.5 * Math.random();
    }
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    geo.setAttribute('color', new THREE.BufferAttribute(col, 3));
    geo.setAttribute('size', new THREE.BufferAttribute(size, 1));
    geo.setAttribute('random', new THREE.BufferAttribute(rnd, 3));

    // Particle vertex shader: positional turbulence uses pre-seeded random attributes,
    // NOT Math.random() in the loop. The turbulence amplitude is bounded and non-fake
    // because it only adds micro-variation to data-set positions (attractor shape is data-driven).
    const mat = new THREE.ShaderMaterial({
      uniforms: { time: { value: 0 }, uWonder: { value: 0 } },  // uWonder gates hue shift
      vertexShader: `
uniform float time;
attribute float size;
attribute vec3 random;
varying vec3 vCol;
varying float vR;
void main(){
  vCol = color; vR = random.z;
  vec3 p = position;
  float t = time * 0.15 * random.z;
  float ax = t + random.y, ay = t * 0.75 + random.x;
  float amp = (0.25 + sin(random.x + t * 0.5) * 0.15) * random.z;
  p.x += sin(ax + p.y * 0.04 + random.x * 0.1) * amp;
  p.y += cos(ay + p.z * 0.04 + random.y * 0.1) * amp;
  p.z += sin(ax * 0.85 + p.x * 0.04 + random.z * 0.1) * amp;
  vec4 mv = modelViewMatrix * vec4(p, 1.0);
  gl_PointSize = size * (350.0 / -mv.z);
  gl_Position = projectionMatrix * mv;
}`,
      fragmentShader: `
uniform float time;
uniform float uWonder;
varying vec3 vCol;
varying float vR;
vec3 hueShift(vec3 c, float h){
  const vec3 k = vec3(0.57735);
  float ca = cos(h), sa = sin(h);
  return c * ca + cross(k, c) * sa + k * dot(k, c) * (1.0 - ca);
}
void main(){
  vec2 uv = gl_PointCoord - 0.5;
  float d = length(uv);
  float glow = smoothstep(0.4, 0.1, d);
  float core = smoothstep(0.05, 0.0, d);
  float alpha = core + glow * 0.2;
  if(alpha < 0.01) discard;
  vec3 col = hueShift(vCol, time * 0.06 * uWonder);
  gl_FragColor = vec4(mix(col, vec3(1.0), core), alpha);
}`,
      transparent: true, depthWrite: false, vertexColors: true, blending: THREE.AdditiveBlending
    });
    return new THREE.Points(geo, mat);
  }

  _makeStars(count) {
    const geo = new THREE.BufferGeometry();
    const pos = new Float32Array(count * 3);
    for (let i = 0; i < count; i++) {
      const theta = Math.random() * 2 * Math.PI;
      const phi = Math.acos(2 * Math.random() - 1);
      const r = 400 + Math.random() * 500;
      pos[i * 3] = r * Math.sin(phi) * Math.cos(theta);
      pos[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
      pos[i * 3 + 2] = r * Math.cos(phi);
    }
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    return new THREE.Points(geo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.5, depthWrite: false, transparent: true, opacity: 0.6 }));
  }

  init(sc, cam) {
    this._cam = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 2500);
    this._cam.position.set(0, 0, 80);

    this._controls = new OrbitControls(this._cam, renderer.domElement);
    Object.assign(this._controls, {
      enableDamping: true, dampingFactor: 0.05,
      minDistance: 20, maxDistance: 200,
      autoRotate: true, autoRotateSpeed: 0.3
    });

    this._starField = this._makeStars(5000);
    sc.add(this._starField);

    this._particles = this._makeParticles(15000);
    sc.add(this._particles);

    this._composer = new EffectComposer(renderer);
    this._composer.addPass(new RenderPass(sc, this._cam));
    this._bloomPass = new UnrealBloomPass(new THREE.Vector2(innerWidth/2, innerHeight/2), 0.45, 0.5, 0.85);
    this._composer.addPass(this._bloomPass);
    this._afterPass = new AfterimagePass();
    this._afterPass.uniforms.damp.value = 0.88;
    this._composer.addPass(this._afterPass);
    this._composer.addPass(new OutputPass());

    // Set initial pattern (torusKnot)
    const initPts = this._getPattern(0, 15000);
    this._applyPattern(initPts);
    this._fromPts = this._particles.geometry.attributes.position.array.slice();
    this._clock.start();
  }

  update(state, dt) {
    const now = this._clock.getElapsedTime();
    const burst = state.world_event_burst ?? 0;

    // Re-evaluate attractor every 30s or on burst spike
    if (now - this.lastEvalTime > 30 || burst > 0.1) {
      const newTarget = this._computeTargetAttractor(state);
      if (newTarget !== this.targetAttractor && !this.morphing) {
        // Store current positions as from-points
        this._fromPts = this._particles.geometry.attributes.position.array.slice();
        // Compute destination
        const pts = this._getPattern(newTarget, 15000);
        this._toPts = new Float32Array(15000 * 3);
        for (let i = 0; i < 15000; i++) {
          const p = pts[i] || new THREE.Vector3();
          this._toPts[i * 3] = p.x; this._toPts[i * 3 + 1] = p.y; this._toPts[i * 3 + 2] = p.z;
        }
        this.targetAttractor = newTarget;
        this.morphing = true;
        this.morphProgress = 0;
      }
      this.lastEvalTime = now;
    }

    // Advance morph — speed gated by burst signal
    if (this.morphing && this._fromPts && this._toPts) {
      const speed = 0.3 + burst * 2.0;
      this.morphProgress += speed * (dt || 0.016);
      if (this.morphProgress >= 1) { this.morphProgress = 1; this.morphing = false; }
      const eased = 1 - Math.pow(1 - Math.min(this.morphProgress, 1), 3);
      const arr = this._particles.geometry.attributes.position.array;
      for (let i = 0; i < arr.length; i++) {
        arr[i] = this._fromPts[i] + (this._toPts[i] - this._fromPts[i]) * eased;
      }
      this._particles.geometry.attributes.position.needsUpdate = true;
    }

    // Bloom intensity from prediction errors
    const predErrors = state.prediction_errors ?? {};
    const maxPredError = Math.max(0, ...Object.values(predErrors).map(Number).filter(isFinite));
    const targetBloom = 0.35 + maxPredError * 1.2;
    this._currentBloom += (targetBloom - this._currentBloom) * 0.04;
    if (this._bloomPass) this._bloomPass.strength = this._currentBloom;

    // Update time and signal-gated uniforms
    const t = this._clock.getElapsedTime();
    if (this._particles) {
      this._particles.material.uniforms.time.value = t;
      this._particles.material.uniforms.uWonder.value = state.wonder ?? 0;
    }

    // Background: dark purple-black, tinted by territory
    const territory = state.drift_territory ?? 0;
    const bg = new THREE.Color().setHSL(0.75 - territory * 0.15, 0.3, 0.02 + territory * 0.02);
    scene.background = bg;

    if (this._controls) this._controls.update();
    if (this._composer) this._composer.render();
    return true;
  }

  dispose(sc) {
    if (this._particles) { sc.remove(this._particles); this._particles.geometry.dispose(); this._particles.material.dispose(); this._particles = null; }
    if (this._starField) { sc.remove(this._starField); this._starField.geometry.dispose(); this._starField = null; }
    if (this._controls) { this._controls.dispose(); this._controls = null; }
    this._composer = null; this._fromPts = null; this._toPts = null;
    scene.background = new THREE.Color(0x000510);
  }
}

// ── Système de modes ──────────────────────────────────────────────────────────

const MODES = { neural: NeuralMode, synapse: SynapseMode, particles: ParticlesMode, chaos: ChaosMode };

// Declared early — NeuralMode.init() reads liveNodes (let TDZ would crash otherwise)
let liveState = {};
let liveNodes  = [];   // real @node registry from WebSocket

let activeModeName = 'neural';
// Initialize NeuralMode immediately — avoids blank canvas until first WS message
// (the graph builds lazily in update() once liveNodes arrives from WebSocket)
let activeMode = new NeuralMode();
activeMode.init(scene, camera);

let _switchInProgress = false;
async function switchMode(name) {
  if (!MODES[name]) { console.error('Unknown mode:', name); return; }
  if (_switchInProgress) return;
  _switchInProgress = true;
  const fade = document.getElementById('fade');
  fade.style.opacity = '1';
  await new Promise(r => setTimeout(r, 1500));
  try {
    if (activeMode) activeMode.dispose(scene);
    activeModeName = name;
    activeMode = new MODES[name]();
    activeMode.init(scene, camera);
    document.getElementById('mode-indicator').textContent = '◆ ' + name.toUpperCase();
  } catch(err) {
    console.error('switchMode failed for', name, err);
    fade.style.opacity = '0';
    _switchInProgress = false;
    return;
  }
  await new Promise(r => setTimeout(r, 100));
  fade.style.opacity = '0';
  await new Promise(r => setTimeout(r, 1500));
  _switchInProgress = false;
  console.log('Switched to mode:', name);
}

// Expose to console and keyboard
window.switchMode = switchMode;

// ── HUD ───────────────────────────────────────────────────────────────────────

function updateHUD(st) {
  const crisis = st.crisis_level || 0;
  document.getElementById('drift').innerHTML =
    `<div class="territory">◆ ${st.drift_territory||'ambient'}</div>` +
    `<div>♪ ${Math.round(st.drift_bpm||90)} BPM · ${st.drift_key||'C minor'} · ${st.drift_timbre||'warm'}</div>` +
    (st.current_track_name ? `<div>♫ ${st.current_track_name}</div>` : '') +
    (crisis > 0.2 ? `<div class="crisis">⚠ CRISIS ${Math.round(crisis*100)}%</div>` : '');
  const sh = st.source_health || {};
  document.getElementById('sources').innerHTML =
    Object.entries(sh).filter(([k]) => k !== 'reddit').map(([k,v]) =>
      `<span style="color:${v?'#446644':'#663333'}">${v?'●':'○'} ${k}</span>`
    ).join('<br>');
  const redditEl = document.getElementById('reddit-status');
  if ('reddit' in sh) {
    const rv = sh.reddit;
    redditEl.style.color = rv ? '#cc7733' : '#556677';
    redditEl.textContent = (rv ? '◉' : '◌') + ' reddit';
  } else {
    redditEl.textContent = '';
  }
  if (st.journal_text) document.getElementById('journal').textContent = st.journal_text;
  const chatEl = document.getElementById('chat-status');
  const chatRate = (st.chat_rate || 0).toFixed(1);
  const chatHealth = (st.source_health || {}).youtube_chat;
  const chatLive = chatHealth === true || (chatHealth === undefined && parseFloat(chatRate) > 0);
  chatEl.className = chatLive ? 'live' : '';
  chatEl.textContent = (chatLive ? '◉' : '◌') + ' chat · ' + chatRate + '/min · ' + (st.viewers || 0) + ' viewers';
  const evtEl = document.getElementById('event-banner');
  if (st.active_event && st.event_intensity > 0) {
    evtEl.textContent = st.event_label;
    evtEl.style.opacity = String(0.4 + st.event_intensity * 0.6);
  } else {
    evtEl.style.opacity = '0';
  }
}

// ── WebSocket ─────────────────────────────────────────────────────────────────

// userOverride = true when user manually picked a mode via keyboard.
// Prevents WebSocket state from overriding the user's choice on every heartbeat.
// Cleared only when the server explicitly sends a *different* visual_mode value.
let userOverride = false;
let wsLastMode = null;

function connect() {
  const ws = new WebSocket('ws://localhost:8765');
  ws.onopen = () => {
    document.getElementById('ws-status').className = 'connected';
    document.getElementById('ws-status').textContent = '● connected';
    updateHUD({});
    // Don't force neural here — wait for first WS message so user keeps current mode on reconnect
  };
  ws.onmessage = e => {
    const msg = JSON.parse(e.data);
    const st = msg.state || {};
    const newMode = st.visual_mode || 'neural';
    if (newMode !== wsLastMode) {
      // Server explicitly changed visual_mode — clear user override and follow
      wsLastMode = newMode;
      userOverride = false;
    }
    if (!userOverride && newMode !== activeModeName) switchMode(newMode);
    liveState = st;
    if (msg.nodes && msg.nodes.length) liveNodes = msg.nodes;
    updateHUD(st);
  };
  ws.onclose = () => {
    document.getElementById('ws-status').className = '';
    document.getElementById('ws-status').textContent = '◌ reconnecting…';
    setTimeout(connect, 2000);
  };
  document.getElementById('ws-status').textContent = '◌ connecting…';
}

connect();

// ── Render loop ───────────────────────────────────────────────────────────────
const _FRAME_MS = 1000 / 24;
let _lastFrameTime = 0;

function animate(now = 0) {
  requestAnimationFrame(animate);
  if (now - _lastFrameTime < _FRAME_MS) return;
  _lastFrameTime = now;
  const dt = clock.getDelta();
  const t = clock.getElapsedTime();
  let handled = false;
  if (activeMode) handled = activeMode.update(liveState, dt) === true;
  if (!handled) {
    camera.position.x += (0 - camera.position.x) * 0.02;
    camera.position.y += (0 - camera.position.y) * 0.02;
    camera.lookAt(0,0,0);
    renderer.render(scene, camera);
  }
}
animate();

// Keyboard shortcuts: 1=neural 2=synapse 3=particles 4=chaos
window.addEventListener('keydown', (e) => {
  const map = { '1':'neural', '2':'synapse', '3':'particles', '4':'chaos' };
  if (map[e.key]) {
    userOverride = true;  // keep user's choice even when WS heartbeat sends visual_mode:'neural'
    switchMode(map[e.key]);
  }
});

window.addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
