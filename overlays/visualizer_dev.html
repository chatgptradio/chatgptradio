<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>ChatGPT Radio — Visualizer DEV</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap">
  <style>
    /* ── DEV PREVIEW — direction artistique OpenAI/ChatGPT ──────────────────── */
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d0d0d; overflow:hidden; font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }
    canvas { display:block; }
    #vignette {
      position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:1;
      background:radial-gradient(ellipse at 50% 50%, transparent 38%, rgba(0,0,0,0.54) 100%);
    }
    #hud { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:2; }

    /* ── Drift panel (bottom-left) ───────────────────────────────────────────── */
    #drift {
      position:absolute; bottom:24px; left:24px;
      color:#ececf1; font-size:12px; line-height:1.75; letter-spacing:0.02em;
      background:linear-gradient(135deg,rgba(255,255,255,0.08) 0%,rgba(255,255,255,0.03) 100%);
      backdrop-filter:blur(20px) saturate(180%); -webkit-backdrop-filter:blur(20px) saturate(180%);
      border:1px solid rgba(255,255,255,0.12); border-radius:10px; padding:10px 14px;
      box-shadow:inset 0 1px 0 rgba(255,255,255,0.08),0 8px 32px rgba(0,0,0,0.24);
    }

    /* ── Track info — intégré dans le drift panel ───────────────────────────── */
    #drift-track {
      padding-bottom:8px; margin-bottom:8px;
      border-bottom:1px solid rgba(255,255,255,0.06);
    }
    #drift-track-name {
      color:#ececf1; font-size:12px; line-height:1.6; margin-bottom:6px;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:220px;
    }
    #track-progress-wrap {
      width:100%; height:2px; background:rgba(255,255,255,0.10);
      border-radius:2px; overflow:hidden;
    }
    #track-progress-bar { height:100%; width:0%; background:#10A37F; transition:width 0.3s ease; }

    /* ── Sources panel (top-right) — accordéon 2min/15min ───────────────────── */
    #sources {
      position:absolute; top:24px; right:24px;
      color:#c4c7cc; font-size:11px; letter-spacing:0.03em;
      background:linear-gradient(135deg,rgba(255,255,255,0.08) 0%,rgba(255,255,255,0.03) 100%);
      backdrop-filter:blur(20px) saturate(180%); -webkit-backdrop-filter:blur(20px) saturate(180%);
      border:1px solid rgba(255,255,255,0.12); border-radius:10px;
      box-shadow:inset 0 1px 0 rgba(255,255,255,0.08),0 8px 32px rgba(0,0,0,0.24);
      overflow:hidden; min-width:130px;
    }
    #sources-summary {
      display:flex; align-items:center; justify-content:flex-end; gap:7px;
      padding:8px 14px; line-height:1;
    }
    #sources-detail {
      max-height:0; overflow:hidden;
      transition:max-height 0.55s ease, padding 0.45s ease;
      padding:0 14px; text-align:right; line-height:1.8;
      border-top:0px solid rgba(255,255,255,0.06);
    }
    #sources.expanded #sources-detail {
      max-height:400px; padding:6px 14px 10px;
      border-top:1px solid rgba(255,255,255,0.06);
    }

    /* ── Shared CSS dot for health indicators ────────────────────────────────── */
    .status-dot {
      display:inline-block; width:6px; height:6px; border-radius:50%;
      flex-shrink:0; vertical-align:middle; position:relative; top:-1px;
    }
    .dot-ok   { background:#10A37F; }
    .dot-warn { background:#d97706; }
    .dot-err  { background:#ef4444; }
    .dot-live { background:#d97706; }
    .dot-off  { background:#4b5563; }
    @keyframes health-pulse {
      0%,100% { box-shadow:0 0 0 0 rgba(16,163,127,0.5); }
      50%      { box-shadow:0 0 0 3px rgba(16,163,127,0); }
    }
    .dot-pulse { animation:health-pulse 2.8s ease-in-out infinite; }

    /* ── Journal (bottom-right) — ChatGPT thinking UI ───────────────────────── */
    #journal {
      position:absolute; bottom:24px; right:24px;
      max-width:172px; /* collapsed: juste le header */
      overflow:hidden;
      transition:max-width 0.45s cubic-bezier(0.4,0,0.2,1);
      background:linear-gradient(135deg,rgba(255,255,255,0.08) 0%,rgba(255,255,255,0.03) 100%);
      backdrop-filter:blur(20px) saturate(180%); -webkit-backdrop-filter:blur(20px) saturate(180%);
      border:1px solid rgba(255,255,255,0.12);
      border-left:2px solid #10A37F;
      border-radius:10px;
      box-shadow:inset 0 1px 0 rgba(255,255,255,0.08),0 8px 32px rgba(0,0,0,0.24);
    }
    #journal.expanded { max-width:360px; }
    #journal-header {
      display:flex; align-items:center; gap:8px;
      padding:10px 14px 10px;
      border-bottom:1px solid transparent;
      transition:border-bottom-color 0.35s ease;
    }
    #journal.expanded #journal-header { border-bottom-color:rgba(255,255,255,0.06); }
    .think-dots { display:flex; align-items:center; gap:3px; }
    .think-dots span {
      display:inline-block; width:4px; height:4px; border-radius:50%;
      background:#10A37F;
      animation:think-dot 1.4s ease-in-out infinite;
    }
    .think-dots span:nth-child(2) { animation-delay:0.2s; }
    .think-dots span:nth-child(3) { animation-delay:0.4s; }
    @keyframes think-dot {
      0%,80%,100% { transform:translateY(0); opacity:0.3; }
      40% { transform:translateY(-3px); opacity:1; }
    }
    #journal-think-label {
      font-size:11px; font-weight:500; color:#c4c7cc; letter-spacing:0.05em;
      white-space:nowrap;
    }
    /* Corps caché par défaut — expand sur nouveau message journal */
    #journal-body {
      max-height:0; overflow:hidden; padding:0 14px;
      color:#c4c7cc; font-size:11px; line-height:1.65; letter-spacing:0.02em;
      transition:max-height 0.5s ease, padding 0.4s ease;
    }
    #journal.expanded #journal-body {
      max-height:160px; padding:8px 14px 12px;
      mask-image:linear-gradient(to top, black 70%, transparent 100%);
      -webkit-mask-image:linear-gradient(to top, black 70%, transparent 100%);
    }
    #journal-body::after {
      content:'▋'; color:#10A37F; margin-left:2px;
      animation:cursor-blink 1s step-end infinite;
      opacity:0; transition:opacity 0.3s ease;
    }
    #journal.expanded #journal-body::after { opacity:1; }
    @keyframes cursor-blink { 50% { opacity:0; } }

    /* ── ON AIR badge ────────────────────────────────────────────────────────── */
    #on-air {
      position:absolute; top:0; left:0;
      padding:7px 16px 7px 12px;
      background:rgba(24,4,4,0.68);
      backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
      border-right:1px solid rgba(255,34,34,0.18);
      border-bottom:1px solid rgba(255,34,34,0.18);
      box-shadow:0 2px 20px rgba(255,34,34,0.10), inset 0 1px 0 rgba(255,255,255,0.06);
      border-radius:0 0 10px 0; display:flex; align-items:center; gap:8px;
    }
    #on-air-dot {
      width:7px; height:7px; background:#ff2222; border-radius:50%;
      box-shadow:0 0 6px #ff222299;
      animation:on-air-pulse 2s ease-in-out infinite; flex-shrink:0;
    }
    #on-air-label {
      font-size:10px; font-weight:500; letter-spacing:0.12em;
      text-transform:uppercase; color:#ececf1;
    }
    #on-air-uptime {
      font-size:10px; color:#6b7280;
      font-family:'JetBrains Mono',monospace; letter-spacing:0.05em;
    }
    @keyframes on-air-pulse {
      0%,100%{opacity:1;box-shadow:0 0 6px #ff222299}
      50%{opacity:0.25;box-shadow:0 0 2px #ff222233}
    }

    /* ── Status panel (top-left) — glassmorphism OpenAI ─────────────────────── */
    #status-panel {
      position:absolute; top:40px; left:24px;
      background:linear-gradient(135deg,rgba(255,255,255,0.08) 0%,rgba(255,255,255,0.03) 100%);
      backdrop-filter:blur(20px) saturate(180%); -webkit-backdrop-filter:blur(20px) saturate(180%);
      border:1px solid rgba(255,255,255,0.12); border-radius:10px;
      box-shadow:inset 0 1px 0 rgba(255,255,255,0.08),0 8px 32px rgba(0,0,0,0.24);
      padding:8px 12px; display:flex; flex-direction:column; gap:4px;
      min-width:130px;
    }
    #mode-indicator {
      font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      font-size:11px; font-weight:500; letter-spacing:0.12em; text-transform:uppercase;
      color:#c4c7cc; display:flex; align-items:center; gap:6px;
    }
    #mode-indicator::before {
      content:''; display:inline-block; width:5px; height:5px;
      border-radius:50%; background:#10A37F; flex-shrink:0;
    }
    #ws-status  { font-size:10px; color:#9aa0a6; letter-spacing:0.04em; }
    #ws-status.connected  { color:#10A37F; }
    #ws-status.restarting { color:#d97706; }
    #chat-status { font-size:10px; color:#9aa0a6; letter-spacing:0.03em; }
    #chat-status.live { color:#d97706; }
    #reddit-status { display:none; }

    /* ── Event banner ────────────────────────────────────────────────────────── */
    #event-banner {
      position:absolute; top:24px; left:50%; transform:translateX(-50%);
      text-align:center; white-space:nowrap;
      background:linear-gradient(135deg,rgba(255,255,255,0.08) 0%,rgba(255,255,255,0.03) 100%);
      backdrop-filter:blur(20px) saturate(180%); -webkit-backdrop-filter:blur(20px) saturate(180%);
      border:1px solid rgba(16,163,127,0.40);
      box-shadow:inset 0 1px 0 rgba(255,255,255,0.10), 0 8px 32px rgba(0,0,0,0.36), 0 0 20px rgba(16,163,127,0.12);
      border-radius:12px; padding:12px 28px 14px;
      opacity:0; transition:opacity 1.8s ease; pointer-events:none;
      will-change:opacity;
    }
    #event-label-above {
      font-size:10px; font-weight:400; color:#9aa0a6;
      letter-spacing:0.14em; text-transform:uppercase; margin-bottom:6px;
    }
    #event-label-main {
      font-size:20px; font-weight:600; color:#ececf1;
      letter-spacing:0.18em; text-transform:uppercase;
    }

    /* ── Viewer command — glassmorphism pill (center-bottom) ─────────────────── */
    #viewer-cmd {
      position:absolute; bottom:28px; left:50%; transform:translateX(-50%);
      font-size:11px; color:#ececf1; letter-spacing:0.03em; white-space:nowrap;
      background:linear-gradient(135deg,rgba(255,255,255,0.08) 0%,rgba(255,255,255,0.03) 100%);
      backdrop-filter:blur(20px) saturate(180%); -webkit-backdrop-filter:blur(20px) saturate(180%);
      border:1px solid rgba(255,255,255,0.12);
      box-shadow:inset 0 1px 0 rgba(255,255,255,0.08),0 4px 20px rgba(0,0,0,0.24);
      border-radius:20px; padding:5px 12px 5px 10px;
      display:flex; align-items:center; gap:7px;
      opacity:0; transition:opacity 0.5s ease;
    }
    #viewer-cmd::before {
      content:''; display:inline-block; width:5px; height:5px;
      border-radius:50%; background:#ab68ff; flex-shrink:0;
    }
    #viewer-cmd.active { opacity:1; }

    /* ── Emotion Wheel panel (bottom-left, drop-in) ──────────────────────────── */
    #emotion-wheel {
      position:absolute; bottom:178px; left:24px;
      background:linear-gradient(135deg,rgba(255,255,255,0.08) 0%,rgba(255,255,255,0.03) 100%);
      backdrop-filter:blur(20px) saturate(180%); -webkit-backdrop-filter:blur(20px) saturate(180%);
      border:1px solid rgba(255,255,255,0.12); border-radius:10px;
      box-shadow:inset 0 1px 0 rgba(255,255,255,0.08),0 8px 32px rgba(0,0,0,0.24);
      padding:10px 14px 8px;
      transform:translateX(calc(-100% - 32px));
      opacity:0;
      transition:transform 0.65s cubic-bezier(0.22,1,0.36,1), opacity 0.45s ease;
      pointer-events:none;
    }
    #emotion-wheel.visible { transform:translateX(0); opacity:1; }
    /* ── Drift progress bars ─────────────────────────────────────────────────── */
    .drift-bar-row { display:flex; align-items:center; gap:8px; margin-bottom:4px; }
    .drift-bar-label { font-size:9px; font-weight:500; letter-spacing:0.07em; text-transform:uppercase; color:#9aa0a6; min-width:36px; flex-shrink:0; }
    .drift-bar-track { flex:1; height:2px; background:rgba(255,255,255,0.08); border-radius:2px; overflow:hidden; }
    .drift-bar-fill { display:block; height:100%; border-radius:2px; }
    .drift-bar-val { font-family:'JetBrains Mono',monospace; font-size:9px; min-width:26px; text-align:right; flex-shrink:0; }

    /* ── Mono utility — valeurs numériques JetBrains Mono ───────────────────── */
    .mono { font-family:'JetBrains Mono',monospace; }

    #fade { position:fixed; top:0; left:0; width:100%; height:100%; background:#000; pointer-events:none; opacity:0; transition:opacity 1.5s; z-index:10; }
    @keyframes blink { 50% { opacity:0; } }

    /* ── OpenAI News panel (top-left, drop-in from left every 5min) ─────────── */
    #news {
      position:absolute; top:130px; left:24px;
      background:linear-gradient(135deg,rgba(255,255,255,0.08) 0%,rgba(255,255,255,0.03) 100%);
      backdrop-filter:blur(20px) saturate(180%); -webkit-backdrop-filter:blur(20px) saturate(180%);
      border:1px solid rgba(255,255,255,0.12); border-radius:10px;
      box-shadow:inset 0 1px 0 rgba(255,255,255,0.08),0 8px 32px rgba(0,0,0,0.24);
      min-width:200px; max-width:240px;
      transform:translateX(calc(-100% - 32px));
      opacity:0;
      transition:transform 0.65s cubic-bezier(0.22,1,0.36,1), opacity 0.45s ease;
      pointer-events:none;
    }
    #news.visible { transform:translateX(0); opacity:1; }
    #news-summary {
      display:flex; align-items:center; gap:7px;
      padding:8px 14px 6px; line-height:1;
      font-size:10px; font-weight:500; color:#c4c7cc; letter-spacing:0.06em;
      border-bottom:1px solid rgba(255,255,255,0.06);
    }
    #news-summary::before {
      content:''; display:inline-block; width:4px; height:4px;
      border-radius:50%; background:#10a37f; flex-shrink:0;
    }
    #news-age { color:#9aa0a6; font-size:9px; margin-left:auto; }
    #news-detail { padding:6px 14px 10px; }
    .news-item {
      display:flex; gap:8px; align-items:flex-start;
      padding:5px 0; border-bottom:1px solid rgba(255,255,255,0.04);
    }
    .news-item:last-child { border-bottom:none; }
    .news-thumb {
      width:34px; height:34px; border-radius:5px; object-fit:cover; flex-shrink:0;
      background:linear-gradient(135deg,#1a1a2e,#0d3342);
    }
    .news-text { flex:1; min-width:0; }
    .news-title {
      font-size:10px; color:#ececf1; line-height:1.4;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .news-date { font-size:9px; color:#9aa0a6; margin-top:2px; }
  </style>
</head>

<div id="hud">
  <div id="on-air"><div id="on-air-dot"></div><span id="on-air-label">ON AIR</span><span id="on-air-uptime"></span></div>
  <div id="status-panel">
    <div id="mode-indicator">neural</div>
    <div id="ws-status"></div>
    <div id="chat-status"></div>
    <div id="reddit-status"></div>
  </div>
  <div id="news">
    <div id="news-summary">
      <span>OpenAI Latest News</span>
      <span id="news-age"></span>
    </div>
    <div id="news-detail"></div>
  </div>

  <div id="drift"><div id="drift-track" style="display:none"><div id="drift-track-name"></div><div id="track-progress-wrap"><div id="track-progress-bar"></div></div></div><div id="drift-signals"></div></div>
  <div id="viewer-cmd"></div>
  <div id="sources"><div id="sources-summary"><span id="sources-count"></span><span id="sources-dot" class="status-dot"></span></div><div id="sources-detail"></div></div>
  <div id="journal"><div id="journal-header"><div class="think-dots"><span></span><span></span><span></span></div><span id="journal-think-label">thinking</span></div><div id="journal-body"></div></div>
</div>

<script type="importmap">

    "three":"https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { mergeGeometries } from 'three/addons/utils/BufferGeometryUtils.js';

// ── Setup Three.js ────────────────────────────────────────────────────────────

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);
const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 500);
camera.position.set(0, 0, 22);
const renderer = new THREE.WebGLRenderer({antialias:false, powerPreference:'high-performance'});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(1.0);
renderer.debug.checkShaderErrors = false;  // disable runtime GLSL validation — ~5% CPU saving
document.body.prepend(renderer.domElement);
scene.add(new THREE.AmbientLight(0x223344, 3.5));
const fill = new THREE.PointLight(0x00D4FF, 5, 80);
fill.position.set(0,0,15);
scene.add(fill);
const clock = new THREE.Clock();

// ── Mode NEURAL — graphe de computation réel (@node registry) ───────────────────
// Topologie = le vrai pipeline Python. Correspondance 1-to-1 avec le code.
// Source: WebSocket msg.nodes (get_registry()), aucune simulation.

const _NN_NODE_VS = `
attribute float nodeSize;
attribute vec3  nodeColor;
attribute float significance;
attribute float nodeFireFlash;
uniform   float uTime;
uniform   float uBaseSize;
uniform   float uBPM;
uniform   float uPulseTime;
uniform   vec3  uPulsePos;
uniform   float uPulseSpeed;
varying   vec3  vColor;
varying   float vSig;
varying   vec3  vWorldPos;
varying   float vPulse;
varying   float vFlash;
void main(){
  vColor=nodeColor; vSig=significance; vFlash=nodeFireFlash;
  vWorldPos=(modelMatrix*vec4(position,1.0)).xyz;
  float beat=1.0+significance*0.15*sin(uTime*uBPM+position.x);
  float scale=nodeSize*beat*max(0.5,1.0+significance*0.8)*(1.0+nodeFireFlash*0.7);
  vPulse=0.0;
  float timeSince=uTime-uPulseTime;
  if(timeSince>=0.0&&timeSince<4.0){
    float pRadius=timeSince*uPulseSpeed;
    float d=distance(vWorldPos,uPulsePos);
    vPulse=smoothstep(2.0,0.0,abs(d-pRadius))*smoothstep(4.0,0.0,timeSince);
    scale*=(1.0+vPulse*1.2);
  }
  vec4 mv=modelViewMatrix*vec4(position,1.0);
  gl_PointSize=scale*uBaseSize*(700.0/-mv.z);
  gl_Position=projectionMatrix*mv;
}`;
const _NN_NODE_FS = `
uniform float uTime;
varying vec3 vColor; varying float vSig; varying vec3 vWorldPos; varying float vPulse; varying float vFlash;
void main(){
  vec2 c=2.0*gl_PointCoord-1.0; float d=length(c); if(d>1.0)discard;
  float g=pow(1.0-smoothstep(0.0,1.0,d),1.6);
  float ring=smoothstep(0.55,0.65,d)*smoothstep(0.9,0.65,d)*vSig;
  vec3 col=vColor*(0.9+0.3*sin(uTime*0.6+d*3.0)*min(1.0,vSig*2.0));
  col=mix(col,vec3(1.0),vSig*0.35*g)+vec3(1.0)*ring*0.6;
  if(vPulse>0.0)col=mix(col,vec3(1.0),vPulse*0.55);
  col=mix(col,vec3(0.7,1.0,1.9),vFlash*0.85);
  // Flash ring — anneau qui s'allume quand un paquet arrive (porteur conditionnel: vFlash>0)
  float flashRing=smoothstep(0.68,0.73,d)*smoothstep(0.93,0.79,d)*vFlash;
  col=mix(col,vec3(0.4,0.90,1.8),flashRing*0.90);
  float alpha=g*(1.1-0.35*d)*smoothstep(90.0,8.0,length(vWorldPos-cameraPosition));
  gl_FragColor=vec4(col,alpha*(1.0+vPulse*0.4+vFlash*0.25)+flashRing*vFlash*0.65);
}`;
const _NN_CONN_VS = `
attribute vec3 startPt; attribute vec3 endPt; attribute float connStr;
attribute float pathIdx; attribute vec3 connColor;
attribute float pulseFront; attribute float pulseActV;
attribute float side;
uniform float uTime; uniform float uPulseTime; uniform vec3 uPulsePos; uniform float uPulseSpeed;
uniform float uLineWidth; uniform vec2 uResolution;
varying vec3 vColor; varying float vStr; varying float vT; varying float vPulse;
varying float vPF; varying float vPA; varying float vSide;
void main(){
  float t=position.x; vT=t; vColor=connColor; vStr=connStr; vPF=pulseFront; vPA=pulseActV; vSide=side;
  vec3 edgeDir=normalize(endPt-startPt);
  vec3 _up=abs(edgeDir.y)<0.9?vec3(0.0,1.0,0.0):vec3(1.0,0.0,0.0);
  vec3 perp=normalize(cross(edgeDir,_up));
  vec3 midBase=mix(startPt,endPt,0.5);
  vec3 mid=midBase+perp*sin(t*3.14159)*0.15;
  vec3 pos=mix(mix(startPt,mid,t),mix(mid,endPt,t),t);
  vec3 worldPos=(modelMatrix*vec4(pos,1.0)).xyz;
  vPulse=0.0;
  float timeSince=uTime-uPulseTime;
  if(timeSince>=0.0&&timeSince<4.0){
    float pRadius=timeSince*uPulseSpeed;
    float dd=distance(worldPos,uPulsePos);
    vPulse=smoothstep(2.0,0.0,abs(dd-pRadius))*smoothstep(4.0,0.0,timeSince);
  }
  float tN=clamp(t+1.0/12.0,0.0,1.0);
  vec3 midN=midBase+perp*sin(tN*3.14159)*0.15;
  vec3 posN=mix(mix(startPt,midN,tN),mix(midN,endPt,tN),tN);
  vec4 clip=projectionMatrix*modelViewMatrix*vec4(pos,1.0);
  vec4 clipN=projectionMatrix*modelViewMatrix*vec4(posN,1.0);
  vec2 screenDir=normalize((clipN.xy/clipN.w-clip.xy/clip.w)*uResolution);
  vec2 screenNorm=vec2(-screenDir.y,screenDir.x);
  clip.xy+=screenNorm*(uLineWidth/uResolution.y)*side*clip.w;
  gl_Position=clip;
}`;
const _NN_CONN_FS = `
uniform float uTime;
uniform float uFlowSpeed;
varying vec3 vColor; varying float vStr; varying float vT; varying float vPulse;
varying float vPF; varying float vPA; varying float vSide;
void main(){
  float flow=uFlowSpeed>0.0?(sin(vT*18.0-uTime*uFlowSpeed)*0.5+0.5):0.0;
  vec3 col=vColor*(0.90+0.35*flow*vStr)*(1.0+smoothstep(0.3,0.7,flow)*vStr*0.5);
  if(vPulse>0.0)col=mix(col,vec3(1.0),vPulse*0.5);
  // Paquet primaire
  float env=sin(vPF*3.14159)*vPA;
  float pCore=smoothstep(0.06,0.0,abs(vT-vPF))*env;
  float pHalo=smoothstep(0.26,0.06,abs(vT-vPF))*env*0.42;
  // Traîne derrière le paquet (porteur conditionnel: vPA)
  float wakeD=clamp(vPF-vT,0.0,0.18);
  float wake=wakeD*(1.0/0.18)*vPA*0.28;
  // Second paquet — décalé de 0.5 phase, visible seulement si arête très active (porteur conditionnel)
  float pF2=fract(vPF+0.5);
  float env2=sin(pF2*3.14159)*max(0.0,(vPA-0.38)*2.6);
  float pCore2=smoothstep(0.06,0.0,abs(vT-pF2))*env2;
  float pHalo2=smoothstep(0.22,0.06,abs(vT-pF2))*env2*0.32;
  col=mix(col,vec3(0.5,0.85,1.8),pCore*1.20+pHalo*0.65+pCore2*0.80+pHalo2*0.40);
  float alpha=(max(0.32,0.80*vStr)+0.25*flow+vPulse*0.3+pCore*0.90+pHalo*0.55+wake+pCore2*0.62+pHalo2*0.35)*smoothstep(0.0,0.06,vT)*smoothstep(1.0,0.94,vT);
  float tube=pow(max(0.0,1.0-abs(vSide)),0.40);
  col*=(0.80+tube*0.70);
  alpha=alpha*(0.25+tube);
  gl_FragColor=vec4(col,alpha);
}`;

// A2 — palette par territoire (teinte dominante, mélangée à 35% avec couleur structurelle du nœud)
const _NN_TERRITORY_COLORS = {
  ambient:     new THREE.Color(0x00D4FF), // cyan
  chaos:       new THREE.Color(0xFF3333), // rouge
  euphoric:    new THREE.Color(0xFFD700), // or
  tense:       new THREE.Color(0x9B59B6), // violet
  melancholic: new THREE.Color(0x4A6FA5), // bleu-gris
  wonder:      new THREE.Color(0xFFF0CC), // blanc chaud
};

class NeuralMode {
  constructor(){
    this._nMesh=null; this._cMesh=null; this._starField=null;
    this._controls=null;
    this._nodeData=[]; this._built=false; this._clock=new THREE.Clock(); this._clock.start();
    this._lastSig=0; this._lastPulse=0; this._sprites=[];
    this._bgColor=new THREE.Color(0,0,0);
    this._nodeColorAttr=null;
    this._connStrAttr=null; this._connStrData=null; this._edges=null;
    this._pulseT=null; this._pulsePrevT=null;
    this._pfData=null; this._pfAttr=null; this._paData=null; this._paAttr=null;
    this._nodeFireFlashData=null; this._nodeFireFlashAttr=null;
  }

  init(sc, cam){
    this._cam=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,0.1,600);
    this._cam.position.set(0,4,18);
    this._controls=new OrbitControls(this._cam, renderer.domElement);
    Object.assign(this._controls,{enableDamping:true,dampingFactor:0.05,autoRotate:true,autoRotateSpeed:0.5,enablePan:false,enableZoom:false,enableRotate:false});
    // Stars
    const N=1500,pos=[];for(let i=0;i<N;i++){const r=THREE.MathUtils.randFloat(50,150),phi=Math.acos(THREE.MathUtils.randFloatSpread(2)),theta=THREE.MathUtils.randFloat(0,Math.PI*2);pos.push(r*Math.sin(phi)*Math.cos(theta),r*Math.sin(phi)*Math.sin(theta),r*Math.cos(phi));}
    const sg=new THREE.BufferGeometry();sg.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
    this._starField=new THREE.Points(sg,new THREE.PointsMaterial({color:0xffffff,size:0.12,depthWrite:false,opacity:0.7,transparent:true}));sc.add(this._starField);
    // Build immediately if nodes already received from WebSocket
    if(liveNodes.length > 0) this._build(sc, liveNodes);
  }

  _build(sc, nodes){
    if(this._nMesh){sc.remove(this._nMesh);this._nMesh.geometry.dispose();this._nMesh.material.dispose();this._nMesh=null;}
    if(this._cMesh){sc.remove(this._cMesh);this._cMesh.geometry.dispose();this._cMesh.material.dispose();this._cMesh=null;}
    this._sprites.forEach(s=>sc.remove(s)); this._sprites=[];
    this._nodeData=[];
    this._nodeColorAttr=null; this._connStrAttr=null; this._connStrData=null; this._edges=null;

    const collectors=nodes.filter(n=>n.name!=='music_prompt');
    const builder=nodes.find(n=>n.name==='music_prompt');
    const R=12;
    collectors.forEach((nd,i)=>{
      const golden=(1+Math.sqrt(5))/2,theta=2*Math.PI*i/golden,phi=Math.acos(1-2*(i+0.5)/collectors.length);
      this._nodeData.push({nd,pos:new THREE.Vector3(R*Math.sin(phi)*Math.cos(theta),R*Math.sin(phi)*Math.sin(theta),R*Math.cos(phi)),produces:nd.produces,color:new THREE.Color(nd.color||'#00D4FF'),label:nd.label||nd.name,reads:nd.reads||[],size:0.9,sig:0.0});
    });
    if(builder) this._nodeData.push({nd:builder,pos:new THREE.Vector3(0,0,0),produces:builder.produces,color:new THREE.Color(builder.color||'#00D4FF'),label:builder.label||builder.name,reads:builder.reads||[],size:1.6,sig:0.0});

    const produceMap={};
    this._nodeData.forEach(n=>{
      const keys=Array.isArray(n.produces)?n.produces:[n.produces];
      keys.forEach(k=>{produceMap[k]=n;});
    });
    const edges=[];
    this._nodeData.forEach(n=>{
      const isBuilder=Array.isArray(n.produces)?n.produces.includes('music_prompt'):n.produces==='music_prompt';
      if(!isBuilder&&builder){const mp=this._nodeData.find(d=>(Array.isArray(d.produces)?d.produces.includes('music_prompt'):d.produces==='music_prompt'));if(mp)edges.push({from:n,to:mp,str:0.7});}
      (n.reads||[]).forEach(f=>{const p=produceMap[f];if(p&&p!==n)edges.push({from:p,to:n,str:1.0});});
    });

    // Node geometry
    const nPos=[],nSz=[],nColData=[],nSig=[];
    this._nodeData.forEach(n=>{
      nPos.push(n.pos.x,n.pos.y,n.pos.z); nSz.push(n.size);
      nColData.push(n.color.r,n.color.g,n.color.b); nSig.push(0);
      n.currentColor=n.color.clone(); // A2 : couleur interpolée vers territoire
    });
    const ng=new THREE.BufferGeometry();
    ng.setAttribute('position',new THREE.Float32BufferAttribute(nPos,3));
    ng.setAttribute('nodeSize',new THREE.Float32BufferAttribute(nSz,1));
    const ncAttr=new THREE.Float32BufferAttribute(new Float32Array(nColData),3);
    ncAttr.setUsage(THREE.DynamicDrawUsage);
    ng.setAttribute('nodeColor',ncAttr); this._nodeColorAttr=ncAttr;
    const sigAttr=new THREE.Float32BufferAttribute(nSig,1); sigAttr.setUsage(THREE.DynamicDrawUsage);
    ng.setAttribute('significance',sigAttr);
    const nffData=new Float32Array(this._nodeData.length);
    const nffAttr=new THREE.Float32BufferAttribute(nffData,1); nffAttr.setUsage(THREE.DynamicDrawUsage);
    ng.setAttribute('nodeFireFlash',nffAttr);
    this._nodeFireFlashData=nffData; this._nodeFireFlashAttr=nffAttr;
    const nm=new THREE.ShaderMaterial({uniforms:{
      uTime:{value:0},uBaseSize:{value:1.8},
      uBPM:{value:9.42}, // A3 : 90 BPM défaut
      uPulseTime:{value:-100},uPulsePos:{value:new THREE.Vector3()},uPulseSpeed:{value:8} // A4
    },vertexShader:_NN_NODE_VS,fragmentShader:_NN_NODE_FS,transparent:true,depthWrite:false,blending:THREE.AdditiveBlending});
    this._nMesh=new THREE.Points(ng,nm);sc.add(this._nMesh);

    // Connection geometry — billboard quads (two vertices per sample point: side=-1/+1)
    if(edges.length){
      const SEG=12;
      const csData=new Float32Array(edges.length*SEG*2);
      const cPos=[],sp=[],ep=[],ci=[],cc=[],sd=[];
      edges.forEach((e,pi)=>{
        for(let i=0;i<SEG;i++){
          const t=i/(SEG-1);
          for(const sk of [-1,1]){
            cPos.push(t,0,0);
            sp.push(e.from.pos.x,e.from.pos.y,e.from.pos.z);
            ep.push(e.to.pos.x,e.to.pos.y,e.to.pos.z);
            csData[pi*SEG*2+i*2+(sk<0?0:1)]=e.str;
            ci.push(pi);
            const c=e.from.color.clone().lerp(e.to.color,0.5);
            cc.push(c.r,c.g,c.b);
            sd.push(sk);
          }
        }
      });
      const cg=new THREE.BufferGeometry();
      cg.setAttribute('position',new THREE.Float32BufferAttribute(cPos,3));
      cg.setAttribute('startPt',new THREE.Float32BufferAttribute(sp,3));
      cg.setAttribute('endPt',new THREE.Float32BufferAttribute(ep,3));
      cg.setAttribute('side',new THREE.Float32BufferAttribute(sd,1));
      const csAttr=new THREE.BufferAttribute(csData,1); csAttr.setUsage(THREE.DynamicDrawUsage);
      cg.setAttribute('connStr',csAttr);
      this._connStrAttr=csAttr; this._connStrData=csData; this._edges=edges;
      const E=edges.length;
      const pfData=new Float32Array(E*SEG*2),paData=new Float32Array(E*SEG*2);
      const pfAttr=new THREE.BufferAttribute(pfData,1); pfAttr.setUsage(THREE.DynamicDrawUsage);
      const paAttr=new THREE.BufferAttribute(paData,1); paAttr.setUsage(THREE.DynamicDrawUsage);
      cg.setAttribute('pulseFront',pfAttr); cg.setAttribute('pulseActV',paAttr);
      this._pfData=pfData; this._pfAttr=pfAttr; this._paData=paData; this._paAttr=paAttr;
      this._pulseT=new Float32Array(E).map((_,i)=>i/E);
      this._pulsePrevT=new Float32Array(E);
      edges.forEach((e,ei)=>{ e.toIdx=this._nodeData.indexOf(e.to); });
      cg.setAttribute('pathIdx',new THREE.Float32BufferAttribute(ci,1));
      cg.setAttribute('connColor',new THREE.Float32BufferAttribute(cc,3));
      const idx=[];
      edges.forEach((_,ei)=>{
        for(let s=0;s<SEG-1;s++){
          const l0=2*(ei*SEG+s),r0=l0+1,l1=2*(ei*SEG+s+1),r1=l1+1;
          idx.push(l0,r0,l1,r0,r1,l1);
        }
      });
      cg.setIndex(idx);
      const cm=new THREE.ShaderMaterial({uniforms:{
        uTime:{value:0},uFlowSpeed:{value:0},
        uPulseTime:{value:-100},uPulsePos:{value:new THREE.Vector3()},uPulseSpeed:{value:8},
        uLineWidth:{value:5.5},uResolution:{value:new THREE.Vector2(innerWidth,innerHeight)}
      },vertexShader:_NN_CONN_VS,fragmentShader:_NN_CONN_FS,transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,side:THREE.DoubleSide});
      this._cMesh=new THREE.Mesh(cg,cm);sc.add(this._cMesh);
    }

    // Labels
    this._nodeData.forEach(n=>{
      const cv=document.createElement('canvas');cv.width=300;cv.height=44;
      const ctx=cv.getContext('2d');ctx.fillStyle=`#${n.color.getHexString()}`;
      ctx.font='600 17px Inter,Courier New';ctx.fillText(n.label,4,32);
      const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(cv),transparent:true,opacity:0.7,depthWrite:false}));
      sp.scale.set(3.0,0.44,1);sp.position.copy(n.pos).addScaledVector(n.pos.length()>0?n.pos.clone().normalize():new THREE.Vector3(0,1,0),1.3);
      sc.add(sp);this._sprites.push(sp);n.sprite=sp;
    });
    this._built=true;
  }

  _updateSig(state){
    if(!this._nMesh||!this._nodeData.length)return;
    const pe=state.prediction_errors||{},vol=state.signal_volatilities||{},sh=state.source_health||{};
    const dw=state.drift_weights||{},territory=state.drift_territory||'ambient';
    const weights=dw[territory]||{};
    const tCol=_NN_TERRITORY_COLORS[territory]||_NN_TERRITORY_COLORS.ambient; // A2
    const sigAttr=this._nMesh.geometry.attributes.significance;

    this._nodeData.forEach((n,i)=>{
      // Significance (PE/σ) — take max across all produced keys
      const pkeys=Array.isArray(n.produces)?n.produces:[n.produces];
      let maxRaw=0;pkeys.forEach(k=>{const e2=Math.abs(pe[k]||0),v2=Math.max(vol[k]||0.1,0.001);maxRaw=Math.max(maxRaw,e2/v2);});
      let sig=Math.min(maxRaw,3.0)/3.0;
      if(sh[n.nd.name]===false)sig*=0.15;
      n.sig=sig; sigAttr.setX(i,sig);
      // A2 — lerp couleur vers teinte territoire (65% base + 35% territoire)
      if(this._nodeColorAttr&&n.currentColor){
        const target=n.color.clone().lerp(tCol,0.35);
        n.currentColor.lerp(target,0.08);
        this._nodeColorAttr.setXYZ(i,n.currentColor.r,n.currentColor.g,n.currentColor.b);
      }
    });
    sigAttr.needsUpdate=true;
    if(this._nodeColorAttr)this._nodeColorAttr.needsUpdate=true;

    // A1 — drift_weights → connStr : arête collector→builder pondérée par territoire
    if(this._connStrAttr&&this._edges){
      const SEG=12;
      this._edges.forEach((e,ei)=>{
        const fromKey=Array.isArray(e.from.produces)?e.from.produces[0]:e.from.produces;
        const toIsBuilder=Array.isArray(e.to.produces)?e.to.produces.includes('music_prompt'):e.to.produces==='music_prompt';
        const cs=toIsBuilder
          ?Math.max(0.15,Math.min(1.0,weights[fromKey]||0)) // floor 0.15 : visibilité structurelle
          :0.3+e.from.sig*0.7; // arête reads : intensité liée à la surprise de la source
        for(let s=0;s<SEG;s++){this._connStrData[ei*SEG*2+s*2]=cs;this._connStrData[ei*SEG*2+s*2+1]=cs;}
      });
      this._connStrAttr.needsUpdate=true;
    }

    // A4 — anomaly_score → onde de choc depuis le nœud le plus surpris (cooldown 8s)
    const anomaly=state.anomaly_score||0;
    const t=this._clock.getElapsedTime();
    if(anomaly>0.6&&t-this._lastPulse>8){
      let maxSig=0,pulseNode=null;
      this._nodeData.forEach(n=>{if(n.sig>maxSig){maxSig=n.sig;pulseNode=n;}});
      if(pulseNode){
        this._lastPulse=t;
        const speed=6+anomaly*4;
        if(this._nMesh){
          this._nMesh.material.uniforms.uPulseTime.value=t;
          this._nMesh.material.uniforms.uPulsePos.value.copy(pulseNode.pos);
          this._nMesh.material.uniforms.uPulseSpeed.value=speed;
        }
        if(this._cMesh){
          this._cMesh.material.uniforms.uPulseTime.value=t;
          this._cMesh.material.uniforms.uPulsePos.value.copy(pulseNode.pos);
          this._cMesh.material.uniforms.uPulseSpeed.value=speed;
        }
      }
    }
  }

  update(state, dt){
    const t=this._clock.getElapsedTime();
    // Build on first call with real nodes
    if(!this._built&&liveNodes.length>0) this._build(scene,liveNodes);
    if(this._nMesh){
      this._nMesh.material.uniforms.uTime.value=t;
      this._nMesh.material.uniforms.uBPM.value=(state.drift_bpm||90)/60*6.28318; // A3
    }
    if(this._cMesh){
      this._cMesh.material.uniforms.uTime.value=t;
      this._cMesh.material.uniforms.uFlowSpeed.value=(state.world_temperature||0)*(state.drift_bpm||90)/90*6;
      this._cMesh.material.uniforms.uLineWidth.value=3.5+(state.world_temperature||0.5)*2.5+(state.excitation||0)*1.5;
      this._cMesh.material.uniforms.uResolution.value.set(innerWidth,innerHeight);
    }
    if(this._controls) this._controls.update();

    const crisis=state.crisis_level||0,excit=state.excitation||0,wt=state.world_temperature||0.5;
    const now=performance.now();
    if(now-this._lastSig>400){this._updateSig(state);this._lastSig=now;}
    // per-edge traveling pulse (NO_FAKE: speed = BPM + excitement, 2.5% floor = structural min)
    if(this._pfData&&this._pulseT){
      const bpm=state.drift_bpm||90,excit2=state.excitation||0;
      const spd=(0.025+excit2*0.30+(bpm/60)*0.20)*dt;
      const SEG=12,E=this._pulseT.length;
      for(let ei=0;ei<E;ei++){
        const prev=this._pulseT[ei];
        this._pulseT[ei]=(prev+spd)%1.0;
        const pf=this._pulseT[ei];
        const act=this._connStrData?this._connStrData[ei*SEG*2]:0.5;
        for(let s=0;s<SEG;s++){this._pfData[ei*SEG*2+s*2]=pf;this._pfData[ei*SEG*2+s*2+1]=pf;this._paData[ei*SEG*2+s*2]=act;this._paData[ei*SEG*2+s*2+1]=act;}
        if(prev>0.85&&pf<0.15&&this._edges&&this._nodeFireFlashData&&act>0.08){
          const toIdx=this._edges[ei].toIdx;
          if(toIdx>=0)this._nodeFireFlashData[toIdx]=Math.max(this._nodeFireFlashData[toIdx],act*0.7);
        }
      }
      if(this._nodeFireFlashData){
        for(let ni=0;ni<this._nodeFireFlashData.length;ni++)this._nodeFireFlashData[ni]*=0.91;
        this._nodeFireFlashAttr.needsUpdate=true;
      }
      this._pfAttr.needsUpdate=true; this._paAttr.needsUpdate=true;
    }
    if(this._controls){this._controls.autoRotate=true;this._controls.autoRotateSpeed=0.5+excit*1.5;}
    if(this._cam.aspect!==innerWidth/innerHeight){
      this._cam.aspect=innerWidth/innerHeight;
      this._cam.updateProjectionMatrix();
    }
    scene.background=this._bgColor;
    renderer.render(scene,this._cam);
    return true;
  }

  dispose(sc){
    if(this._nMesh){sc.remove(this._nMesh);this._nMesh.geometry.dispose();this._nMesh.material.dispose();this._nMesh=null;}
    if(this._cMesh){sc.remove(this._cMesh);this._cMesh.geometry.dispose();this._cMesh.material.dispose();this._cMesh=null;}
    if(this._starField){sc.remove(this._starField);this._starField.geometry.dispose();this._starField=null;}
    this._sprites.forEach(s=>{sc.remove(s);s.material.map?.dispose();s.material.dispose();});this._sprites=[];
    if(this._controls){this._controls.dispose();this._controls=null;}
    this._built=false;
    renderer.setSize(innerWidth,innerHeight);
    scene.background=this._bgColor;
  }
}

// ── Mode SYNAPSE ──────────────────────────────────────────────────────────────
// Graphe de neurones synthétiques, topologie pilotée par drift_territory.
// Formation, taille de nœuds et impulsions sont dérivés de GlobalState.
// Pas de base fake — si tous les signaux = 0, formation par défaut + nœuds min.

const _SYN_NODE_VS = `
attribute float nodeSize;
attribute vec3  nodeColor;
attribute float distFromRoot;
attribute float nodeActivity;
attribute float nodeFireFlash;
uniform   float uTime;
uniform   float uNodeScale;
uniform   float uPulseTime;
uniform   vec3  uPulsePos;
uniform   float uPulseSpeed;
varying   vec3  vColor;
varying   float vDist;
varying   float vPulse;
varying   float vActivity;
varying   float vFlash;
void main(){
  vColor = nodeColor; vDist = distFromRoot; vActivity = nodeActivity; vFlash = nodeFireFlash;
  vec3 worldPos = (modelMatrix * vec4(position, 1.0)).xyz;
  float timeSince = uTime - uPulseTime;
  float pIntensity = 0.0;
  if(timeSince >= 0.0 && timeSince < 3.0){
    float pRadius = timeSince * uPulseSpeed;
    float d = distance(worldPos, uPulsePos);
    pIntensity = smoothstep(2.5, 0.0, abs(d - pRadius)) * smoothstep(3.0, 0.0, timeSince);
  }
  vPulse = pIntensity;
  // B6 — taille modulée par activité (porteur conditionnel sur nodeActivity)
  float scale = nodeSize * uNodeScale * (1.0 + pIntensity * 1.5) * (1.0 + nodeActivity * 0.6) * (1.0 + nodeFireFlash * 0.7);
  vec4 mv = modelViewMatrix * vec4(position, 1.0);
  gl_PointSize = clamp(scale * (700.0 / -mv.z), 4.0, 60.0); // min 4 — circle-clip works at ≥4px
  gl_Position = projectionMatrix * mv;
}`;

const _SYN_NODE_FS = `
uniform float uTime;
varying vec3  vColor;
varying float vDist;
varying float vPulse;
varying float vActivity;
varying float vFlash;
void main(){
  vec2 c = 2.0 * gl_PointCoord - 1.0;
  float d = length(c);
  if(d > 1.0) discard;
  // Disque dur avec bord net (consistance visuelle)
  float disc   = 1.0 - smoothstep(0.72, 0.88, d);
  // Reflet spéculaire centré — suggère volume sans fake motion
  float spec   = exp(-d * d * 8.0) * disc;
  // Halo mou au-delà du disque — donne surface au bloom
  float glow   = pow(max(0.0, 1.0 - d), 3.5) * (1.0 - disc);
  // Ring highlight au bord du disque (liseret lumineux)
  float rim    = smoothstep(0.58, 0.72, d) * disc;
  // Corona — anneau fin hors du disque, visible seulement sur nœuds très actifs (porteur conditionnel)
  float cAct   = max(0.0, vActivity - 0.35) * (1.0 / 0.65); // rampe 0→1 pour vActivity ∈ [0.35, 1.0]
  float corona = smoothstep(0.82, 0.92, d) * smoothstep(1.0, 0.92, d) * (1.0 - disc);

  vec3 col = vColor;
  col = mix(col, vec3(1.0),          spec   * vActivity * 0.95); // porteur conditionnel — zéro si signal nul
  col = mix(col, vec3(1.0),          rim    * vActivity * 0.50); // porteur conditionnel
  col = mix(col, vec3(0.67, 0.41, 1.0), corona * cAct     * 0.80); // corona violette OpenAI #ab68ff
  if(vPulse > 0.0) col = mix(col, vec3(1.0), vPulse * 0.75);
  col = mix(col, vec3(0.25, 1.0, 0.72), vFlash * 0.85); // flash vert #10A37F boosted
  // Flash ring — anneau lumineux à la réception d'un signal (porteur conditionnel: vFlash)
  float flashRing = smoothstep(0.70, 0.76, d) * smoothstep(0.93, 0.80, d) * vFlash;
  col = mix(col, vec3(0.25, 0.90, 0.65), flashRing * 0.88); // ring vert OpenAI
  // base floor 55% au centre — aligne avec NexusMode scene 5 (user request)
  float alpha  = disc  * (0.55 + vActivity * 0.35 + vFlash * 0.30)
               + spec  * (vActivity * 0.28 + vFlash * 0.20)
               + glow  * (vActivity * 0.18 + vFlash * 0.32)
               + rim   * (vActivity * 0.14 + vFlash * 0.22)
               + corona * cAct * 0.35
               + vPulse * 0.25
               + flashRing * vFlash * 0.62;
  gl_FragColor = vec4(col, clamp(alpha, 0.0, 1.0));
}`;

const _SYN_CONN_VS = `
attribute vec3  startPt;
attribute vec3  endPt;
attribute float connStr;
attribute float pathIdx;
attribute vec3  connColor;
attribute float side;         // -1.0 or +1.0 — quad expansion side
attribute float pulseFront;   // per-edge pulse position 0→1 (all verts in edge share same value)
attribute float pulseActV;    // per-edge pulse activation (PE-driven)
uniform   float uTime;
uniform   float uPulseTime;
uniform   vec3  uPulsePos;
uniform   float uPulseSpeed;
uniform   float uLineWidth;   // screen-space half-width in pixels
uniform   vec2  uResolution;
varying   vec3  vColor;
varying   float vStr;
varying   float vT;
varying   float vPulse;
varying   float vPF;
varying   float vPA;
varying   float vSide;
void main(){
  float t = position.x; vT = t; vColor = connColor; vStr = connStr; vPF = pulseFront; vPA = pulseActV; vSide = side;
  // Shared perpendicular (independent of t) for consistent curve shape
  vec3 edgeDir = normalize(endPt - startPt);
  // Perpendiculaire robuste — évite la dégénérescence pour les arêtes quasi-verticales
  vec3 _up = abs(edgeDir.y) < 0.9 ? vec3(0.0, 1.0, 0.0) : vec3(1.0, 0.0, 0.0);
  vec3 perp = normalize(cross(edgeDir, _up));
  vec3 midBase = mix(startPt, endPt, 0.5);
  // Bezier position at t
  vec3 mid = midBase + perp * sin(t * 3.14159) * 0.12;
  vec3 pos = mix(mix(startPt, mid, t), mix(mid, endPt, t), t);
  // Pulse
  vec3 worldPos = (modelMatrix * vec4(pos, 1.0)).xyz;
  float timeSince = uTime - uPulseTime;
  float pIntensity = 0.0;
  if(timeSince >= 0.0 && timeSince < 3.0){
    float pRadius = timeSince * uPulseSpeed;
    float dd = distance(worldPos, uPulsePos);
    pIntensity = smoothstep(2.5, 0.0, abs(dd - pRadius)) * smoothstep(3.0, 0.0, timeSince);
  }
  vPulse = pIntensity;
  // Screen-space quad expansion — WebGL lineWidth is capped at 1px in browsers
  float tN = clamp(t + 1.0/15.0, 0.0, 1.0);
  vec3 midN = midBase + perp * sin(tN * 3.14159) * 0.12;
  vec3 posN = mix(mix(startPt, midN, tN), mix(midN, endPt, tN), tN);
  vec4 clip  = projectionMatrix * modelViewMatrix * vec4(pos,  1.0);
  vec4 clipN = projectionMatrix * modelViewMatrix * vec4(posN, 1.0);
  vec2 screenDir = normalize((clipN.xy / clipN.w - clip.xy / clip.w) * uResolution);
  vec2 screenNorm = vec2(-screenDir.y, screenDir.x);
  float halfW = uLineWidth / uResolution.y;
  clip.xy += screenNorm * halfW * side * clip.w;
  gl_Position = clip;
}`;

const _SYN_CONN_FS = `
uniform float uTime;
uniform float uFlowSpeed;
uniform float uCrisis;
varying vec3  vColor;
varying float vStr;
varying float vT;
varying float vPulse;
varying float vPF;
varying float vPA;
varying float vSide;
void main(){
  float flow = uFlowSpeed > 0.0 ? (sin(vT * 18.0 - uTime * uFlowSpeed) * 0.5 + 0.5) : 0.0; // porteur conditionnel
  // Teinte crise rouge OpenAI #ef4444 portée par connStr
  vec3 crisisCol = vec3(0.94, 0.27, 0.27);
  vec3 baseCol   = mix(vColor, crisisCol, uCrisis * vStr * 0.65);
  vec3 col = baseCol * (1.0 + 0.20 * flow * vStr);
  // Éclat en crise — mix vers blanc légèrement rosé (OpenAI error tone)
  vec3 flashCol = mix(vec3(1.0), vec3(1.0, 0.90, 0.90), uCrisis);
  col = mix(col, flashCol, vStr * flow * 0.55); // porteur conditionnel
  if(vPulse > 0.0) col = mix(col, vec3(1.0), vPulse * 0.7);
  // Paquet primaire
  float pulseEnv  = sin(vPF * 3.14159) * 0.80 + 0.20;
  float pulseCore = smoothstep(0.07, 0.0, abs(vT - vPF)) * pulseEnv * vPA;
  float pulseHalo = smoothstep(0.26, 0.07, abs(vT - vPF)) * pulseEnv * vPA * 0.42;
  // Traîne derrière le paquet primaire (porteur conditionnel: vPA)
  float wakeD = clamp(vPF - vT, 0.0, 0.18);
  float wake  = wakeD * (1.0/0.18) * vPA * 0.26;
  // Second paquet — seulement sur synapses très actives (porteur conditionnel vPA>0.42)
  float pF2   = fract(vPF + 0.5);
  float env2  = (sin(pF2 * 3.14159) * 0.80 + 0.20) * max(0.0, (vPA - 0.42) * 2.4);
  float pCore2 = smoothstep(0.06, 0.0, abs(vT - pF2)) * env2;
  float pHalo2 = smoothstep(0.22, 0.06, abs(vT - pF2)) * env2 * 0.32;
  // Paquets de données : vert OpenAI #10A37F boosted pour blending additif
  col = mix(col, vec3(0.25, 1.20, 0.72), pulseCore * 1.12 + pulseHalo * 0.62 + pCore2 * 0.72 + pHalo2 * 0.36);
  float alpha = (max(0.22, 0.60 * vStr) + 0.15 * flow * vStr + vPulse * 0.25
               + pulseCore * 0.82 + pulseHalo * 0.52 + wake + pCore2 * 0.52 + pHalo2 * 0.30)
    * smoothstep(0.0, 0.05, vT) * smoothstep(1.0, 0.95, vT);
  float tube = pow(max(0.0, 1.0 - abs(vSide)), 0.40);
  col  *= (0.80 + tube * 0.70);
  alpha = alpha * (0.25 + tube);
  gl_FragColor = vec4(col, alpha);
}`;

// Color palettes: indexed by formation quartile

// ── Shaders étoiles — scintillement data-driven ───────────────────────────────

const _SYN_STAR_VS = `
