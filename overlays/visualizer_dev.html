      {cat:'infra',   key:'generation_lag_s',      max:30  },
      // DRIFT (violet) — 10 signaux
      {cat:'drift',   key:'drift_bpm',             max:180 },
      {cat:'drift',   key:'drift_energy',          max:1   },
      {cat:'drift',   key:'drift_velocity',        max:1   },
      {cat:'drift',   key:'time_in_territory_h',   max:12  },
      {cat:'drift',   key:'audio_bpm_delta',       max:60  },
      {cat:'drift',   key:'audio_key_match',       max:1   },
      {cat:'drift',   key:'audio_energy_level',    max:1   },
      {cat:'drift',   key:'musical_tension',       max:1   },
      {cat:'drift',   key:'harmonic_complexity',   max:1   },
      {cat:'drift',   key:'rhythmic_entropy',      max:1   },
      // AUDIENCE (jaune) — 8 signaux
      {cat:'audience',key:'viewers',               max:1000},
      {cat:'audience',key:'chat_rate',             max:30  },
      {cat:'audience',key:'chat_sentiment',        max:1   },
      {cat:'audience',key:'regulars_ratio',        max:1   },
      {cat:'audience',key:'avg_session_min',       max:60  },
      {cat:'audience',key:'audience_energy',       max:1   },
      {cat:'audience',key:'wonder',                max:1   },
      {cat:'audience',key:'melancholy',            max:1   },
      // SYSTEM (vert) — 8 signaux
      {cat:'system',  key:'cpu_percent',           max:100 },
      {cat:'system',  key:'memory_percent',        max:100 },
      {cat:'system',  key:'stream_bitrate',        max:6000},
      {cat:'system',  key:'dropped_frames',        max:1   },
      {cat:'system',  key:'source_divergence',     max:1   },
      {cat:'system',  key:'urgency',               max:1   },
      {cat:'system',  key:'uptime_h',              max:168 },
      {cat:'system',  key:'songs_played_today',    max:50  },
    ];

    this._N=this._PDEFS.length; // 55
    const maxSeg=this._N*this._N;
    this._positions      =new Float32Array(maxSeg*3);
    this._lineColors     =new Float32Array(maxSeg*3); // RGB pur (non prémultiplié)
    this._connStrengths  =new Float32Array(maxSeg*2); // alpha par vertex
    this._lineTVals      =new Float32Array(maxSeg*2); // t=0 start, t=1 end (statique)
    for(let k=0;k<maxSeg;k++){ this._lineTVals[k*2]=0.0; this._lineTVals[k*2+1]=1.0; }
    this._particlePositions=new Float32Array(this._N*3);
    this._particleVelocities=[];
    this._surpriseVals   =new Float32Array(this._N); // PE/σ — "écart au modèle"
    this._activityVals   =new Float32Array(this._N); // valeur brute normalisée
    this._volVals        =new Float32Array(this._N); // volatilité → vitesse
    this._peVals         =new Float32Array(this._N); // PE brut → arêtes anomalie
    this._connFlows      =new Float32Array(maxSeg*2); // vitesse flux par vertex
    this._connCount      =new Uint8Array(this._N);   // connexions actives par nœud
    this._lastNConn      =0;                          // pour seuil adaptatif
    this._surpriseAttr   =null; this._activityAttr=null; this._connFlowAttr=null;
  }

  _normActivity(state,def){
    const v=state[def.key]; if(v==null)return 0;
    return Math.min(1,Math.max(0,Number(v)/def.max));
  }

  _computeSelfModel(state){
    const pe =state.prediction_errors   ||{};
    const vol=state.signal_volatilities ||{};
    for(let i=0;i<this._N;i++){
      const key=this._PDEFS[i].key;
      const rawPe =Math.abs(Number(pe[key]) ||0);
      const rawVol=Math.max( Number(vol[key])||0, 0.001); // epsilon pour division seulement
      // surprise = PE en sigmas, plafonné à 3σ
      this._surpriseVals[i]=Math.min(1, rawPe/rawVol/3);
      this._volVals[i]     =Math.min(1, Math.max(0, Number(vol[key])||0)); // 0 si signal absent
      this._peVals[i]      =Math.min(1, rawPe);
      this._activityVals[i]=this._normActivity(state,this._PDEFS[i]);
    }
  }

  _makeStars(count){
    const geo=new THREE.BufferGeometry();
    const pos=new Float32Array(count*3);
    for(let i=0;i<count;i++){
      const theta=Math.random()*Math.PI*2;
      const phi  =Math.acos(2*Math.random()-1);
      const r    =2000+Math.random()*3000;
      pos[i*3]  =r*Math.sin(phi)*Math.cos(theta);
      pos[i*3+1]=r*Math.sin(phi)*Math.sin(theta);
      pos[i*3+2]=r*Math.cos(phi);
    }
    geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
    return new THREE.Points(geo,new THREE.PointsMaterial({
      color:0xffffff,size:0.7,depthWrite:false,transparent:true,opacity:0.5
    }));
  }

  init(sc,cam){
    this._cam=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,1,8000);
    this._cam.position.z=750; // zoomé vs 1200 original
    this._clock.start();
    const r=this._r,rH=r/2;

    // Fond étoilé (hors group — ne tourne pas)
    this._starField=this._makeStars(800);
    sc.add(this._starField);

    // Group — seul élément qui tourne
    this._group=new THREE.Group();
    sc.add(this._group);

    // Box wireframe
    const bm=new THREE.Mesh(new THREE.BoxGeometry(r,r,r));
    this._boxHelper=new THREE.BoxHelper(bm,0x111122);
    bm.geometry.dispose(); // BoxHelper copies AABB immediately — temp geometry no longer needed
    this._boxHelper.material.blending=THREE.AdditiveBlending;
    this._boxHelper.material.transparent=true;
    this._boxHelper.material.opacity=0.5;
    this._group.add(this._boxHelper);

    // Positions + directions initiales (Math.random uniquement à l'init)
    for(let i=0;i<this._N;i++){
      this._particlePositions[i*3]  =(Math.random()-.5)*r;
      this._particlePositions[i*3+1]=(Math.random()-.5)*r;
      this._particlePositions[i*3+2]=(Math.random()-.5)*r;
      this._particleVelocities.push(
        new THREE.Vector3(Math.random()-.5,Math.random()-.5,Math.random()-.5).normalize()
      );
    }

    // Couleurs catégorie (statiques — jamais recalculées)
    const catCol=new Float32Array(this._N*3);
    for(let i=0;i<this._N;i++){
      const c=this._CATS[this._PDEFS[i].cat];
      catCol[i*3]=c.r; catCol[i*3+1]=c.g; catCol[i*3+2]=c.b;
    }

    // Géométrie points — deux attributs dynamiques : surpriseVal + activityVal
    const pGeo=new THREE.BufferGeometry();
    pGeo.setAttribute('position',  new THREE.BufferAttribute(this._particlePositions,3).setUsage(THREE.DynamicDrawUsage));
    pGeo.setAttribute('catColor',  new THREE.BufferAttribute(catCol,3));
    const sva=new THREE.BufferAttribute(this._surpriseVals,1); sva.setUsage(THREE.DynamicDrawUsage);
    const ava=new THREE.BufferAttribute(this._activityVals,1); ava.setUsage(THREE.DynamicDrawUsage);
    pGeo.setAttribute('surpriseVal',sva); this._surpriseAttr=sva;
    pGeo.setAttribute('activityVal',ava); this._activityAttr=ava;
    const pMat=new THREE.ShaderMaterial({
      uniforms:{ uTime:{value:0}, uUrgency:{value:0} },
      vertexShader:_NET_POINT_VS,fragmentShader:_NET_POINT_FS,
      transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,
    });
    this._pointMat=pMat;
    this._pointCloud=new THREE.Points(pGeo,pMat);
    this._group.add(this._pointCloud);

    // Géométrie lignes (drawrange dynamique) — shader flow animé
    const lGeo=new THREE.BufferGeometry();
    lGeo.setAttribute('position', new THREE.BufferAttribute(this._positions,    3).setUsage(THREE.DynamicDrawUsage));
    lGeo.setAttribute('connColor',new THREE.BufferAttribute(this._lineColors,   3).setUsage(THREE.DynamicDrawUsage));
    lGeo.setAttribute('lineT',    new THREE.BufferAttribute(this._lineTVals,    1)); // statique
    const csAttr=new THREE.BufferAttribute(this._connStrengths,1); csAttr.setUsage(THREE.DynamicDrawUsage);
    const cfAttr=new THREE.BufferAttribute(this._connFlows,   1); cfAttr.setUsage(THREE.DynamicDrawUsage);
    lGeo.setAttribute('connStr', csAttr); this._connStrAttr=csAttr;
    lGeo.setAttribute('connFlow',cfAttr); this._connFlowAttr=cfAttr;
    lGeo.computeBoundingSphere(); lGeo.setDrawRange(0,0);
    const lMat=new THREE.ShaderMaterial({
      uniforms:{ uTime:{value:0} }, // uFlowSpeed supprimé — flux per-arête via connFlow
      vertexShader:_NET_CONN_VS, fragmentShader:_NET_CONN_FS,
      transparent:true, depthWrite:false, blending:THREE.AdditiveBlending,
    });
    this._connMat=lMat;
    this._linesMesh=new THREE.LineSegments(lGeo,lMat);
    this._group.add(this._linesMesh);

  }

  update(state,dt){
    const r=this._r,rH=r/2;

    // Rotation constante (approuvée)
    this._group.rotation.y+=dt*this._ROTATION_SPEED;

    // Self-model : surprise, volatilité, PE, activité
    this._computeSelfModel(state);
    if(this._surpriseAttr)this._surpriseAttr.needsUpdate=true;
    if(this._activityAttr)this._activityAttr.needsUpdate=true;

    // Box : gris → rouge selon crisis_level
    if(this._boxHelper){
      const c=state.crisis_level||0;
      this._boxHelper.material.color.setRGB(0.06+c*.5,0.04*(1-c),0.08*(1-c));
    }

    // Seuil proximité : haute divergence → clusters resserrés, basse → graphe étendu
    const div=Math.min(1,Math.max(0,state.source_divergence||0));
    const minDist=100+(1-div)*220; // 100 (fragmenté) → 320 (cohérent)

    // Luminosité globale (plancher 0.08 pour éviter écran mort)
    const wt=Math.max(0.08,Math.min(1,state.world_temperature||0));

    // Urgence → pulsation taille des nœuds (porteur conditionnel)
    const urgency=Math.min(1,Math.max(0,state.urgency||0));
    const t=this._clock.getElapsedTime();
    const pulse=1+Math.sin(t*urgency*12)*urgency*0.5; // zéro quand urgency=0 ✓
    if(this._pointMat){
      this._pointMat.uniforms.uTime.value=t;
      this._pointMat.uniforms.uUrgency.value=urgency;
    }
    if(this._connMat) this._connMat.uniforms.uTime.value=t;
    if(this._cam.aspect!==innerWidth/innerHeight){
      this._cam.aspect=innerWidth/innerHeight;
      this._cam.updateProjectionMatrix();
    }

    // Wonder → légère variation d'opacité du fond étoilé
    if(this._starField){
      const wonder=Math.min(1,Math.max(0,state.wonder||0));
      this._starField.material.opacity=0.4+wonder*Math.abs(Math.sin(t*2))*0.3;
    }

    // Poids drift_weights du territoire courant (arêtes sémantiques)
    const territory=state.drift_territory||'ambient';
    const dw=state.drift_weights;
    const weights=(dw&&dw[territory])||{};

    // Déplacement : activité brute (0.7) + volatilité (0.3)
    for(let i=0;i<this._N;i++){
      const spd=(this._activityVals[i]*0.7+this._volVals[i]*0.3)*80;
      const v=this._particleVelocities[i];
      this._particlePositions[i*3]  +=v.x*spd*dt;
      this._particlePositions[i*3+1]+=v.y*spd*dt;
      this._particlePositions[i*3+2]+=v.z*spd*dt;
      if(Math.abs(this._particlePositions[i*3])  >rH)v.x=-v.x;
      if(Math.abs(this._particlePositions[i*3+1])>rH)v.y=-v.y;
      if(Math.abs(this._particlePositions[i*3+2])>rH)v.z=-v.z;
    }

    // Seuil adaptatif : cible ~150 connexions — monte si trop, descend si trop peu
    const dynThreshold=Math.max(0.006, Math.min(0.05, 0.008*this._lastNConn/150));
    // Max connexions par nœud selon crisis_level (5 calme → 9 crise)
    const maxConn=5+Math.round((state.crisis_level||0)*4);
    const minDist2=minDist*minDist;
    this._connCount.fill(0); // reset compteur par nœud

    // Calcul des arêtes — 3 types cumulatifs
    let vp=0,cp=0,sp=0,nConn=0;
    for(let i=0;i<this._N;i++){
      for(let j=i+1;j<this._N;j++){
        if(vp+6>this._positions.length)break;

        // Fast-reject : sauter si les deux nœuds sont inactifs et sans poids sémantique
        const ki=this._PDEFS[i].key, kj=this._PDEFS[j].key;
        const wi=weights[ki]||0, wj=weights[kj]||0;
        const semantic=wi*wj*4;
        const actSum=this._activityVals[i]+this._activityVals[j];
        const peSum =this._peVals[i]      +this._peVals[j];
        if(actSum<0.02 && peSum<0.01 && semantic<dynThreshold)continue;

        // Max connexions par nœud — évite le hairball
        if(this._connCount[i]>=maxConn||this._connCount[j]>=maxConn)continue;

        // Distance — fast-reject carré avant sqrt
        const dx=this._particlePositions[i*3]  -this._particlePositions[j*3];
        const dy=this._particlePositions[i*3+1]-this._particlePositions[j*3+1];
        const dz=this._particlePositions[i*3+2]-this._particlePositions[j*3+2];
        const dist2=dx*dx+dy*dy+dz*dz;
        const prox=dist2<minDist2?(1-Math.sqrt(dist2)/minDist):0;

        // Arête A — activité × proximité
        const baseActivity=prox*actSum*0.18;
        // Arête C — anomalies simultanées proches
        const anomalyProx=prox*peSum*0.5;

        const strength=Math.max(baseActivity,semantic,anomalyProx);
        if(strength<dynThreshold)continue;

        this._connCount[i]++; this._connCount[j]++;

        // Alpha : base solide pour que le bloom élargisse la ligne 1px
        const alpha=Math.min(0.95,strength*(0.55+wt*0.40)*pulse);
        const ci=this._CATS[this._PDEFS[i].cat];
        const cj=this._CATS[this._PDEFS[j].cat];
        this._positions[vp++]=this._particlePositions[i*3];
        this._positions[vp++]=this._particlePositions[i*3+1];
        this._positions[vp++]=this._particlePositions[i*3+2];
        this._positions[vp++]=this._particlePositions[j*3];
        this._positions[vp++]=this._particlePositions[j*3+1];
        this._positions[vp++]=this._particlePositions[j*3+2];
        // Couleur pure (non prémultipliée) — le shader gère l'alpha via connStr
        this._lineColors[cp++]=ci.r;this._lineColors[cp++]=ci.g;this._lineColors[cp++]=ci.b;
        this._lineColors[cp++]=cj.r;this._lineColors[cp++]=cj.g;this._lineColors[cp++]=cj.b;
        // Flux per-arête : PE × 10 + activité × 3 + surprise × 6 (NO_FAKE, zéro si au repos)
        const peAvg   =(this._peVals[i]      +this._peVals[j])      *0.5;
        const actAvg  =(this._activityVals[i]+this._activityVals[j]) *0.5;
        const surprAvg=(this._surpriseVals[i]+this._surpriseVals[j]) *0.5;
        const edgeFlow=peAvg*10.0+actAvg*3.0+surprAvg*6.0;
        this._connStrengths[sp]=alpha; this._connFlows[sp]=edgeFlow; sp++;
        this._connStrengths[sp]=alpha; this._connFlows[sp]=edgeFlow; sp++;
        nConn++;
      }
    }

    this._lastNConn=nConn;
    this._linesMesh.geometry.setDrawRange(0,nConn*2);
    this._linesMesh.geometry.attributes.position.needsUpdate=true;
    this._linesMesh.geometry.attributes.connColor.needsUpdate=true;
    if(this._connStrAttr)  this._connStrAttr.needsUpdate=true;
    if(this._connFlowAttr) this._connFlowAttr.needsUpdate=true;
    this._pointCloud.geometry.attributes.position.needsUpdate=true;

    scene.background=new THREE.Color(0,0,0);
    renderer.render(scene,this._cam);
    return true;
  }

  dispose(sc){
    if(this._group){
      // Dispose geometries + materials of all children (boxHelper, pointCloud, linesMesh).
      // Without this, ShaderMaterials and BufferGeometries accumulate in SwiftShader heap
      // each time the network scene exits, causing V8 GC pressure and fps drops after ~60min.
      this._group.traverse(c=>{
        if(c.geometry) c.geometry.dispose();
        if(c.material){
          if(Array.isArray(c.material)) c.material.forEach(m=>m.dispose());
          else c.material.dispose();
        }
      });
      sc.remove(this._group);
      this._group=null;
    }
    if(this._starField){
      sc.remove(this._starField);
      this._starField.geometry.dispose();
      this._starField.material.dispose(); // was missing — PointsMaterial leaked on each exit
      this._starField=null;
    }
    scene.background=new THREE.Color(0x000000);
    // Rétablit la résolution correcte pour les autres scènes
    renderer.setSize(innerWidth,innerHeight);
  }
}


const _NX_PART_VS = `
uniform float uTime;uniform float uAudioLevel;
attribute vec3 color;varying vec3 vCol;
void main(){
  vCol=color;
  vec3 pos=position;
  // mouvement conditionné par audio (NO_FAKE: porteur conditionnel)
  pos.x+=sin(uTime*0.1+position.z*0.2)*0.5*uAudioLevel;
  pos.y+=cos(uTime*0.1+position.x*0.2)*0.5*uAudioLevel;
  vec4 mv=modelViewMatrix*vec4(pos,1.0);
  gl_PointSize=clamp(50.0/-mv.z,4.0,32.0); // min 4 — circle-clip works at ≥4px (r=0.53>0.5)
  gl_Position=projectionMatrix*mv;
}`;

const _NX_PART_FS = `
varying vec3 vCol;
void main(){
  float r=distance(gl_PointCoord,vec2(0.5));
  if(r>0.5)discard;
  gl_FragColor=vec4(vCol,smoothstep(0.5,0.0,r)*0.85);
}`;

// Node dots — per-node aActivation (PE-driven) + nodeFireFlash on pulse receipt
const _NX_NODE_VS = `
attribute float aActivation;
attribute float nodeFireFlash;
uniform float uAudioLevel; uniform float uHealthRatio;
varying float vAct; varying float vFlash;
void main(){
  vAct=aActivation; vFlash=nodeFireFlash;
  vec4 mv=modelViewMatrix*vec4(position,1.0);
  float sz=(2.0+uAudioLevel*8.0+aActivation*10.0+uHealthRatio*2.0+nodeFireFlash*8.0)*200.0;
  gl_PointSize=clamp(sz/-mv.z,4.0,24.0);
  gl_Position=projectionMatrix*mv;
}`;
const _NX_NODE_FS = `
uniform vec3 uColor; uniform float uAudioLevel;
varying float vAct; varying float vFlash;
void main(){
  float r=distance(gl_PointCoord,vec2(0.5));
  if(r>0.5)discard;
  float core=smoothstep(0.5,0.05,r);
  float halo=smoothstep(0.5,0.20,r)*vAct*0.7;
  // Flash ring — anneau fin à réception (porteur conditionnel: vFlash)
  float flashRing=smoothstep(0.36,0.40,r)*smoothstep(0.48,0.42,r)*vFlash;
  vec3 col=mix(uColor*(0.55+uAudioLevel*0.50+vAct*0.35),vec3(0.7,1.0,1.9),vFlash*0.85);
  col=mix(col,vec3(0.4,0.95,1.8),flashRing*0.90);
  gl_FragColor=vec4(col,(core+halo+flashRing*vFlash*0.78)*(1.0+vFlash*0.40));
}`;

// Subdivided edge — aT static, aPulseT+aActivation dynamic (NO_FAKE: BPM+PE-driven)
const _NX_EDGE_VS = `
attribute float aT;
attribute float aPulseT;
attribute float aActivation;
attribute vec3  aEdgeDir;
attribute float aSide;
uniform float uLineWidth;
uniform vec2  uResolution;
varying float vT; varying float vPulse; varying float vPulseH; varying float vAct;
varying float vPulse2; varying float vPulseH2;
void main(){
  float d=abs(aT-aPulseT); d=min(d,1.0-d);
  vPulse =exp(-d*d*120.0);
  vPulseH=exp(-d*d*15.0);
  // Second data packet — phase +0.5, porteur conditionnel sur aActivation > 0.3
  float pT2=fract(aPulseT+0.5);
  float d2=abs(aT-pT2); d2=min(d2,1.0-d2);
  float gate=clamp((aActivation-0.30)*3.33,0.0,1.0);
  vPulse2 =exp(-d2*d2*120.0)*gate;
  vPulseH2=exp(-d2*d2*15.0)*gate;
  vT=aT; vAct=aActivation;
  vec4 clip    =projectionMatrix*modelViewMatrix*vec4(position,1.0);
  vec4 clipRef =projectionMatrix*modelViewMatrix*vec4(position+aEdgeDir*0.5,1.0);
  vec2 screenDir=normalize((clipRef.xy/clipRef.w-clip.xy/clip.w)*uResolution);
  vec2 screenNorm=vec2(-screenDir.y,screenDir.x);
  clip.xy+=screenNorm*(uLineWidth/uResolution.y)*aSide*clip.w;
  gl_Position=clip;
}`;
const _NX_EDGE_FS = `
uniform vec3 uColor; uniform float uAudioLevel; uniform float uAnomalyScore;
varying float vT; varying float vPulse; varying float vPulseH; varying float vAct;
varying float vPulse2; varying float vPulseH2;
void main(){
  float center=max(0.0,1.0-abs(vT-0.5)*1.8);
  float base=max(0.10,vAct*0.60+uAnomalyScore*0.40)*center;
  float alpha=base+vPulse*uAudioLevel*1.1+vPulseH*uAudioLevel*0.35
             +vPulse2*uAudioLevel*0.70+vPulseH2*uAudioLevel*0.22;
  if(alpha<0.015)discard;
  vec3 col=mix(uColor,vec3(1.3,1.3,1.6),vPulse*uAudioLevel*0.80);
  col=mix(col,vec3(0.5,0.85,1.8),vPulseH*uAudioLevel*0.20);
  col=mix(col,vec3(1.4,1.2,1.6),vPulse2*uAudioLevel*0.60);
  gl_FragColor=vec4(col,alpha);
}`;



// ── Mode LOGO — ChatGPT logo, pseudo-extruded particle system ────────────────


const _LOGO_SCALE     = 1.6;
const _LOGO_DEPTH     = 0.35;
const _LOGO_COUNT     = 3200;
const _LOGO_ROT_SPEED = 0.08;  // rad/s — constant orbit, explicit user requirement
const _LOGO_CAM_R     = 4.5;
const _LOGO_BURST_DUR = 2.0;
const _LOGO_PALETTE   = [0x10a37f, 0x0dd3a3, 0x06b6d4, 0x22d3ee, 0x4ade80];

function _logoSampleFill(svgEl, pathEl, n) {
  const pts = [], sp = svgEl.createSVGPoint(), MAX = n * 120;
  let tries = 0;
  while (pts.length < n && tries++ < MAX) {
    sp.x = Math.random() * 24; sp.y = Math.random() * 24;
    if (pathEl.isPointInFill(sp))
      pts.push([(sp.x - 12) / 12 * _LOGO_SCALE, -(sp.y - 12) / 12 * _LOGO_SCALE]);
  }
  return pts;
}

class LogoMode {
  constructor() {
    this._particles   = null;
    this._stars       = null;
    this._cam         = null;
    this._camAngle    = 0;
    this._burstT      = -1;
    this._prevAnomaly = 0;
  }

  init(sc, cam) {
    this._cam         = cam;
    this._camAngle    = 0;
    this._burstT      = -1;
    this._prevAnomaly = 0;
    sc.fog = null;
    sc.background = new THREE.Color(0x000000);
    this._buildParticles(sc);
    this._buildStars(sc);
  }

  _buildParticles(sc) {
    const svgEl  = document.getElementById('_logo-hidden-svg');
    const pathEl = document.getElementById('_logo-hidden-path');

    const COUNT  = _LOGO_COUNT;
    const nFront = Math.round(COUNT * 0.45);
    const nEdge  = Math.round(COUNT * 0.35);
    const nBack  = COUNT - nFront - nEdge;

    const frontOut = _logoSampleFill(svgEl, pathEl, nFront);
    const edgePts  = _logoSampleFill(svgEl, pathEl, nEdge);
    const backOut  = _logoSampleFill(svgEl, pathEl, nBack);

    const pal = _LOGO_PALETTE.map(c => new THREE.Color(c));
    const pos  = new Float32Array(COUNT * 3);
    const col  = new Float32Array(COUNT * 3);
    const sz   = new Float32Array(COUNT);
    const rnd  = new Float32Array(COUNT * 3);
    const lyr  = new Float32Array(COUNT);

    let i = 0;
    const hz  = _LOGO_DEPTH / 2;
    const jit = () => (Math.random() - 0.5) * 0.04;

    const add = (xy, z, layerV) => {
      pos[i*3] = xy[0]; pos[i*3+1] = xy[1]; pos[i*3+2] = z;
      const base = pal[i % pal.length];
      const hsl  = { h:0, s:0, l:0 };
      base.getHSL(hsl);
      hsl.h += (Math.random() - 0.5) * 0.06;
      hsl.s  = Math.min(1,   Math.max(0.55, hsl.s + (Math.random() - 0.5) * 0.18));
      hsl.l  = Math.min(0.9, Math.max(0.36, hsl.l + (Math.random() - 0.5) * 0.22));
      const c = new THREE.Color().setHSL(hsl.h, hsl.s, hsl.l);
      col[i*3] = c.r; col[i*3+1] = c.g; col[i*3+2] = c.b;
      const dCue = 1.0 + layerV * 0.20;
      sz[i] = (0.65 + Math.random() * 0.85) * dCue;
      rnd[i*3]   = Math.random() * 10;
      rnd[i*3+1] = Math.random() * Math.PI * 2;
      rnd[i*3+2] = 0.35 + 0.65 * Math.random();
      lyr[i] = layerV;
      i++;
    };

    frontOut.forEach(xy => add(xy,  hz + jit(),  1.0));
    edgePts .forEach(xy => add(xy, (Math.random() - 0.5) * _LOGO_DEPTH,  0.0));
    backOut .forEach(xy => add(xy, -hz + jit(), -1.0));

    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    geo.setAttribute('color',    new THREE.BufferAttribute(col, 3));
    geo.setAttribute('size',     new THREE.BufferAttribute(sz,  1));
    geo.setAttribute('random',   new THREE.BufferAttribute(rnd, 3));
    geo.setAttribute('layer',    new THREE.BufferAttribute(lyr, 1));

    const mat = new THREE.ShaderMaterial({
      uniforms: {
        uTime:        { value: 0 },
        uExcitement:  { value: 0 }, uAnxiety:    { value: 0 },
        uFrustration: { value: 0 }, uCuriosity:  { value: 0 },
        uCreativity:  { value: 0 }, uWonder:     { value: 0 },
        uMelancholy:  { value: 0 }, uUrgency:    { value: 0 },
        uCrisis:      { value: 0 }, uAnomaly:    { value: 0 },
        uBurstT:      { value: -1 },
        uAudience:    { value: 0 }, uWorldTemp:  { value: 0 },
        uFearGreed:   { value: .5 },uHappiness:  { value: .5 },
        uChatSent:    { value: 0 }, uDivergence: { value: 0 },
        uPredError:   { value: 0 },
      },
      vertexShader: `
uniform float uTime;
uniform float uExcitement, uAnxiety, uCuriosity, uMelancholy, uUrgency, uCrisis;
uniform float uBurstT, uAudience;
attribute float size;
attribute float layer;
attribute vec3  random;
varying vec3  vCol;
varying float vR, vLayer;
void main() {
  vCol   = color;
  vR     = random.z;
  vLayer = layer;
  vec3 p = position;
  // constant center void — artistic resting shape matching the real logo's open center
  if (length(p.xy) > 0.01) p.xy += normalize(p.xy) * (0.08 + random.z * 0.06);
  // excitement: Z-only deformation — floor 4% of range prevents dead-screen
  float zAmp = (0.005 + uExcitement * 0.115) * random.z;
  p.z += sin(uTime * 0.08 * random.z + random.y + p.x * 0.9) * zAmp;
  p.z += cos(uTime * 0.06 * random.z + random.x + p.y * 0.7) * zAmp * 0.4;
  p.z  = clamp(p.z, -0.54, 0.54);
  // anxiety: micro-jitter XY
  float jAmp = uAnxiety * 0.015 * random.z;
  p.x += sin(uTime * 9.1 + random.y * 22.0) * jAmp;
  p.y += cos(uTime * 8.4 + random.x * 19.0) * jAmp;
  // curiosity: radial edge probe
  if (length(p.xy) > 0.01) {
    float probe = uCuriosity * 0.08 * random.z * sin(uTime * 0.35 + random.y * 3.14);
    p.xy += normalize(p.xy) * probe;
  }
  // melancholy: slow gravity drift downward
  p.y -= uMelancholy * 0.06 * random.z * abs(sin(uTime * 0.05 + random.x * 6.28));
  // urgency + crisis: Z push toward viewer
  p.z += (uUrgency * 0.07 + uCrisis * 0.05) * random.z;
  p.z  = clamp(p.z, -0.60, 0.60);
  // anomaly burst: radial explosion → snap back
  if (uBurstT >= 0.0) {
    float prog = 1.0 - uBurstT;
    float bAmp = sin(prog * 3.14159) * 0.45;
    vec2 bDir  = length(p.xy) > 0.01 ? normalize(p.xy) : vec2(cos(random.y), sin(random.y));
    p.xy += bDir * bAmp;
  }
  vec4 mv      = modelViewMatrix * vec4(p, 1.0);
  float dMod   = 1.0 + layer * 0.18;
  float aPulse = uAudience * 0.28 * random.z;
  gl_PointSize = clamp(size * dMod * (190.0 / -mv.z) * (1.0 + aPulse), 1.0, 48.0);
  gl_Position  = projectionMatrix * mv;
}`,
      fragmentShader: `
uniform float uTime;
uniform float uExcitement, uFrustration, uCreativity, uWonder, uMelancholy, uUrgency;
uniform float uCrisis, uAudience, uWorldTemp, uFearGreed, uHappiness;
uniform float uChatSent, uDivergence, uPredError;
varying vec3  vCol;
varying float vR, vLayer;
vec3 hueShift(vec3 c, float h) {
  const vec3 k = vec3(0.57735);
  float ca = cos(h), sa = sin(h);
  return c * ca + cross(k, c) * sa + k * dot(k, c) * (1.0 - ca);
}
void main() {
  vec2  uv    = gl_PointCoord - 0.5;
  float d     = length(uv);
  // All discs use 1-smoothstep(inner,outer,d) — edge0<edge1 required by GLSL spec
  float glowR = max(0.07, 0.28 - uExcitement * 0.06);
  float glow  = 1.0 - smoothstep(0.0, glowR, d);
  float core  = 1.0 - smoothstep(0.0, 0.055, d);
  float ring  = smoothstep(0.36, 0.40, d) * (1.0 - smoothstep(0.40, 0.44, d)) * uFrustration;
  float spark = step(0.70, vR) * (1.0 - smoothstep(0.0, 0.09, d)) * uAudience * 1.6;
  float peFlash = uPredError * (1.0 - smoothstep(0.0, 0.42, d)) * 0.9;
  float alpha = core + glow * (0.28 + uExcitement * 0.22) + ring * 0.7 + spark + peFlash;
  if (alpha < 0.01) discard;
  vec3 col = vCol;
  col = hueShift(col, uCreativity * (vR - 0.5) * 1.6 + uTime * 0.018 * uCreativity);
  col = mix(col, vec3(0.04, 0.78, 0.96), uWonder * 0.55);
  col = mix(col, vec3(0.38, 0.14, 0.54), uMelancholy * 0.45);
  col *= 1.0 - uMelancholy * 0.18;
  col = mix(col, vec3(1.0, 0.44, 0.04), uUrgency * 0.42);
  col = mix(col, vec3(1.0, 0.78, 0.08), uFrustration * 0.28);
  float lum = dot(col, vec3(0.299, 0.587, 0.114));
  col = mix(vec3(lum), col, 1.0 + uFrustration * 0.75);
  col = mix(col, vec3(1.0, 0.06, 0.04), uCrisis * 0.60);
  float fgLum = dot(col, vec3(0.299, 0.587, 0.114));
  if (uFearGreed < 0.5) col = mix(col, vec3(fgLum), (0.5 - uFearGreed) * 1.4);
  if (uFearGreed > 0.5) col = mix(col, vec3(1.0, 0.82, 0.18), (uFearGreed - 0.5) * 0.6);
  col *= 0.65 + uWorldTemp * 0.55 + uHappiness * 0.30;
  if (spark > 0.01) col = mix(col, vec3(0.04, 0.92, 0.62), uChatSent * 0.65 + 0.15);
  col = hueShift(col, uDivergence * (vR - 0.5) * 1.4);
  col = mix(col, vec3(1.0), core * 0.35);
  if (uPredError > 0.01) col = mix(col, vec3(1.0), uPredError * 0.55);
  col *= (vLayer < -0.5 ? 0.60 : 1.0);
  gl_FragColor = vec4(col, alpha);
}`,
      transparent: true, depthWrite: false, vertexColors: true,
      blending: THREE.AdditiveBlending,
    });

    this._particles = new THREE.Points(geo, mat);
    sc.add(this._particles);
  }

  _buildStars(sc) {
    const geo = new THREE.BufferGeometry();
    const pos = new Float32Array(280 * 3);
    for (let j = 0; j < 280; j++) {
      const th = Math.random() * 2 * Math.PI;
      const ph = Math.acos(2 * Math.random() - 1);
      const r  = 70 + Math.random() * 130;
      pos[j*3]   = r * Math.sin(ph) * Math.cos(th);
      pos[j*3+1] = r * Math.sin(ph) * Math.sin(th);
      pos[j*3+2] = r * Math.cos(ph);
    }
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    this._stars = new THREE.Points(geo, new THREE.PointsMaterial({
      color: 0xffffff, size: .22, depthWrite: false, transparent: true, opacity: .2,
    }));
    sc.add(this._stars);
  }

  update(st, dt) {
    if (!this._particles) return false;

    const u = this._particles.material.uniforms;
    u.uTime.value += dt;

    const c01 = v => Math.max(0, Math.min(1, v || 0));

    // Anomaly burst: rising edge above 0.7 triggers one-shot radial explosion
    const anomaly = c01(st.anomaly_score);
    if (anomaly > 0.7 && this._prevAnomaly <= 0.7 && this._burstT < 0) {
      this._burstT = _LOGO_BURST_DUR;
    }
    this._prevAnomaly = anomaly;
    if (this._burstT >= 0) this._burstT = Math.max(-1, this._burstT - dt);

    // Constant camera orbit — explicit user requirement
    this._camAngle += _LOGO_ROT_SPEED * dt;
    this._cam.position.x = _LOGO_CAM_R * Math.cos(this._camAngle);
    this._cam.position.y = 0;
    this._cam.position.z = _LOGO_CAM_R * Math.sin(this._camAngle);
    this._cam.lookAt(0, 0, 0);

    u.uExcitement.value  = c01(st.excitement);
    u.uAnxiety.value     = c01(st.anxiety);
    u.uFrustration.value = c01(st.frustration) * 0.50;
    u.uCuriosity.value   = c01(st.curiosity);
    u.uCreativity.value  = c01(st.creativity);
    u.uWonder.value      = c01(st.wonder);
    u.uMelancholy.value  = c01(st.melancholy);
    u.uUrgency.value     = c01(st.urgency);
    u.uCrisis.value      = c01(st.crisis_level);
    u.uAnomaly.value     = anomaly;
    u.uBurstT.value      = this._burstT >= 0 ? this._burstT / _LOGO_BURST_DUR : -1;
    u.uAudience.value    = c01(st.audience_energy);
    u.uWorldTemp.value   = c01(st.world_temperature);
    u.uFearGreed.value   = c01(st.fear_greed_index ?? 0.5);
    u.uHappiness.value   = c01(st.hedonometer_happiness ?? 0.5);
    u.uChatSent.value    = c01(st.chat_sentiment);
    u.uDivergence.value  = c01(st.source_divergence);
    const _peVals = Object.values(st.prediction_errors || {});
    u.uPredError.value   = (_peVals.length ? Math.min(1, Math.max(..._peVals.map(v => Math.abs(v || 0)))) : 0) * 0.10;

    renderer.render(scene, camera);
    return true;
  }

  dispose(sc) {
    if (this._particles) {
      this._particles.geometry.dispose();
      this._particles.material.dispose();
      sc.remove(this._particles);
      this._particles = null;
    }
    if (this._stars) {
      this._stars.geometry.dispose();
      this._stars.material.dispose();
      sc.remove(this._stars);
      this._stars = null;
    }
    this._cam = null;
  }
}

// ── Système de modes ──────────────────────────────────────────────────────────

const MODES = { chaos: ChaosMode, globe: GlobeMode, network: NetworkMode, logo: LogoMode };
const _SCENE_NAMES = { chaos: 'spectre', globe: 'globe', network: 'network', logo: 'ChatGPT' };

let liveState = {};
let liveNodes  = [];   // @node registry from WebSocket

let activeModeName = 'chaos';
let activeMode = new ChaosMode();
activeMode.init(scene, camera);

let _switchInProgress = false;
async function switchMode(name) {
  if (!MODES[name]) { console.error('Unknown mode:', name); return; }
  if (_switchInProgress) return;
  _switchInProgress = true;
  const fade = document.getElementById('fade');
  fade.style.opacity = '1';
  await new Promise(r => setTimeout(r, 1500));
  try {
    if (activeMode) activeMode.dispose(scene);
    activeModeName = name;
    activeMode = new MODES[name]();
    activeMode.init(scene, camera);
    document.getElementById('mode-indicator').textContent = _SCENE_NAMES[name] || name;
  } catch(err) {
    console.error('switchMode failed for', name, err);
    fade.style.opacity = '0';
    _switchInProgress = false;
    return;
  }
  await new Promise(r => setTimeout(r, 100));
  fade.style.opacity = '0';
  await new Promise(r => setTimeout(r, 1500));
  _switchInProgress = false;
  console.log('Switched to mode:', name);
}

// Expose to console and keyboard
window.switchMode = switchMode;

// ── HUD ───────────────────────────────────────────────────────────────────────

// Thinking verbs — 30 -ing words cycling like Claude's UI (visual decoration, not data)
const _THINKING_VERBS = [
  'thinking','processing','analyzing','creating','exploring',
  'learning','evolving','adapting','wondering','discovering',
  'contemplating','observing','listening','calculating','composing',
  'synthesizing','imagining','resonating','reflecting','connecting',
  'modeling','predicting','sensing','flowing','harmonizing',
  'dreaming','searching','awakening','celebrating','breathing',
];
let _thinkVerbIdx = Math.floor(Math.random() * _THINKING_VERBS.length);
setInterval(() => {
  _thinkVerbIdx = (_thinkVerbIdx + 1) % _THINKING_VERBS.length;
  document.getElementById('journal-think-label').textContent = _THINKING_VERBS[_thinkVerbIdx];
}, 3200);

// Event TTL — 12h client-side guard (prevents same event label from showing indefinitely)
let _eventLabel = '';
let _eventFirstSeen = 0;
const _EVENT_TTL_MS = 12 * 60 * 60 * 1000;

// ── Emotion Wheel ─────────────────────────────────────────────────────────────
const _EW_EMOTIONS = [
  { key:'excitement',      label:'excitement',  color:'#f59e0b', angle:-90  },
  { key:'curiosity',       label:'curiosity',   color:'#06b6d4', angle:-30  },
  { key:'audience_energy', label:'energy',      color:'#10a37f', angle:30   },
  { key:'frustration',     label:'frustration', color:'#8b5cf6', angle:90   },
  { key:'anxiety',         label:'anxiety',     color:'#ef4444', angle:150  },
  { key:'musical_tension', label:'tension',     color:'#6366f1', angle:-150 },
];
const _ewVals = new Float32Array(6); // lerped display values 0-1

function _updateEmotionWheel(dt) {
  if (!document.getElementById('emotion-wheel').classList.contains('visible')) return;
  const LERP = 1 - Math.pow(0.05, dt); // ~0.95s time-constant toward target
  let dirty = false;
  _EW_EMOTIONS.forEach((em, i) => {
    const target = Math.max(0, Math.min(1, liveState[em.key] || 0));
    const prev = _ewVals[i];
    _ewVals[i] = prev + (target - prev) * LERP;
    if (Math.abs(_ewVals[i] - prev) > 0.0005) dirty = true;
  });
  if (dirty) _drawEmotionWheel();
}

function _drawEmotionWheel() {
  const svg = document.getElementById('emotion-wheel-svg');
  if (!svg) return;
  const NS = 'http://www.w3.org/2000/svg';
  const mk = (tag, attrs) => {
    const e = document.createElementNS(NS, tag);
    for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
    return e;
  };
  const CX = 80, CY = 80, R = 54, LR = 70;
  svg.innerHTML = '';

  // Gradient fill
  const defs = mk('defs', {});
  const grd  = mk('radialGradient', { id:'ewG', cx:'50%', cy:'50%', r:'50%' });
  grd.appendChild(mk('stop', { offset:'0%',   'stop-color':'#10a37f', 'stop-opacity':'0.28' }));
  grd.appendChild(mk('stop', { offset:'100%', 'stop-color':'#10a37f', 'stop-opacity':'0.04' }));
  defs.appendChild(grd);
  svg.appendChild(defs);

  // Grid rings
  [0.25, 0.5, 0.75, 1.0].forEach(r =>
    svg.appendChild(mk('circle', { cx:CX, cy:CY, r:R*r, fill:'none', stroke:'rgba(255,255,255,0.07)', 'stroke-width':'1' }))
  );

  // Axes
  _EW_EMOTIONS.forEach(em => {
    const rad = em.angle * Math.PI / 180;
    svg.appendChild(mk('line', {
      x1:CX, y1:CY,
      x2:CX + R * Math.cos(rad), y2:CY + R * Math.sin(rad),
      stroke:em.color, 'stroke-width':'1', opacity:'0.3'
    }));
  });

  // Data polygon
  const pts = _EW_EMOTIONS.map((em, i) => {
    const rad = em.angle * Math.PI / 180;
    const r = _ewVals[i] * R;
    return [CX + r * Math.cos(rad), CY + r * Math.sin(rad)];
  });
  svg.appendChild(mk('polygon', {
    points: pts.map(p => p.join(',')).join(' '),
    fill:'url(#ewG)', stroke:'#10a37f', 'stroke-width':'1.5', 'stroke-linejoin':'round'
  }));

  // Vertex dots + perimeter labels
  _EW_EMOTIONS.forEach((em, i) => {
    const rad = em.angle * Math.PI / 180;
    const val = _ewVals[i];
    if (val > 0.02) {
      const [px, py] = pts[i];
      svg.appendChild(mk('circle', {
        cx:px, cy:py, r:'2.5', fill:em.color,
        filter:`drop-shadow(0 0 3px ${em.color})`
      }));
    }
    const lx = CX + LR * Math.cos(rad), ly = CY + LR * Math.sin(rad);
    const cosA = Math.cos(rad);
    const anchor = cosA > 0.2 ? 'start' : cosA < -0.2 ? 'end' : 'middle';
    const txt = mk('text', {
      x:lx, y:ly, fill:em.color,
      'font-size':'7', 'font-family':'Inter,sans-serif', 'font-weight':'500',
      'text-anchor':anchor, 'dominant-baseline':'middle',
      'letter-spacing':'0', opacity: val > 0.05 ? '1' : '0.3'
    });
    txt.textContent = em.label;
    svg.appendChild(txt);
  });
}

// Timer: visible 30s toutes les 5min — NO_FAKE: timer UI seulement, contenu 100% data-driven
const _EW_CYCLE_MS = 5 * 60 * 1000;
const _EW_SHOW_MS  = 30 * 1000;
function _ewCycle() {
  document.getElementById('emotion-wheel').classList.add('visible');
  _drawEmotionWheel(); // force initial draw — dirty guard skips when all signals are 0
  setTimeout(() => document.getElementById('emotion-wheel').classList.remove('visible'), _EW_SHOW_MS);
}
_ewCycle();  // affiché immédiatement au démarrage
setInterval(_ewCycle, _EW_CYCLE_MS);

// ── Restart banner ────────────────────────────────────────────────────────────
function _showRestartBanner() {
  const el = document.getElementById('restart-banner');
  el.classList.remove('hiding'); el.classList.add('visible');
}
function _hideRestartBanner() {
  const el = document.getElementById('restart-banner');
  el.classList.add('hiding'); el.classList.remove('visible');
  setTimeout(() => el.classList.remove('hiding'), 520);
}

// ── Mood / viewer command notification — drop-in depuis le haut ───────────────
let _lastMoodCmd = '';
let _moodTimer   = null;
const _MOOD_SHOW_MS = 6000;

function _showMoodNotif(text) {
  document.getElementById('mood-notif-text').textContent = text;
  const el = document.getElementById('mood-notif');
  el.classList.add('visible');
  clearTimeout(_moodTimer);
  _moodTimer = setTimeout(() => el.classList.remove('visible'), _MOOD_SHOW_MS);
}

function updateHUD(st) {
  const crisis = st.crisis_level || 0;
  const wt = st.world_temperature || 0;
  const progress = st.current_song_progress || 0;
  const qlen = st.queue_length || 0;
  const uptime = st.uptime_h || 0;

  // uptime formatting
  const uh = Math.floor(uptime);
  const um = Math.floor((uptime - uh) * 60);
  const uptimeStr = uh > 0 ? `${uh}h${String(um).padStart(2,'0')}` : um > 0 ? `${um}m` : '';

  // Crisis bar: green→amber→red
  const crisisPct = Math.round(crisis * 100);
  const crisisBarColor = crisis > 0.5 ? '#ef4444' : crisis > 0.2 ? '#f59e0b' : '#10a37f';
  // Temp bar: hue cold(180°)→warm(0°)
  const tempPct = Math.round(wt * 100);
  const tempBarColor = `hsl(${Math.round(180 - wt * 180)},65%,52%)`;

  document.getElementById('drift-signals').innerHTML =
    `<div style="font-size:11px;color:#c4c7cc;margin-bottom:5px">♪ <span class="mono">${Math.round(st.drift_bpm||90)}</span> BPM · ${st.drift_key||'C minor'} · ${st.drift_timbre||'warm'}</div>` +
    `<div class="drift-bar-row"><span class="drift-bar-label">crisis</span><span class="drift-bar-track"><span class="drift-bar-fill" style="width:${crisisPct}%;background:${crisisBarColor}"></span></span><span class="drift-bar-val" style="color:${crisisBarColor}">${crisisPct}%</span></div>` +
    `<div class="drift-bar-row"><span class="drift-bar-label">temp</span><span class="drift-bar-track"><span class="drift-bar-fill" style="width:${tempPct}%;background:${tempBarColor}"></span></span><span class="drift-bar-val" style="color:${tempBarColor}">${tempPct}%</span></div>` +
    (qlen > 0 ? `<div style="color:#556677;font-size:10px;margin-top:3px">⏎ <span class="mono">${qlen}</span> in queue</div>` : '');

  document.getElementById('on-air-uptime').textContent = uptimeStr;

  // Track name + progress bar — intégrés dans le drift panel
  const driftTrackEl = document.getElementById('drift-track');
  const barEl = document.getElementById('track-progress-bar');
  if (st.current_track_name) {
    document.getElementById('drift-track-name').textContent = '♫ ' + st.current_track_name;
    driftTrackEl.style.display = '';
    barEl.style.width = Math.round(progress * 100) + '%';
  } else {
    driftTrackEl.style.display = 'none';
    barEl.style.width = '0%';
  }

  // viewer command → mood notification drop-in depuis le haut (fires only on new value)
  if (st.viewer_cmd_label && st.viewer_cmd_label !== _lastMoodCmd) {
    _lastMoodCmd = st.viewer_cmd_label;
    _showMoodNotif(st.viewer_cmd_label);
  }
  if (!st.viewer_cmd_label) _lastMoodCmd = '';

  // sources: summary dot + expandable detail
  const sh = st.source_health || {};
  const entries = Object.entries(sh);
  const ok = entries.filter(([,v]) => v).length;
  const total = entries.length;
  const summaryDotCls = ok === total ? 'dot-ok' : ok > total * 0.5 ? 'dot-warn' : 'dot-err';
  const sdot = document.getElementById('sources-dot');
  sdot.className = 'status-dot ' + summaryDotCls + (ok === total && total > 0 ? ' dot-pulse' : '');
  document.getElementById('sources-count').innerHTML =
    `<span style="font-family:'JetBrains Mono',monospace">${ok}/${total}</span> sources`;
  document.getElementById('sources-detail').innerHTML = entries.map(([k,v]) =>
    `<div>${k} <span class="status-dot ${v ? 'dot-ok' : 'dot-err'}" style="margin-left:4px"></span></div>`
  ).join('');

  if (st.journal_text && st.journal_text !== _lastJournalText) {
    _lastJournalText = st.journal_text;
    document.getElementById('journal-body').textContent = st.journal_text;
    const jEl = document.getElementById('journal');
    jEl.classList.add('expanded');
    clearTimeout(_journalTimer);
    _journalTimer = setTimeout(() => jEl.classList.remove('expanded'), JOURNAL_SHOW_MS);
  }
  const chatEl = document.getElementById('chat-status');
  const chatRate = (st.chat_rate || 0).toFixed(1);
  const chatHealth = (st.source_health || {}).youtube_chat;
  const chatLive = chatHealth === true || (chatHealth === undefined && parseFloat(chatRate) > 0);
  chatEl.className = chatLive ? 'live' : '';
  chatEl.innerHTML = `<span class="status-dot ${chatLive ? 'dot-live' : 'dot-off'}" style="margin-right:5px"></span>chat · ${chatRate}/min · ${st.viewers || 0} viewers`;

  const evtEl = document.getElementById('event-banner');
  if (st.active_event && st.event_intensity > 0) {
    if (st.event_label !== _eventLabel) { _eventLabel = st.event_label; _eventFirstSeen = Date.now(); }
    if (Date.now() - _eventFirstSeen < _EVENT_TTL_MS) {
      document.getElementById('event-label-main').textContent = st.event_label;
      evtEl.style.opacity = String(0.4 + st.event_intensity * 0.6);
    } else {
      evtEl.style.opacity = '0';
    }
  } else {
    _eventLabel = '';
    evtEl.style.opacity = '0';
  }
}

// ── WebSocket ─────────────────────────────────────────────────────────────────

// userOverride = true when user manually picked a mode via keyboard.
// Prevents WebSocket state from overriding the user's choice on every heartbeat.
// Cleared only when the server explicitly sends a *different* visual_mode value.
let userOverride = false;
let wsLastMode = null;
let _hudDirty = false;
let _isRestarting = false;
let _restartingTimer = null;

// Journal accordion — expand 10s sur nouveau message, puis replie
let _lastJournalText = '';
let _journalTimer = null;
const JOURNAL_SHOW_MS = 10000;

function connect() {
  const ws = new WebSocket('ws://localhost:8765');
  ws.onopen = () => {
    _isRestarting = false;
    clearTimeout(_restartingTimer);
    _hideRestartBanner();
    document.getElementById('ws-status').className = 'connected';
    document.getElementById('ws-status').innerHTML = '<span class="status-dot dot-ok" style="margin-right:5px"></span>connected';
    updateHUD(liveState);  // preserve last known state on reconnect — avoids track name flash
    // Don't force a mode here — wait for first WS message so user keeps current mode on reconnect
  };
  ws.onmessage = e => {
    const msg = JSON.parse(e.data);
    if (msg._restarting) {
      _isRestarting = true;
      clearTimeout(_restartingTimer);
      _restartingTimer = setTimeout(() => { _isRestarting = false; _hideRestartBanner(); }, 90000);
      _showRestartBanner();
      document.getElementById('ws-status').className = 'restarting';
      document.getElementById('ws-status').innerHTML = '<span class="status-dot dot-warn" style="margin-right:5px"></span>updating…';
    }
    const st = msg.state || {};
    const newMode = MODES[st.visual_mode] ? st.visual_mode : 'chaos';
    if (newMode !== wsLastMode) {
      // Server explicitly changed visual_mode — clear user override and follow
      wsLastMode = newMode;
      userOverride = false;
    }
    if (!userOverride && newMode !== activeModeName) switchMode(newMode);
    liveState = st;
    if (msg.nodes && msg.nodes.length) liveNodes = msg.nodes;
    _hudDirty = true;
  };
  ws.onclose = () => {
    document.getElementById('ws-status').className = _isRestarting ? 'restarting' : '';
    document.getElementById('ws-status').innerHTML = _isRestarting
      ? '<span class="status-dot dot-warn" style="margin-right:5px"></span>updating…'
      : '<span class="status-dot dot-off" style="margin-right:5px"></span>reconnecting…';
    setTimeout(connect, 2000);
  };
  document.getElementById('ws-status').innerHTML = '<span class="status-dot dot-off" style="margin-right:5px"></span>connecting…';
}

connect();

// ── Sources accordion (show 2min every 15min) ─────────────────────────────────
const SOURCES_SHOW_MS = 2 * 60 * 1000;
const SOURCES_HIDE_MS = 15 * 60 * 1000;
function sourcesAccordionCycle() {
  document.getElementById('sources').classList.add('expanded');
  setTimeout(() => {
    document.getElementById('sources').classList.remove('expanded');
    setTimeout(sourcesAccordionCycle, SOURCES_HIDE_MS);
  }, SOURCES_SHOW_MS);
}
sourcesAccordionCycle();

// ── OpenAI News panel — fetch RSS via rss2json, drop-in 30s every 5min ───────
const _NEWS_API = 'https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Fopenai.com%2Fblog%2Frss.xml&count=3';
const _NEWS_CYCLE_MS = 5 * 60 * 1000;
const _NEWS_SHOW_MS  = 30 * 1000;

function _relDate(s) {
  const d = new Date(s);
  if (isNaN(d)) return '';
  const m = Math.floor((Date.now() - d) / 60000);
  if (m < 60) return `${m}m`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}h`;
  return `${Math.floor(h / 24)}d`;
}

async function fetchNews() {
  try {
    const r = await fetch(_NEWS_API);
    if (!r.ok) return;
    const data = await r.json();
    const items = (data.items || []).slice(0, 3);
    if (!items.length) return;
    document.getElementById('news-detail').innerHTML = items.map(it => {
      const title = (it.title || '').replace(/&/g,'&amp;').replace(/</g,'&lt;');
      const age = _relDate(it.pubDate);
      const thumb = it.thumbnail
        ? `<img class="news-thumb" src="${it.thumbnail}" alt="" onerror="this.style.visibility='hidden'">`
        : `<div class="news-thumb"></div>`;
      return `<div class="news-item">${thumb}<div class="news-text"><div class="news-title">${title}</div><div class="news-date">${age}</div></div></div>`;
    }).join('');
    document.getElementById('news-age').textContent = _relDate(items[0].pubDate);
  } catch(e) { console.warn('news fetch', e); }
}

function _newsCycle() {
  fetchNews();
  const el = document.getElementById('news');
  el.classList.add('visible');
  setTimeout(() => el.classList.remove('visible'), _NEWS_SHOW_MS);
}
_newsCycle();  // show immediately on load
setTimeout(() => setInterval(_newsCycle, _NEWS_CYCLE_MS), _NEWS_CYCLE_MS);

// ── Render loop ───────────────────────────────────────────────────────────────
const _FRAME_MS = 1000 / 30;  // 30fps — matches x11grab capture rate (force-cfr=1 in ffmpeg)
let _lastFrameTime = 0;

function animate() {
  setTimeout(animate, _FRAME_MS); // schedule first — prevents compounding delay when render takes >33ms
  const now = performance.now();
  const dt = Math.min((now - _lastFrameTime) * 0.001, 0.05); // capped at 50ms — prevents jump on lag spike
  _lastFrameTime = now;
  if (_hudDirty) { updateHUD(liveState); _hudDirty = false; }
  _updateEmotionWheel(dt);
  let handled = false;
  if (activeMode) handled = activeMode.update(liveState, dt) === true;
  if (!handled) {
    camera.position.x += (0 - camera.position.x) * 0.02;
    camera.position.y += (0 - camera.position.y) * 0.02;
    camera.lookAt(0,0,0);
    renderer.render(scene, camera);
  }
}
animate();

// Keyboard shortcuts: 1=chaos 2=globe 3=network 4=logo
window.addEventListener('keydown', (e) => {
  const map = { '1':'chaos', '2':'globe', '3':'network', '4':'logo' };
  if (map[e.key]) {
    userOverride = true;  // keep user's choice even when WS heartbeat sends a stale visual_mode
    switchMode(map[e.key]);
  }
});

window.addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
