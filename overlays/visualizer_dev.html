    this._boxHelper=new THREE.BoxHelper(bm,0x111122);
    this._boxHelper.material.blending=THREE.AdditiveBlending;
    this._boxHelper.material.transparent=true;
    this._boxHelper.material.opacity=0.5;
    this._group.add(this._boxHelper);

    // Positions + directions initiales (Math.random uniquement à l'init)
    for(let i=0;i<this._N;i++){
      this._particlePositions[i*3]  =(Math.random()-.5)*r;
      this._particlePositions[i*3+1]=(Math.random()-.5)*r;
      this._particlePositions[i*3+2]=(Math.random()-.5)*r;
      this._particleVelocities.push(
        new THREE.Vector3(Math.random()-.5,Math.random()-.5,Math.random()-.5).normalize()
      );
    }

    // Couleurs catégorie (statiques — jamais recalculées)
    const catCol=new Float32Array(this._N*3);
    for(let i=0;i<this._N;i++){
      const c=this._CATS[this._PDEFS[i].cat];
      catCol[i*3]=c.r; catCol[i*3+1]=c.g; catCol[i*3+2]=c.b;
    }

    // Géométrie points — deux attributs dynamiques : surpriseVal + activityVal
    const pGeo=new THREE.BufferGeometry();
    pGeo.setAttribute('position',  new THREE.BufferAttribute(this._particlePositions,3).setUsage(THREE.DynamicDrawUsage));
    pGeo.setAttribute('catColor',  new THREE.BufferAttribute(catCol,3));
    const sva=new THREE.BufferAttribute(this._surpriseVals,1); sva.setUsage(THREE.DynamicDrawUsage);
    const ava=new THREE.BufferAttribute(this._activityVals,1); ava.setUsage(THREE.DynamicDrawUsage);
    pGeo.setAttribute('surpriseVal',sva); this._surpriseAttr=sva;
    pGeo.setAttribute('activityVal',ava); this._activityAttr=ava;
    const pMat=new THREE.ShaderMaterial({
      uniforms:{ uTime:{value:0}, uUrgency:{value:0} },
      vertexShader:_NET_POINT_VS,fragmentShader:_NET_POINT_FS,
      transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,
    });
    this._pointMat=pMat;
    this._pointCloud=new THREE.Points(pGeo,pMat);
    this._group.add(this._pointCloud);

    // Géométrie lignes (drawrange dynamique) — shader flow animé
    const lGeo=new THREE.BufferGeometry();
    lGeo.setAttribute('position', new THREE.BufferAttribute(this._positions,    3).setUsage(THREE.DynamicDrawUsage));
    lGeo.setAttribute('connColor',new THREE.BufferAttribute(this._lineColors,   3).setUsage(THREE.DynamicDrawUsage));
    lGeo.setAttribute('lineT',    new THREE.BufferAttribute(this._lineTVals,    1)); // statique
    const csAttr=new THREE.BufferAttribute(this._connStrengths,1); csAttr.setUsage(THREE.DynamicDrawUsage);
    const cfAttr=new THREE.BufferAttribute(this._connFlows,   1); cfAttr.setUsage(THREE.DynamicDrawUsage);
    lGeo.setAttribute('connStr', csAttr); this._connStrAttr=csAttr;
    lGeo.setAttribute('connFlow',cfAttr); this._connFlowAttr=cfAttr;
    lGeo.computeBoundingSphere(); lGeo.setDrawRange(0,0);
    const lMat=new THREE.ShaderMaterial({
      uniforms:{ uTime:{value:0} }, // uFlowSpeed supprimé — flux per-arête via connFlow
      vertexShader:_NET_CONN_VS, fragmentShader:_NET_CONN_FS,
      transparent:true, depthWrite:false, blending:THREE.AdditiveBlending,
    });
    this._connMat=lMat;
    this._linesMesh=new THREE.LineSegments(lGeo,lMat);
    this._group.add(this._linesMesh);

  }

  update(state,dt){
    const r=this._r,rH=r/2;

    // Rotation constante (approuvée)
    this._group.rotation.y+=dt*this._ROTATION_SPEED;

    // Self-model : surprise, volatilité, PE, activité
    this._computeSelfModel(state);
    if(this._surpriseAttr)this._surpriseAttr.needsUpdate=true;
    if(this._activityAttr)this._activityAttr.needsUpdate=true;

    // Box : gris → rouge selon crisis_level
    if(this._boxHelper){
      const c=state.crisis_level||0;
      this._boxHelper.material.color.setRGB(0.06+c*.5,0.04*(1-c),0.08*(1-c));
    }

    // Seuil proximité : haute divergence → clusters resserrés, basse → graphe étendu
    const div=Math.min(1,Math.max(0,state.source_divergence||0));
    const minDist=100+(1-div)*220; // 100 (fragmenté) → 320 (cohérent)

    // Luminosité globale (plancher 0.08 pour éviter écran mort)
    const wt=Math.max(0.08,Math.min(1,state.world_temperature||0));

    // Urgence → pulsation taille des nœuds (porteur conditionnel)
    const urgency=Math.min(1,Math.max(0,state.urgency||0));
    const t=this._clock.getElapsedTime();
    const pulse=1+Math.sin(t*urgency*12)*urgency*0.5; // zéro quand urgency=0 ✓
    if(this._pointMat){
      this._pointMat.uniforms.uTime.value=t;
      this._pointMat.uniforms.uUrgency.value=urgency;
    }
    if(this._connMat) this._connMat.uniforms.uTime.value=t;
    if(this._cam.aspect!==innerWidth/innerHeight){
      this._cam.aspect=innerWidth/innerHeight;
      this._cam.updateProjectionMatrix();
    }

    // Wonder → légère variation d'opacité du fond étoilé
    if(this._starField){
      const wonder=Math.min(1,Math.max(0,state.wonder||0));
      this._starField.material.opacity=0.4+wonder*Math.abs(Math.sin(t*2))*0.3;
    }

    // Poids drift_weights du territoire courant (arêtes sémantiques)
    const territory=state.drift_territory||'ambient';
    const dw=state.drift_weights;
    const weights=(dw&&dw[territory])||{};

    // Déplacement : activité brute (0.7) + volatilité (0.3)
    for(let i=0;i<this._N;i++){
      const spd=(this._activityVals[i]*0.7+this._volVals[i]*0.3)*80;
      const v=this._particleVelocities[i];
      this._particlePositions[i*3]  +=v.x*spd*dt;
      this._particlePositions[i*3+1]+=v.y*spd*dt;
      this._particlePositions[i*3+2]+=v.z*spd*dt;
      if(Math.abs(this._particlePositions[i*3])  >rH)v.x=-v.x;
      if(Math.abs(this._particlePositions[i*3+1])>rH)v.y=-v.y;
      if(Math.abs(this._particlePositions[i*3+2])>rH)v.z=-v.z;
    }

    // Seuil adaptatif : cible ~150 connexions — monte si trop, descend si trop peu
    const dynThreshold=Math.max(0.006, Math.min(0.05, 0.008*this._lastNConn/150));
    // Max connexions par nœud selon crisis_level (5 calme → 9 crise)
    const maxConn=5+Math.round((state.crisis_level||0)*4);
    const minDist2=minDist*minDist;
    this._connCount.fill(0); // reset compteur par nœud

    // Calcul des arêtes — 3 types cumulatifs
    let vp=0,cp=0,sp=0,nConn=0;
    for(let i=0;i<this._N;i++){
      for(let j=i+1;j<this._N;j++){
        if(vp+6>this._positions.length)break;

        // Fast-reject : sauter si les deux nœuds sont inactifs et sans poids sémantique
        const ki=this._PDEFS[i].key, kj=this._PDEFS[j].key;
        const wi=weights[ki]||0, wj=weights[kj]||0;
        const semantic=wi*wj*4;
        const actSum=this._activityVals[i]+this._activityVals[j];
        const peSum =this._peVals[i]      +this._peVals[j];
        if(actSum<0.02 && peSum<0.01 && semantic<dynThreshold)continue;

        // Max connexions par nœud — évite le hairball
        if(this._connCount[i]>=maxConn||this._connCount[j]>=maxConn)continue;

        // Distance — fast-reject carré avant sqrt
        const dx=this._particlePositions[i*3]  -this._particlePositions[j*3];
        const dy=this._particlePositions[i*3+1]-this._particlePositions[j*3+1];
        const dz=this._particlePositions[i*3+2]-this._particlePositions[j*3+2];
        const dist2=dx*dx+dy*dy+dz*dz;
        const prox=dist2<minDist2?(1-Math.sqrt(dist2)/minDist):0;

        // Arête A — activité × proximité
        const baseActivity=prox*actSum*0.18;
        // Arête C — anomalies simultanées proches
        const anomalyProx=prox*peSum*0.5;

        const strength=Math.max(baseActivity,semantic,anomalyProx);
        if(strength<dynThreshold)continue;

        this._connCount[i]++; this._connCount[j]++;

        // Alpha : base solide pour que le bloom élargisse la ligne 1px
        const alpha=Math.min(0.95,strength*(0.55+wt*0.40)*pulse);
        const ci=this._CATS[this._PDEFS[i].cat];
        const cj=this._CATS[this._PDEFS[j].cat];
        this._positions[vp++]=this._particlePositions[i*3];
        this._positions[vp++]=this._particlePositions[i*3+1];
        this._positions[vp++]=this._particlePositions[i*3+2];
        this._positions[vp++]=this._particlePositions[j*3];
        this._positions[vp++]=this._particlePositions[j*3+1];
        this._positions[vp++]=this._particlePositions[j*3+2];
        // Couleur pure (non prémultipliée) — le shader gère l'alpha via connStr
        this._lineColors[cp++]=ci.r;this._lineColors[cp++]=ci.g;this._lineColors[cp++]=ci.b;
        this._lineColors[cp++]=cj.r;this._lineColors[cp++]=cj.g;this._lineColors[cp++]=cj.b;
        // Flux per-arête : PE × 10 + activité × 3 + surprise × 6 (NO_FAKE, zéro si au repos)
        const peAvg   =(this._peVals[i]      +this._peVals[j])      *0.5;
        const actAvg  =(this._activityVals[i]+this._activityVals[j]) *0.5;
        const surprAvg=(this._surpriseVals[i]+this._surpriseVals[j]) *0.5;
        const edgeFlow=peAvg*10.0+actAvg*3.0+surprAvg*6.0;
        this._connStrengths[sp]=alpha; this._connFlows[sp]=edgeFlow; sp++;
        this._connStrengths[sp]=alpha; this._connFlows[sp]=edgeFlow; sp++;
        nConn++;
      }
    }

    this._lastNConn=nConn;
    this._linesMesh.geometry.setDrawRange(0,nConn*2);
    this._linesMesh.geometry.attributes.position.needsUpdate=true;
    this._linesMesh.geometry.attributes.connColor.needsUpdate=true;
    if(this._connStrAttr)  this._connStrAttr.needsUpdate=true;
    if(this._connFlowAttr) this._connFlowAttr.needsUpdate=true;
    this._pointCloud.geometry.attributes.position.needsUpdate=true;

    scene.background=new THREE.Color(0,0,0);
    renderer.render(scene,this._cam);
    return true;
  }

  dispose(sc){
    if(this._group){sc.remove(this._group);this._group=null;}
    if(this._starField){sc.remove(this._starField);this._starField.geometry.dispose();this._starField=null;}
    scene.background=new THREE.Color(0x000000);
    // Rétablit la résolution correcte pour les autres scènes
    renderer.setSize(innerWidth,innerHeight);
  }
}

// ── Mode NEXUS — shaders ──────────────────────────────────────────────────────

// Vertex shader : icosaèdre wireframe déformé par simplex noise + audio_energy_level
const _NX_OUTER_VS = `
uniform float uTime; uniform float uAudioLevel; uniform float uDistortion;
uniform vec3 uColor;
vec3 nx289(vec3 x){return x-floor(x*(1.0/289.0))*289.0;}
vec4 nx289v(vec4 x){return x-floor(x*(1.0/289.0))*289.0;}
vec4 nxperm(vec4 x){return nx289v(((x*34.0)+1.0)*x);}
vec4 nxtis(vec4 r){return 1.79284291400159-0.85373472095314*r;}
float snoise(vec3 v){
  const vec2 C=vec2(1.0/6.0,1.0/3.0);const vec4 D=vec4(0.0,0.5,1.0,2.0);
  vec3 i=floor(v+dot(v,C.yyy));vec3 x0=v-i+dot(i,C.xxx);
  vec3 g=step(x0.yzx,x0.xyz);vec3 l=1.0-g;
  vec3 i1=min(g.xyz,l.zxy);vec3 i2=max(g.xyz,l.zxy);
  vec3 x1=x0-i1+C.xxx;vec3 x2=x0-i2+C.yyy;vec3 x3=x0-D.yyy;
  i=nx289(i);
  vec4 p=nxperm(nxperm(nxperm(i.z+vec4(0.0,i1.z,i2.z,1.0))+i.y+vec4(0.0,i1.y,i2.y,1.0))+i.x+vec4(0.0,i1.x,i2.x,1.0));
  float n_=0.142857142857;vec3 ns=n_*D.wyz-D.xzx;
  vec4 j=p-49.0*floor(p*ns.z*ns.z);
  vec4 x_=floor(j*ns.z);vec4 y_=floor(j-7.0*x_);
  vec4 x=x_*ns.x+ns.yyyy;vec4 y=y_*ns.x+ns.yyyy;vec4 h=1.0-abs(x)-abs(y);
  vec4 b0=vec4(x.xy,y.xy);vec4 b1=vec4(x.zw,y.zw);
  vec4 s0=floor(b0)*2.0+1.0;vec4 s1=floor(b1)*2.0+1.0;vec4 sh=-step(h,vec4(0.0));
  vec4 a0=b0.xzyw+s0.xzyw*sh.xxyy;vec4 a1=b1.xzyw+s1.xzyw*sh.zzww;
  vec3 p0=vec3(a0.xy,h.x);vec3 p1=vec3(a0.zw,h.y);vec3 p2=vec3(a1.xy,h.z);vec3 p3=vec3(a1.zw,h.w);
  vec4 norm=nxtis(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));
  p0*=norm.x;p1*=norm.y;p2*=norm.z;p3*=norm.w;
  vec4 m=max(0.6-vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)),0.0);m=m*m;
  return 42.0*dot(m*m,vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3)));
}
void main(){
  vec3 pos=position;
  float noise=snoise(vec3(position.x*0.5,position.y*0.5,position.z*0.5+uTime*0.3));
  float signal=max(0.05,uAudioLevel); // 5% floor — NO_FAKE base minimal
  pos+=normal*noise*0.3*uDistortion*signal;
  gl_Position=projectionMatrix*modelViewMatrix*vec4(pos,1.0);
}`;

const _NX_OUTER_FS = `
uniform vec3 uColor;uniform float uAudioLevel;
void main(){gl_FragColor=vec4(uColor,0.55+uAudioLevel*0.45);}`;

const _NX_GLOW_VS = `
varying vec3 vNormal;varying vec3 vPos;
void main(){
  vNormal=normalize(normalMatrix*normal);
  vPos=(modelMatrix*vec4(position,1.0)).xyz;
  gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);
}`;

// Fresnel glow — pow() remplacé par triple multiplication (pas de transcendante)
const _NX_GLOW_FS = `
uniform vec3 uColor;uniform float uAudioLevel;
varying vec3 vNormal;varying vec3 vPos;
void main(){
  vec3 vd=normalize(cameraPosition-vPos);
  float f=1.0-max(0.0,dot(vd,vNormal));
  float g=f*f*f*(0.4+uAudioLevel*1.6);
  gl_FragColor=vec4(uColor*g,g*0.75);
}`;

const _NX_PART_VS = `
uniform float uTime;uniform float uAudioLevel;
attribute vec3 color;varying vec3 vCol;
void main(){
  vCol=color;
  vec3 pos=position;
  // mouvement conditionné par audio (NO_FAKE: porteur conditionnel)
  pos.x+=sin(uTime*0.1+position.z*0.2)*0.5*uAudioLevel;
  pos.y+=cos(uTime*0.1+position.x*0.2)*0.5*uAudioLevel;
  vec4 mv=modelViewMatrix*vec4(pos,1.0);
  gl_PointSize=clamp(50.0/-mv.z,4.0,32.0); // min 4 — circle-clip works at ≥4px (r=0.53>0.5)
  gl_Position=projectionMatrix*mv;
}`;

const _NX_PART_FS = `
varying vec3 vCol;
void main(){
  float r=distance(gl_PointCoord,vec2(0.5));
  if(r>0.5)discard;
  gl_FragColor=vec4(vCol,smoothstep(0.5,0.0,r)*0.85);
}`;

// Node dots — per-node aActivation (PE-driven) + nodeFireFlash on pulse receipt
const _NX_NODE_VS = `
attribute float aActivation;
attribute float nodeFireFlash;
uniform float uAudioLevel; uniform float uHealthRatio;
varying float vAct; varying float vFlash;
void main(){
  vAct=aActivation; vFlash=nodeFireFlash;
  vec4 mv=modelViewMatrix*vec4(position,1.0);
  float sz=(2.0+uAudioLevel*8.0+aActivation*10.0+uHealthRatio*2.0+nodeFireFlash*8.0)*200.0;
  gl_PointSize=clamp(sz/-mv.z,4.0,24.0);
  gl_Position=projectionMatrix*mv;
}`;
const _NX_NODE_FS = `
uniform vec3 uColor; uniform float uAudioLevel;
varying float vAct; varying float vFlash;
void main(){
  float r=distance(gl_PointCoord,vec2(0.5));
  if(r>0.5)discard;
  float core=smoothstep(0.5,0.05,r);
  float halo=smoothstep(0.5,0.20,r)*vAct*0.7;
  // Flash ring — anneau fin à réception (porteur conditionnel: vFlash)
  float flashRing=smoothstep(0.36,0.40,r)*smoothstep(0.48,0.42,r)*vFlash;
  vec3 col=mix(uColor*(0.55+uAudioLevel*0.50+vAct*0.35),vec3(0.7,1.0,1.9),vFlash*0.85);
  col=mix(col,vec3(0.4,0.95,1.8),flashRing*0.90);
  gl_FragColor=vec4(col,(core+halo+flashRing*vFlash*0.78)*(1.0+vFlash*0.40));
}`;

// Subdivided edge — aT static, aPulseT+aActivation dynamic (NO_FAKE: BPM+PE-driven)
const _NX_EDGE_VS = `
attribute float aT;
attribute float aPulseT;
attribute float aActivation;
attribute vec3  aEdgeDir;
attribute float aSide;
uniform float uLineWidth;
uniform vec2  uResolution;
varying float vT; varying float vPulse; varying float vPulseH; varying float vAct;
varying float vPulse2; varying float vPulseH2;
void main(){
  float d=abs(aT-aPulseT); d=min(d,1.0-d);
  vPulse =exp(-d*d*120.0);
  vPulseH=exp(-d*d*15.0);
  // Second data packet — phase +0.5, porteur conditionnel sur aActivation > 0.3
  float pT2=fract(aPulseT+0.5);
  float d2=abs(aT-pT2); d2=min(d2,1.0-d2);
  float gate=clamp((aActivation-0.30)*3.33,0.0,1.0);
  vPulse2 =exp(-d2*d2*120.0)*gate;
  vPulseH2=exp(-d2*d2*15.0)*gate;
  vT=aT; vAct=aActivation;
  vec4 clip    =projectionMatrix*modelViewMatrix*vec4(position,1.0);
  vec4 clipRef =projectionMatrix*modelViewMatrix*vec4(position+aEdgeDir*0.5,1.0);
  vec2 screenDir=normalize((clipRef.xy/clipRef.w-clip.xy/clip.w)*uResolution);
  vec2 screenNorm=vec2(-screenDir.y,screenDir.x);
  clip.xy+=screenNorm*(uLineWidth/uResolution.y)*aSide*clip.w;
  gl_Position=clip;
}`;
const _NX_EDGE_FS = `
uniform vec3 uColor; uniform float uAudioLevel; uniform float uAnomalyScore;
varying float vT; varying float vPulse; varying float vPulseH; varying float vAct;
varying float vPulse2; varying float vPulseH2;
void main(){
  float center=max(0.0,1.0-abs(vT-0.5)*1.8);
  float base=max(0.10,vAct*0.60+uAnomalyScore*0.40)*center;
  float alpha=base+vPulse*uAudioLevel*1.1+vPulseH*uAudioLevel*0.35
             +vPulse2*uAudioLevel*0.70+vPulseH2*uAudioLevel*0.22;
  if(alpha<0.015)discard;
  vec3 col=mix(uColor,vec3(1.3,1.3,1.6),vPulse*uAudioLevel*0.80);
  col=mix(col,vec3(0.5,0.85,1.8),vPulseH*uAudioLevel*0.20);
  col=mix(col,vec3(1.4,1.2,1.6),vPulse2*uAudioLevel*0.60);
  gl_FragColor=vec4(col,alpha);
}`;

// ── Mode NEXUS — anomalie + réseau neural driven par GlobalState ──────────────
class NexusMode {
  constructor(){
    this._time=0; this._SEGS=6;
    this._anomaly=null; this._glowMesh=null; this._particles=null;
    this._outerMat=null; this._glowMat=null; this._particleMat=null;
    this._networkGroup=null;
    this._nodeDots=null; this._edges=null;
    this._nodeMat=null; this._edgeMat=null;
    this._nodePositions=null; this._edgePairs=null; this._pulseT=null;
    this._nodeActData=null; this._nodeActAttr=null;
    this._edgePulseTData=null; this._edgePulseTAttr=null;
    this._edgeActData=null; this._edgeActAttr=null;
    this._nodeFlashData=null; this._nodeFlashAttr=null;
    this._COLS={
      ambient:      new THREE.Color(0x00D4FF),
      crisis:       new THREE.Color(0xFF4444),
      peak:         new THREE.Color(0xFFD700),
      drift:        new THREE.Color(0xAA44FF),
      storm:        new THREE.Color(0xFF8844),
      contemplative:new THREE.Color(0x44AAFF),
    };
  }

  init(sc, cam){
    cam.position.set(0,0,8); cam.lookAt(0,0,0);
    sc.fog=new THREE.FogExp2(0x0a0e17,0.025);
    this._buildAnomaly(sc);
    this._buildNetwork(sc);
    this._buildParticles(sc);
  }

  _buildAnomaly(sc){
    const geo=new THREE.IcosahedronGeometry(2,2);
    const mat=new THREE.ShaderMaterial({
      uniforms:{uTime:{value:0},uAudioLevel:{value:0},uDistortion:{value:0.5},uColor:{value:new THREE.Color(0x00D4FF)}},
      vertexShader:_NX_OUTER_VS, fragmentShader:_NX_OUTER_FS,
      wireframe:true, transparent:true,
    });
    this._anomaly=new THREE.Mesh(geo,mat); this._outerMat=mat; sc.add(this._anomaly);
  }

  _buildNetwork(sc){
    const N=28, SEGS=this._SEGS;
    // Fibonacci sphere — uniform node distribution around the anomaly core
    const nodePos=[], phi=Math.PI*(3-Math.sqrt(5));
    for(let i=0;i<N;i++){
      const y=1-(i/(N-1))*2, r=Math.sqrt(Math.max(0,1-y*y)), th=phi*i;
      nodePos.push(new THREE.Vector3(Math.cos(th)*r*4.2, y*4.2, Math.sin(th)*r*4.2));
    }
    this._nodePositions=nodePos;

    // KNN-3 adjacency
    const edgePairs=[], edgeSet=new Set();
    for(let i=0;i<N;i++){
      const d=[];
      for(let j=0;j<N;j++){ if(i!==j) d.push([j,nodePos[i].distanceTo(nodePos[j])]); }
      d.sort((a,b)=>a[1]-b[1]);
      for(let k=0;k<3;k++){
        const j=d[k][0], key=Math.min(i,j)+','+Math.max(i,j);
        if(!edgeSet.has(key)){ edgeSet.add(key); edgePairs.push([i,j]); }
      }
    }
    this._edgePairs=edgePairs;
    const E=edgePairs.length;

    this._networkGroup=new THREE.Group(); sc.add(this._networkGroup);

    // Node dots — per-node aActivation (dynamic, PE-driven)
    const nodePosArr=new Float32Array(N*3);
    const nodeActArr=new Float32Array(N).fill(0.3);
    nodePos.forEach((v,i)=>{ nodePosArr[i*3]=v.x; nodePosArr[i*3+1]=v.y; nodePosArr[i*3+2]=v.z; });
    const nodeGeo=new THREE.BufferGeometry();
    nodeGeo.setAttribute('position',new THREE.BufferAttribute(nodePosArr,3));
    const nodeActAttr=new THREE.BufferAttribute(nodeActArr,1);
    nodeActAttr.setUsage(THREE.DynamicDrawUsage);
    nodeGeo.setAttribute('aActivation',nodeActAttr);
    this._nodeMat=new THREE.ShaderMaterial({
      uniforms:{uAudioLevel:{value:0},uHealthRatio:{value:1},uColor:{value:new THREE.Color(0x00D4FF)}},
      vertexShader:_NX_NODE_VS, fragmentShader:_NX_NODE_FS,
      transparent:true, depthWrite:false, blending:THREE.AdditiveBlending,
    });
    this._nodeDots=new THREE.Points(nodeGeo,this._nodeMat);
    this._nodeActData=nodeActArr; this._nodeActAttr=nodeActAttr;
    const nodeFlashArr=new Float32Array(N);
    const nodeFlashAttr=new THREE.BufferAttribute(nodeFlashArr,1); nodeFlashAttr.setUsage(THREE.DynamicDrawUsage);
    nodeGeo.setAttribute('nodeFireFlash',nodeFlashAttr);
    this._nodeFlashData=nodeFlashArr; this._nodeFlashAttr=nodeFlashAttr;
    this._networkGroup.add(this._nodeDots);

    // Subdivided edges — billboard quads: 4 vertices per segment (t0_L, t0_R, t1_L, t1_R)
    const VERTS=E*SEGS*4;
    const edgePosArr  =new Float32Array(VERTS*3);
    const edgeTArr    =new Float32Array(VERTS);
    const edgeDirArr  =new Float32Array(VERTS*3);
    const edgeSideArr =new Float32Array(VERTS);
    const edgePulseTArr=new Float32Array(VERTS);
    const edgeActArr   =new Float32Array(VERTS);
    edgePairs.forEach(([ai,bi],ei)=>{
      const a=nodePos[ai], b=nodePos[bi];
      const dx=b.x-a.x, dy=b.y-a.y, dz=b.z-a.z;
      const len=Math.sqrt(dx*dx+dy*dy+dz*dz)||1;
      const dirX=dx/len, dirY=dy/len, dirZ=dz/len;
      for(let s=0;s<SEGS;s++){
        const t0=s/SEGS, t1=(s+1)/SEGS;
        // 4 vertices: index = (ei*SEGS+s)*4 + k
        for(let k=0;k<4;k++){
          const vi=(ei*SEGS+s)*4+k;
          const t=(k<2)?t0:t1, side=(k%2===0)?-1:1;
          edgePosArr[vi*3  ]=a.x+(b.x-a.x)*t;
          edgePosArr[vi*3+1]=a.y+(b.y-a.y)*t;
          edgePosArr[vi*3+2]=a.z+(b.z-a.z)*t;
          edgeTArr[vi]=t;
          edgeDirArr[vi*3  ]=dirX; edgeDirArr[vi*3+1]=dirY; edgeDirArr[vi*3+2]=dirZ;
          edgeSideArr[vi]=side;
        }
      }
    });
    const edgeIdx=[];
    edgePairs.forEach((_,ei)=>{
      for(let s=0;s<SEGS;s++){
        const b0=(ei*SEGS+s)*4;
        edgeIdx.push(b0,b0+1,b0+2, b0+1,b0+3,b0+2);
      }
    });
    const edgeGeo=new THREE.BufferGeometry();
    edgeGeo.setAttribute('position',  new THREE.BufferAttribute(edgePosArr,3));
    edgeGeo.setAttribute('aT',        new THREE.BufferAttribute(edgeTArr,1));
    edgeGeo.setAttribute('aEdgeDir',  new THREE.BufferAttribute(edgeDirArr,3));
    edgeGeo.setAttribute('aSide',     new THREE.BufferAttribute(edgeSideArr,1));
    edgeGeo.setIndex(edgeIdx);
    const ePulseTAttr=new THREE.BufferAttribute(edgePulseTArr,1);
    ePulseTAttr.setUsage(THREE.DynamicDrawUsage);
    edgeGeo.setAttribute('aPulseT',ePulseTAttr);
    const eActAttr=new THREE.BufferAttribute(edgeActArr,1);
    eActAttr.setUsage(THREE.DynamicDrawUsage);
    edgeGeo.setAttribute('aActivation',eActAttr);
    this._edgeMat=new THREE.ShaderMaterial({
      uniforms:{
        uColor:{value:new THREE.Color(0x00D4FF)},uAudioLevel:{value:0},uAnomalyScore:{value:0},
        uLineWidth:{value:2.5},uResolution:{value:new THREE.Vector2(innerWidth,innerHeight)},
      },
      vertexShader:_NX_EDGE_VS, fragmentShader:_NX_EDGE_FS,
      transparent:true, depthWrite:false, blending:THREE.AdditiveBlending, side:THREE.DoubleSide,
    });
    this._edges=new THREE.Mesh(edgeGeo,this._edgeMat);
    this._edgePulseTData=edgePulseTArr; this._edgePulseTAttr=ePulseTAttr;
    this._edgeActData=edgeActArr; this._edgeActAttr=eActAttr;
    this._pulseT=new Float32Array(E).map((_,i)=>i/E);
    this._networkGroup.add(this._edges);
  }

  _buildParticles(sc){
    const N=150, pos=new Float32Array(N*3), col=new Float32Array(N*3);
    const c1=new THREE.Color(0x00D4FF), c2=new THREE.Color(0x003355);
    for(let i=0;i<N;i++){
      pos[i*3]=(Math.random()-0.5)*60; pos[i*3+1]=(Math.random()-0.5)*60; pos[i*3+2]=(Math.random()-0.5)*60;
      const t=Math.random();
      col[i*3]=c1.r*t+c2.r*(1-t); col[i*3+1]=c1.g*t+c2.g*(1-t); col[i*3+2]=c1.b*t+c2.b*(1-t);
    }
    const geo=new THREE.BufferGeometry();
    geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
    geo.setAttribute('color',new THREE.BufferAttribute(col,3));
    const mat=new THREE.ShaderMaterial({
      uniforms:{uTime:{value:0},uAudioLevel:{value:0}},
      vertexShader:_NX_PART_VS, fragmentShader:_NX_PART_FS,
      transparent:true, depthWrite:false, blending:THREE.AdditiveBlending,
    });
    this._particles=new THREE.Points(geo,mat); this._particleMat=mat; sc.add(this._particles);
  }

  update(state,dt){
    const energy  =state.audio_energy_level||0;
    const bpm     =state.audio_bpm||90;
    const anomaly =Math.min(1,(state.anomaly_score||0)/10);
    const terr    =state.drift_territory||'ambient';
    const col     =this._COLS[terr]||this._COLS.ambient;
    const driftVel=state.drift_velocity||0;

    const hVals=Object.values(state.source_health||{});
    const healthRatio=hVals.length ? hVals.filter(Boolean).length/hVals.length : 1;

    // prediction_errors → per-edge + per-node activation (NO_FAKE: PE signal)
    const peVals=Object.values(state.prediction_errors||{});
    const maxPE=peVals.length ? Math.max(0.01,...peVals.map(v=>Math.abs(v))) : 1;

    this._time+=Math.max(0.02,energy)*dt;

    // Anomaly core
    this._outerMat.uniforms.uTime.value      =this._time;
    this._outerMat.uniforms.uAudioLevel.value=energy;
    this._outerMat.uniforms.uDistortion.value=0.5+anomaly*1.5;
    this._outerMat.uniforms.uColor.value.copy(col);

    // Network
    this._nodeMat.uniforms.uAudioLevel.value  =energy;
    this._nodeMat.uniforms.uHealthRatio.value =healthRatio;
    this._nodeMat.uniforms.uColor.value.copy(col);
    this._edgeMat.uniforms.uAudioLevel.value  =energy;
    this._edgeMat.uniforms.uAnomalyScore.value=anomaly;
    this._edgeMat.uniforms.uColor.value.copy(col);
    this._edgeMat.uniforms.uResolution.value.set(innerWidth,innerHeight);

    // Pulse speed = BPM/60, activation = PE per-edge (NO_FAKE)
    const pulseSpeed=(bpm/60)*dt*0.30;
    const SEGS=this._SEGS, ep=this._edgePairs;
    for(let ei=0;ei<ep.length;ei++){
      const prevT=this._pulseT[ei];
      this._pulseT[ei]=(prevT+pulseSpeed)%1.0;
      const pev=peVals.length ? Math.min(1,Math.abs(peVals[ei%peVals.length]||0)/maxPE) : energy*0.5;
      const pT=this._pulseT[ei];
      // destination node flash when pulse wraps (NO_FAKE: activation-gated)
      if(prevT>0.85&&pT<0.15&&this._nodeFlashData&&pev>0.08){
        const destIdx=ep[ei][1];
        this._nodeFlashData[destIdx]=Math.max(this._nodeFlashData[destIdx],pev*0.7);
      }
      for(let s=0;s<SEGS;s++){
        const v=(ei*SEGS+s)*4;
        this._edgePulseTData[v]=this._edgePulseTData[v+1]=this._edgePulseTData[v+2]=this._edgePulseTData[v+3]=pT;
        this._edgeActData[v]=this._edgeActData[v+1]=this._edgeActData[v+2]=this._edgeActData[v+3]=pev;
      }
    }
    this._edgePulseTAttr.needsUpdate=true;
    this._edgeActAttr.needsUpdate=true;
    // decay node flash
    if(this._nodeFlashData){
      for(let ni=0;ni<this._nodeFlashData.length;ni++)this._nodeFlashData[ni]*=0.91;
      this._nodeFlashAttr.needsUpdate=true;
    }

    // Per-node activation — different PE index offset (NO_FAKE: PE signal)
    const N=this._nodePositions.length;
    for(let ni=0;ni<N;ni++){
      this._nodeActData[ni]=peVals.length
        ? Math.min(1,Math.abs(peVals[(ni*3+7)%peVals.length]||0)/maxPE*1.3)
        : energy*0.4;
    }
    this._nodeActAttr.needsUpdate=true;

    // Background particles
    this._particleMat.uniforms.uTime.value      =this._time;
    this._particleMat.uniforms.uAudioLevel.value=energy;

    const rotSpeed=(bpm/120)*0.010;
    this._anomaly.rotation.y+=rotSpeed;
    this._anomaly.rotation.z+=rotSpeed*0.4;
    this._networkGroup.rotation.y+=rotSpeed*0.55+driftVel*0.004;
    this._networkGroup.rotation.x+=rotSpeed*0.18;

    renderer.render(scene,camera);
    return true;
  }

  dispose(sc){
    sc.fog=null;
    const d=obj=>{ if(!obj)return; if(obj.geometry)obj.geometry.dispose(); if(obj.material)obj.material.dispose(); sc.remove(obj); };
    d(this._anomaly); d(this._particles);
    if(this._networkGroup){
      this._networkGroup.traverse(c=>{ if(c.geometry)c.geometry.dispose(); if(c.material)c.material.dispose(); });
      sc.remove(this._networkGroup);
    }
    this._anomaly=this._glowMesh=this._particles=this._networkGroup=null;
    this._nodeDots=this._edges=null;
    this._outerMat=this._glowMat=this._particleMat=null;
    this._nodeMat=this._edgeMat=null;
    this._nodeFlashData=this._nodeFlashAttr=null;
  }
}

// ─── WARPMODE — Computation-graph warp tunnel ─────────────────────────────────
// N rings of wireframe cuboid panels fly toward the camera along the Z axis.
// Each ring has one panel per tracked PE channel (8 channels displayed).
// Panel radial extent ∝ |PE(ch)| / σ(ch)  (precision-weighted z-score).
// Tunnel speed ∝ drift_velocity. Fog ∝ crisis_level. Opacity ∝ anomaly_score.
// NO_FAKE: base scroll is a display constant (tunnel must move to be visible,
// analogous to OrbitControls autoRotate). All extents and opacity = GlobalState.
// Geometry: 8 merged LineSegments (one per channel) instead of 160 separate objects.
// Per frame: positions written into DynamicDrawUsage Float32Array buffers.
class WarpMode {
  static _NR  = 20;   // ring count
  static _NS  = 8;    // segments per ring = PE channels tracked
  static _R   = 2.4;  // tunnel radius (world units)
  static _D   = 3.0;  // ring Z-spacing
  static _CH  = ['excitement','anxiety','frustration','curiosity',
                  'crisis_level','audience_energy','drift_velocity','anomaly_score'];
  // Couleurs par canal — palette OpenAI/ChatGPT
  // excitement, anxiety, frustration, curiosity, crisis_level, audience_energy, drift_velocity, anomaly_score
  static _COL = [0x10A37F, 0x74aa9c, 0xef4444, 0xab68ff,
                 0xd97706, 0xececf1, 0x10B981, 0x6366f1];

  constructor() {
    this._group    = null;
    this._lines    = [];   // LineSegments[NS] — one merged geometry per channel
    this._mats     = [];   // LineBasicMaterial[NS]
    this._posArrs  = [];   // Float32Array[NS] — raw position buffers (DynamicDrawUsage)
    this._posAttrs = [];   // BufferAttribute[NS]
    this._ringZs   = null; // Float32Array[NR] — ring z positions
    this._baseBox  = null; // Float32Array[24*3] — local box template (12 edges × 2 verts)
    this._csArr    = null; // Float32Array[NS] — precomputed cos(θs)
    this._ssArr    = null; // Float32Array[NS] — precomputed sin(θs)
    this._sigCur   = new Float32Array(WarpMode._NS);
    this._sigTgt   = new Float32Array(WarpMode._NS);
    this._roll     = 0;
  }

  init(sc, cam) {
    cam.position.set(0, 0, 9);
    cam.lookAt(0, 0, 0);
    sc.fog = new THREE.FogExp2(0x000402, 0.022); // micro-teinte verte OpenAI
    this._group = new THREE.Group();
    sc.add(this._group);

    const { _NR: NR, _NS: NS, _R: R, _D: D } = WarpMode;
    const dθ    = (Math.PI * 2) / NS;
    const chord = 2 * R * Math.sin(Math.PI / NS) * 0.86;
    const depth = D * 0.90;

    // Per-channel angles (fixed; group.rotation.z drives tunnel spin)
    this._csArr = new Float32Array(NS);
    this._ssArr = new Float32Array(NS);
    for (let s = 0; s < NS; s++) {
      const θ = s * dθ; this._csArr[s] = Math.cos(θ); this._ssArr[s] = Math.sin(θ);
    }

    // Box template: BoxGeometry(1, chord, depth) → 12 edges × 2 verts = 24 verts
    // Local X is the scale target (radial extent driven by sigCur[s])
    const hw = 0.5, hh = chord / 2, hd = depth / 2;
    const cx = [[-hw,-hh,-hd],[+hw,-hh,-hd],[+hw,+hh,-hd],[-hw,+hh,-hd],
                [-hw,-hh,+hd],[+hw,-hh,+hd],[+hw,+hh,+hd],[-hw,+hh,+hd]];
    const ei = [[0,1],[1,2],[2,3],[3,0],[4,5],[5,6],[6,7],[7,4],[0,4],[1,5],[2,6],[3,7]];
    this._baseBox = new Float32Array(24 * 3);
    let bi = 0;
    for (const [a, b] of ei) {
      this._baseBox[bi++]=cx[a][0]; this._baseBox[bi++]=cx[a][1]; this._baseBox[bi++]=cx[a][2];
      this._baseBox[bi++]=cx[b][0]; this._baseBox[bi++]=cx[b][1]; this._baseBox[bi++]=cx[b][2];
    }

    // Ring z positions
    this._ringZs = new Float32Array(NR);
    for (let r = 0; r < NR; r++) this._ringZs[r] = -(NR - 1 - r) * D;

    // One merged LineSegments per channel (8 draw calls, not 160)
    for (let s = 0; s < NS; s++) {
      const posArr  = new Float32Array(NR * 24 * 3);
      const posAttr = new THREE.BufferAttribute(posArr, 3);
      posAttr.setUsage(THREE.DynamicDrawUsage);
      const geo  = new THREE.BufferGeometry();
      geo.setAttribute('position', posAttr);
      const mat  = new THREE.LineBasicMaterial({ color: WarpMode._COL[s], transparent: true, opacity: 0.5, fog: true });
      const line = new THREE.LineSegments(geo, mat);
      this._group.add(line);
      this._lines.push(line); this._mats.push(mat);
      this._posArrs.push(posArr); this._posAttrs.push(posAttr);
    }
    this._writePositions(NR, NS, R, 0.12, 0.85);
  }

  // Rewrite all vertex positions from ring z-positions and per-channel scale.
  // Transform: local → scale X → rotate θs → translate (R·cos θs, R·sin θs, ringZ)
  _writePositions(NR, NS, R, BASE, GAIN) {
    const bb = this._baseBox;
    for (let s = 0; s < NS; s++) {
      const cs = this._csArr[s], ss = this._ssArr[s];
      const sx = BASE + this._sigCur[s] * GAIN;
      const arr = this._posArrs[s];
      for (let r = 0; r < NR; r++) {
        const rz = this._ringZs[r], base = r * 24 * 3;
        for (let v = 0; v < 24; v++) {
          const lx = bb[v*3] * sx, ly = bb[v*3+1], lz = bb[v*3+2];
          const o = base + v * 3;
          arr[o]   = cs * (R + lx) - ss * ly;
          arr[o+1] = ss * (R + lx) + cs * ly;
          arr[o+2] = rz + lz;
        }
      }
      this._posAttrs[s].needsUpdate = true;
    }
  }

  update(state, dt) {
    if (!this._group) return false;
    const pe  = state?.prediction_errors  || {};
    const vol = state?.signal_volatilities || {};
    const { _NS: NS, _CH: CH, _NR: NR, _D: D, _R: R } = WarpMode;

    for (let c = 0; c < NS; c++) {
      const k = CH[c];
      this._sigTgt[c] = Math.min(Math.abs((pe[k]||0) / Math.max(vol[k]||0.1, 0.01)), 3.0);
    }
    for (let c = 0; c < NS; c++) this._sigCur[c] += (this._sigTgt[c] - this._sigCur[c]) * 0.06;

    const dv   = Math.max(0, Math.min(1, state?.drift_velocity || 0));
    // dt-based speed — frame-rate independent; base = display constant (~75s/pass at 30fps)
    const spd  = (0.8 + dv * 2.2) * dt;
    const anom = Math.max(0, Math.min(1, state?.anomaly_score || 0));
    const cris = Math.max(0, Math.min(1, state?.crisis_level  || 0));

    scene.fog.density = 0.022 + cris * 0.03;
    // Slow tunnel spin — display constant (autoRotate equivalent, NO_FAKE OK)
    // One full revolution ≈ 90s at base; makes different PE channels cycle into focus
    this._roll += 0.07 * dt;
    this._group.rotation.z = this._roll;

    // BASE = 0.12 — floor ~4% of full range [0.12..2.67] — évite tunnel invisible à PE=0
    const BASE = 0.12, GAIN = 0.85;
    const WRAP = 9 + D * 0.5;

    for (let s = 0; s < NS; s++)
      this._mats[s].opacity = Math.max(0.06, Math.min(0.90, 0.10 + this._sigCur[s] * 0.50 + anom * 0.28));

    for (let r = 0; r < NR; r++) {
      this._ringZs[r] += spd;
      if (this._ringZs[r] > WRAP) this._ringZs[r] -= NR * D;
    }
    this._writePositions(NR, NS, R, BASE, GAIN);

    renderer.render(scene, camera);
    return true;
  }

  dispose(sc) {
    this._lines.forEach(l => l.geometry.dispose());
    this._mats.forEach(m => m.dispose());
    if (this._group) sc.remove(this._group);
    sc.fog = null;
    this._group = null; this._lines = []; this._mats = []; this._posArrs = []; this._posAttrs = [];
  }
}

// ── Mode LOGO — ChatGPT logo, vertex shader deformation ──────────────────────

// Simplex noise helpers (verbatim from _NX_OUTER_VS)
const _LM_SNOISE_GLSL = `
vec3 lm289(vec3 x){return x-floor(x*(1.0/289.0))*289.0;}
vec4 lm289v(vec4 x){return x-floor(x*(1.0/289.0))*289.0;}
vec4 lmperm(vec4 x){return lm289v(((x*34.0)+1.0)*x);}
vec4 lmtis(vec4 r){return 1.79284291400159-0.85373472095314*r;}
float snoise(vec3 v){
  const vec2 C=vec2(1.0/6.0,1.0/3.0);const vec4 D=vec4(0.0,0.5,1.0,2.0);
  vec3 i=floor(v+dot(v,C.yyy));vec3 x0=v-i+dot(i,C.xxx);
  vec3 g=step(x0.yzx,x0.xyz);vec3 l=1.0-g;
  vec3 i1=min(g.xyz,l.zxy);vec3 i2=max(g.xyz,l.zxy);
  vec3 x1=x0-i1+C.xxx;vec3 x2=x0-i2+C.yyy;vec3 x3=x0-D.yyy;
  i=lm289(i);
  vec4 p=lmperm(lmperm(lmperm(i.z+vec4(0.0,i1.z,i2.z,1.0))+i.y+vec4(0.0,i1.y,i2.y,1.0))+i.x+vec4(0.0,i1.x,i2.x,1.0));
  float n_=0.142857142857;vec3 ns=n_*D.wyz-D.xzx;
  vec4 j=p-49.0*floor(p*ns.z*ns.z);
  vec4 x_=floor(j*ns.z);vec4 y_=floor(j-7.0*x_);
  vec4 x=x_*ns.x+ns.yyyy;vec4 y=y_*ns.x+ns.yyyy;vec4 h=1.0-abs(x)-abs(y);
  vec4 b0=vec4(x.xy,y.xy);vec4 b1=vec4(x.zw,y.zw);
  vec4 s0=floor(b0)*2.0+1.0;vec4 s1=floor(b1)*2.0+1.0;vec4 sh=-step(h,vec4(0.0));
  vec4 a0=b0.xzyw+s0.xzyw*sh.xxyy;vec4 a1=b1.xzyw+s1.xzyw*sh.zzww;
  vec3 p0=vec3(a0.xy,h.x);vec3 p1=vec3(a0.zw,h.y);vec3 p2=vec3(a1.xy,h.z);vec3 p3=vec3(a1.zw,h.w);
  vec4 norm=lmtis(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));
  p0*=norm.x;p1*=norm.y;p2*=norm.z;p3*=norm.w;
  vec4 m=max(0.6-vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)),0.0);m=m*m;
  return 42.0*dot(m*m,vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3)));
}`;

// Logo vertex shader — displacement driven entirely by uDeformAmp (0 at rest = NO_FAKE)
const _LM_VS = `
${_LM_SNOISE_GLSL}
uniform float uTime;
uniform float uDeformAmp;
uniform float uTimeScale;
void main(){
  vec3 pos=position;
  float n1=snoise(vec3(pos.xy*0.55,uTime*uTimeScale*0.12));
  float n2=snoise(vec3(pos.xy*1.1+4.3,uTime*uTimeScale*0.08));
  pos.xy+=vec2(n1,n2)*uDeformAmp*0.38;
  pos.z+=snoise(vec3(pos.xy*0.4,uTime*uTimeScale*0.06))*uDeformAmp*0.22;
  gl_Position=projectionMatrix*modelViewMatrix*vec4(pos,1.0);
}`;

const _LM_FS = `
uniform vec3 uColor;
uniform float uAlpha;
void main(){gl_FragColor=vec4(uColor,uAlpha);}`;

const _LM_GLOW_FS = `
uniform vec3 uGlowColor;
uniform float uGlowAlpha;
void main(){gl_FragColor=vec4(uGlowColor,uGlowAlpha);}`;

const _LM_SPARK_VS = `
attribute float aLife;
varying float vLife;
void main(){
  vLife=aLife;
  vec4 mvPos=modelViewMatrix*vec4(position,1.0);
  gl_PointSize=3.0*vLife;
  gl_Position=projectionMatrix*mvPos;
}`;

const _LM_SPARK_FS = `
varying float vLife;
uniform vec3 uSparkColor;
void main(){
  float d=length(gl_PointCoord-0.5)*2.0;
  if(d>1.0) discard;
  gl_FragColor=vec4(uSparkColor,vLife*(1.0-d));
}`;

// Helper: build 6-petal logo geometry merged into one BufferGeometry (≥2000 vertices)
function _buildLogoGeometry() {
  const geos = [];
  for (let i = 0; i < 6; i++) {
    const shape = new THREE.Shape();
    shape.absellipse(0, 0, 0.275, 1.0, 0, Math.PI * 2, false, 0);
    const geo = new THREE.ShapeGeometry(shape, 128);
    geo.applyMatrix4(new THREE.Matrix4().makeRotationZ(i * Math.PI / 3));
    geos.push(geo);
  }
  return mergeGeometries(geos, false);
}

class LogoMode {
  constructor() {
    this._logoMesh     = null;
    this._glowMesh     = null;
    this._sparkMesh    = null;
    this._sparkGeo     = null;
    this._sparkMat     = null;
    this._sparkLifeAttr= null;
    this._sparkPos     = new Float32Array(600 * 3);
    this._sparkVel     = new Float32Array(600);
    this._sparkLat     = new Float32Array(600);   // lateral drift velocity
    this._sparkLife    = new Float32Array(600);
    this._sparkActive  = new Uint8Array(600);
    this._sparkEmitAccum = 0;
    this._sparkHomePos = null;
    this._uTime        = 0;
    this._sigSmooth    = 0;
    this._logoGeo      = null;
    this._logoMat      = null;
    this._glowMat      = null;
    this._colorBase    = new THREE.Color(0x10A37F);
    this._colorCrisis  = new THREE.Color(0xef4444);
    this._colorCur     = new THREE.Color(0x10A37F);
  }

  init(sc, cam) {
    cam.position.set(0, 0, 7);
    cam.lookAt(0, 0, 0);
    sc.fog  = null;
    sc.background = new THREE.Color(0x000000);

    this._logoGeo = _buildLogoGeometry();
    this._buildLogo(sc);
    this._buildGlow(sc, this._logoGeo);
    this._initSparks(sc, this._logoGeo);
  }

  _buildLogo(sc) {
    this._logoMat = new THREE.ShaderMaterial({
      uniforms: {
        uTime:       { value: 0 },
        uDeformAmp:  { value: 0 },
        uTimeScale:  { value: 1.0 },
        uColor:      { value: new THREE.Color(0x10A37F) },
        uAlpha:      { value: 1.0 },
      },
      vertexShader:   _LM_VS,
      fragmentShader: _LM_FS,
      transparent: true,
      side: THREE.DoubleSide,
    });
    this._logoMesh = new THREE.Mesh(this._logoGeo, this._logoMat);
    sc.add(this._logoMesh);
  }

  _buildGlow(sc, logoGeo) {
    this._glowMat = new THREE.ShaderMaterial({
      uniforms: {
        uTime:      { value: 0 },
        uDeformAmp: { value: 0 },
        uTimeScale: { value: 1.0 },
        uGlowColor: { value: new THREE.Color(0x10A37F) },
        uGlowAlpha: { value: 0.0 },
      },
      vertexShader:   _LM_VS,
      fragmentShader: _LM_GLOW_FS,
      transparent:  true,
      depthWrite:   false,
      blending:     THREE.AdditiveBlending,
      side:         THREE.DoubleSide,
    });
    this._glowMesh = new THREE.Mesh(logoGeo, this._glowMat);
    this._glowMesh.scale.set(1.04, 1.04, 1.04);
    sc.add(this._glowMesh);
  }

  _initSparks(sc, logoGeo) {
    const COUNT = 600;
    // Sample home positions from logo geometry vertices
    const srcPos = logoGeo.attributes.position;
    const nVerts  = srcPos.count;
    this._sparkHomePos = new Float32Array(nVerts * 3);
    for (let i = 0; i < nVerts; i++) {
      this._sparkHomePos[i * 3]     = srcPos.getX(i);
      this._sparkHomePos[i * 3 + 1] = srcPos.getY(i);
      this._sparkHomePos[i * 3 + 2] = srcPos.getZ(i);
    }

    // Initialize spark arrays to zero (all inactive at rest)
    this._sparkPos.fill(0);
    this._sparkLife.fill(0);
    this._sparkActive.fill(0);

    // Random upward velocities (set once at init — not in animation loop)
    for (let i = 0; i < COUNT; i++) {
      // Seed velocities at init time only — these are fixed per-particle constants
      this._sparkVel[i] = 0.8 + (i * 0.000493) % 0.3;      // 0.8..1.1 deterministic spread
      this._sparkLat[i] = ((i * 0.001739) % 0.4) - 0.2;     // ±0.2 deterministic lateral
    }

    const lifeArr = new Float32Array(COUNT).fill(0);
    const posAttr  = new THREE.BufferAttribute(this._sparkPos, 3);
    posAttr.setUsage(THREE.DynamicDrawUsage);
    const lifeAttr = new THREE.BufferAttribute(lifeArr, 1);
    lifeAttr.setUsage(THREE.DynamicDrawUsage);
    this._sparkLifeAttr = lifeAttr;

    this._sparkGeo = new THREE.BufferGeometry();
    this._sparkGeo.setAttribute('position', posAttr);
    this._sparkGeo.setAttribute('aLife',    lifeAttr);

    this._sparkMat = new THREE.ShaderMaterial({
      uniforms: { uSparkColor: { value: new THREE.Color(0x10A37F) } },
      vertexShader:   _LM_SPARK_VS,
      fragmentShader: _LM_SPARK_FS,
      transparent: true,
      depthWrite:  false,
      blending:    THREE.AdditiveBlending,
    });

    this._sparkMesh = new THREE.Points(this._sparkGeo, this._sparkMat);
    sc.add(this._sparkMesh);
  }

  _updateSparks(audienceEnergy, dt) {
    const COUNT   = 600;
    const MAX_LIFE = 2.5;
    const nHome   = this._sparkHomePos.length / 3;
    let activeCnt = 0, lifeSum = 0;

    // Update active particles
    for (let i = 0; i < COUNT; i++) {
      if (!this._sparkActive[i]) continue;
      this._sparkPos[i * 3]     += this._sparkLat[i] * dt;
      this._sparkPos[i * 3 + 1] += this._sparkVel[i] * dt;
      this._sparkLife[i]        -= dt;
      if (this._sparkLife[i] <= 0) {
        this._sparkActive[i] = 0;
        this._sparkLife[i]   = 0;
        this._sparkLifeAttr.array[i] = 0;
      } else {
        lifeSum += this._sparkLife[i] / MAX_LIFE;
        activeCnt++;
        this._sparkLifeAttr.array[i] = Math.max(0, this._sparkLife[i] / MAX_LIFE);
      }
    }

    // Emit new sparks proportional to audienceEnergy — strictly 0 when audienceEnergy === 0
    if (audienceEnergy > 0) {
      this._sparkEmitAccum += audienceEnergy * 8 * dt;
      const toEmit = Math.floor(this._sparkEmitAccum);
      this._sparkEmitAccum -= toEmit;
      let emitted = 0;
      for (let i = 0; i < COUNT && emitted < toEmit; i++) {
        if (this._sparkActive[i]) continue;
        // Sample a home position from logo geometry vertices (deterministic index cycling)
        const hi = (i * 7 + Math.floor(this._uTime * 10)) % nHome;
        this._sparkPos[i * 3]     = this._sparkHomePos[hi * 3];
        this._sparkPos[i * 3 + 1] = this._sparkHomePos[hi * 3 + 1];
        this._sparkPos[i * 3 + 2] = this._sparkHomePos[hi * 3 + 2];
        this._sparkLife[i]        = MAX_LIFE * (0.5 + (i * 0.001317) % 0.5);
        this._sparkActive[i]      = 1;
        this._sparkLifeAttr.array[i] = this._sparkLife[i] / MAX_LIFE;
        emitted++;
        activeCnt++;
        lifeSum += this._sparkLife[i] / MAX_LIFE;
      }
    }

    this._sparkGeo.attributes.position.needsUpdate = true;
    this._sparkLifeAttr.needsUpdate = true;
    // Opacity = average remaining life fraction across active particles (0 at rest)
    this._sparkMat.opacity = activeCnt > 0 ? lifeSum / activeCnt : 0;
  }

  update(st, dt) {
    if (!this._logoMesh) return false;

    this._uTime += dt;

    // ── Signal extraction ────────────────────────────────────────────────────
    const excitement    = Math.max(0, Math.min(1, st?.excitement     || 0));
    const crisisLevel   = Math.max(0, Math.min(1, st?.crisis_level   || 0));
    const anomalyScore  = Math.max(0, Math.min(1, st?.anomaly_score  || 0));
    const audienceEnergy= Math.max(0, Math.min(1, st?.audience_energy|| 0));

    // ── EMA-smoothed combined signal (τ ≈ 1s, 5% target at 20fps) ─────────
    const combinedRaw = excitement * 0.5 + crisisLevel * 0.35 + anomalyScore * 0.15;
    const alpha       = 1 - Math.pow(0.05, dt);  // LERP factor, τ ≈ 1s
    this._sigSmooth   = this._sigSmooth + (combinedRaw - this._sigSmooth) * alpha;

    const uDeformAmp  = this._sigSmooth;  // 0.0 at rest — NO_FAKE compliant

    // ── Color lerp: base → crisis ────────────────────────────────────────────
    this._colorCur.copy(this._colorBase).lerp(this._colorCrisis, crisisLevel * 0.6);

    // ── Update logo shader uniforms ──────────────────────────────────────────
    this._logoMat.uniforms.uTime.value      = this._uTime;
    this._logoMat.uniforms.uDeformAmp.value = uDeformAmp;
    this._logoMat.uniforms.uTimeScale.value = 1.0;
    this._logoMat.uniforms.uColor.value.copy(this._colorCur);
    this._logoMat.uniforms.uAlpha.value     = 1.0;

    // ── Update glow shader uniforms ──────────────────────────────────────────
    const glowAlpha = this._sigSmooth * 0.18;  // 0.0 at rest
    this._glowMat.uniforms.uTime.value       = this._uTime;
    this._glowMat.uniforms.uDeformAmp.value  = uDeformAmp;
    this._glowMat.uniforms.uTimeScale.value  = 1.0;
    this._glowMat.uniforms.uGlowColor.value.copy(this._colorCur);
    this._glowMat.uniforms.uGlowAlpha.value  = glowAlpha;

    // ── Spark color tracks logo color ────────────────────────────────────────
    this._sparkMat.uniforms.uSparkColor.value.copy(this._colorCur);

    // ── Update sparks ────────────────────────────────────────────────────────
    this._updateSparks(audienceEnergy, dt);

    renderer.render(scene, camera);
    return true;
  }

  dispose(sc) {
    if (this._logoMesh)  { this._logoGeo.dispose(); this._logoMat.dispose(); sc.remove(this._logoMesh); }
    if (this._glowMesh)  { this._glowMat.dispose(); sc.remove(this._glowMesh); }
    if (this._sparkMesh) { this._sparkGeo.dispose(); this._sparkMat.dispose(); sc.remove(this._sparkMesh); }
    this._logoMesh = null; this._glowMesh = null; this._sparkMesh = null;
    this._sparkGeo = null; this._sparkMat = null; this._sparkLifeAttr = null;
    this._logoGeo  = null; this._logoMat  = null; this._glowMat = null;
  }
}

const MODES = { neural: NeuralMode, chaos: ChaosMode, globe: GlobeMode, network: NetworkMode, nexus: NexusMode, warp: WarpMode, logo: LogoMode };
const _SCENE_NAMES = { neural: 'neural', chaos: 'spectre', globe: 'globe', network: 'network', nexus: 'nexus', warp: 'warp', logo: 'logo' };

// Declared early — NeuralMode.init() reads liveNodes (let TDZ would crash otherwise)
let liveState = {};
let liveNodes  = [];   // real @node registry from WebSocket

let activeModeName = 'neural';
// Initialize NeuralMode immediately — avoids blank canvas until first WS message
// (the graph builds lazily in update() once liveNodes arrives from WebSocket)
let activeMode = new NeuralMode();
activeMode.init(scene, camera);

let _switchInProgress = false;
async function switchMode(name) {
  if (!MODES[name]) { console.error('Unknown mode:', name); return; }
  if (_switchInProgress) return;
  _switchInProgress = true;
  const fade = document.getElementById('fade');
  fade.style.opacity = '1';
  await new Promise(r => setTimeout(r, 1500));
  try {
    if (activeMode) activeMode.dispose(scene);
    activeModeName = name;
    activeMode = new MODES[name]();
    activeMode.init(scene, camera);
    document.getElementById('mode-indicator').textContent = _SCENE_NAMES[name] || name;
  } catch(err) {
    console.error('switchMode failed for', name, err);
    fade.style.opacity = '0';
    _switchInProgress = false;
    return;
  }
  await new Promise(r => setTimeout(r, 100));
  fade.style.opacity = '0';
  await new Promise(r => setTimeout(r, 1500));
  _switchInProgress = false;
  console.log('Switched to mode:', name);
}

// Expose to console and keyboard
window.switchMode = switchMode;

// Event TTL — 12h client-side guard (prevents same event label from showing indefinitely)
let _eventLabel = '';

const _EVENT_TTL_MS = 12 * 60 * 60 * 1000;

// ── Emotion Wheel ─────────────────────────────────────────────────────────────
const _EW_EMOTIONS = [
  { key:'excitement',      label:'excitement',  color:'#f59e0b', angle:-90  },
  { key:'curiosity',       label:'curiosity',   color:'#06b6d4', angle:-30  },
  { key:'audience_energy', label:'energy',      color:'#10a37f', angle:30   },
  { key:'frustration',     label:'frustration', color:'#8b5cf6', angle:90   },
  { key:'anxiety',         label:'anxiety',     color:'#ef4444', angle:150  },
  { key:'musical_tension', label:'tension',     color:'#6366f1', angle:-150 },
];
const _ewVals = new Float32Array(6); // lerped display values 0-1

function _updateEmotionWheel(dt) {
  if (!document.getElementById('emotion-wheel').classList.contains('visible')) return;
  const LERP = 1 - Math.pow(0.05, dt); // ~0.95s time-constant toward target
  let dirty = false;
  _EW_EMOTIONS.forEach((em, i) => {
    const target = Math.max(0, Math.min(1, liveState[em.key] || 0));
    const prev = _ewVals[i];
    _ewVals[i] = prev + (target - prev) * LERP;
    if (Math.abs(_ewVals[i] - prev) > 0.0005) dirty = true;
  });
  if (dirty) _drawEmotionWheel();
}

function _drawEmotionWheel() {
  const svg = document.getElementById('emotion-wheel-svg');
  if (!svg) return;
  const NS = 'http://www.w3.org/2000/svg';
  const mk = (tag, attrs) => {
    const e = document.createElementNS(NS, tag);
    for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
    return e;
  };
  const CX = 80, CY = 80, R = 54, LR = 70;
  svg.innerHTML = '';

  // Gradient fill
  const defs = mk('defs', {});
  const grd  = mk('radialGradient', { id:'ewG', cx:'50%', cy:'50%', r:'50%' });
  grd.appendChild(mk('stop', { offset:'0%',   'stop-color':'#10a37f', 'stop-opacity':'0.28' }));
  grd.appendChild(mk('stop', { offset:'100%', 'stop-color':'#10a37f', 'stop-opacity':'0.04' }));
  defs.appendChild(grd);
  svg.appendChild(defs);

  // Grid rings
  [0.25, 0.5, 0.75, 1.0].forEach(r =>
    svg.appendChild(mk('circle', { cx:CX, cy:CY, r:R*r, fill:'none', stroke:'rgba(255,255,255,0.07)', 'stroke-width':'1' }))
  );

  // Axes
  _EW_EMOTIONS.forEach(em => {
    const rad = em.angle * Math.PI / 180;
    svg.appendChild(mk('line', {
      x1:CX, y1:CY,
      x2:CX + R * Math.cos(rad), y2:CY + R * Math.sin(rad),
      stroke:em.color, 'stroke-width':'1', opacity:'0.3'
    }));
  });

  // Data polygon
  const pts = _EW_EMOTIONS.map((em, i) => {
    const rad = em.angle * Math.PI / 180;
    const r = _ewVals[i] * R;
    return [CX + r * Math.cos(rad), CY + r * Math.sin(rad)];
  });
  svg.appendChild(mk('polygon', {
    points: pts.map(p => p.join(',')).join(' '),
    fill:'url(#ewG)', stroke:'#10a37f', 'stroke-width':'1.5', 'stroke-linejoin':'round'
  }));

  // Vertex dots + perimeter labels
  _EW_EMOTIONS.forEach((em, i) => {
    const rad = em.angle * Math.PI / 180;
    const val = _ewVals[i];
    if (val > 0.02) {
      const [px, py] = pts[i];
      svg.appendChild(mk('circle', {
        cx:px, cy:py, r:'2.5', fill:em.color,
        filter:`drop-shadow(0 0 3px ${em.color})`
      }));
    }
    const lx = CX + LR * Math.cos(rad), ly = CY + LR * Math.sin(rad);
    const cosA = Math.cos(rad);
    const anchor = cosA > 0.2 ? 'start' : cosA < -0.2 ? 'end' : 'middle';
    const txt = mk('text', {
      x:lx, y:ly, fill:em.color,
      'font-size':'7', 'font-family':'Inter,sans-serif', 'font-weight':'500',
      'text-anchor':anchor, 'dominant-baseline':'middle',
      'letter-spacing':'0', opacity: val > 0.05 ? '1' : '0.3'
    });
    txt.textContent = em.label;
    svg.appendChild(txt);
  });
}

// Timer: visible 30s toutes les 5min — NO_FAKE: timer UI seulement, contenu 100% data-driven

function updateHUD(st) {
  const crisis = st.crisis_level || 0;
  const wt = st.world_temperature || 0;
  const progress = st.current_song_progress || 0;
  const qlen = st.queue_length || 0;
  const uptime = st.uptime_h || 0;

  // uptime formatting
  const uh = Math.floor(uptime);
  const um = Math.floor((uptime - uh) * 60);
  const uptimeStr = uh > 0 ? `${uh}h${String(um).padStart(2,'0')}` : um > 0 ? `${um}m` : '';

  // Crisis bar: green→amber→red
  const crisisPct = Math.round(crisis * 100);
  const crisisBarColor = crisis > 0.5 ? '#ef4444' : crisis > 0.2 ? '#f59e0b' : '#10a37f';
  // Temp bar: hue cold(180°)→warm(0°)
  const tempPct = Math.round(wt * 100);
  const tempBarColor = `hsl(${Math.round(180 - wt * 180)},65%,52%)`;

  document.getElementById('drift-signals').innerHTML =
    `<div style="font-size:11px;color:#c4c7cc;margin-bottom:5px">♪ <span class="mono">${Math.round(st.drift_bpm||90)}</span> BPM · ${st.drift_key||'C minor'} · ${st.drift_timbre||'warm'}</div>` +
    `<div class="drift-bar-row"><span class="drift-bar-label">crisis</span><span class="drift-bar-track"><span class="drift-bar-fill" style="width:${crisisPct}%;background:${crisisBarColor}"></span></span><span class="drift-bar-val" style="color:${crisisBarColor}">${crisisPct}%</span></div>` +
    `<div class="drift-bar-row"><span class="drift-bar-label">temp</span><span class="drift-bar-track"><span class="drift-bar-fill" style="width:${tempPct}%;background:${tempBarColor}"></span></span><span class="drift-bar-val" style="color:${tempBarColor}">${tempPct}%</span></div>` +
    (qlen > 0 ? `<div style="color:#556677;font-size:10px;margin-top:3px">⏎ <span class="mono">${qlen}</span> in queue</div>` : '');

  document.getElementById('on-air-uptime').textContent = uptimeStr;

  // Track name + progress bar — intégrés dans le drift panel
  const driftTrackEl = document.getElementById('drift-track');
  const barEl = document.getElementById('track-progress-bar');
  if (st.current_track_name) {
    document.getElementById('drift-track-name').textContent = '♫ ' + st.current_track_name;
    driftTrackEl.style.display = '';
    barEl.style.width = Math.round(progress * 100) + '%';
  } else {
    driftTrackEl.style.display = 'none';
    barEl.style.width = '0%';
  }

  // viewer command notification
  const vcEl = document.getElementById('viewer-cmd');
  if (st.viewer_cmd_label) {
    vcEl.textContent = st.viewer_cmd_label;
    vcEl.classList.add('active');
  } else {
    vcEl.classList.remove('active');
  }

  // sources: summary dot + expandable detail
  const sh = st.source_health || {};
  const entries = Object.entries(sh);
  const ok = entries.filter(([,v]) => v).length;
  const total = entries.length;
  const summaryDotCls = ok === total ? 'dot-ok' : ok > total * 0.5 ? 'dot-warn' : 'dot-err';
  const sdot = document.getElementById('sources-dot');
  sdot.className = 'status-dot ' + summaryDotCls + (ok === total && total > 0 ? ' dot-pulse' : '');
  document.getElementById('sources-count').innerHTML =
    `<span style="font-family:'JetBrains Mono',monospace">${ok}/${total}</span> sources`;
  document.getElementById('sources-detail').innerHTML = entries.map(([k,v]) =>
    `<div>${k} <span class="status-dot ${v ? 'dot-ok' : 'dot-err'}" style="margin-left:4px"></span></div>`
  ).join('');

  if (st.journal_text && st.journal_text !== _lastJournalText) {
    _lastJournalText = st.journal_text;
    document.getElementById('journal-body').textContent = st.journal_text;
    const jEl = document.getElementById('journal');
    jEl.classList.add('expanded');
    clearTimeout(_journalTimer);
    _journalTimer = setTimeout(() => jEl.classList.remove('expanded'), JOURNAL_SHOW_MS);
  }
  const chatEl = document.getElementById('chat-status');
  const chatRate = (st.chat_rate || 0).toFixed(1);
  const chatHealth = (st.source_health || {}).youtube_chat;
  const chatLive = chatHealth === true || (chatHealth === undefined && parseFloat(chatRate) > 0);
  chatEl.className = chatLive ? 'live' : '';
  chatEl.innerHTML = `<span class="status-dot ${chatLive ? 'dot-live' : 'dot-off'}" style="margin-right:5px"></span>chat · ${chatRate}/min · ${st.viewers || 0} viewers`;

  const evtEl = document.getElementById('event-banner');
  if (st.active_event && st.event_intensity > 0) {
    if (st.event_label !== _eventLabel) { _eventLabel = st.event_label; _eventFirstSeen = Date.now(); }
    if (Date.now() - _eventFirstSeen < _EVENT_TTL_MS) {
      document.getElementById('event-label-main').textContent = st.event_label;
      evtEl.style.opacity = String(0.4 + st.event_intensity * 0.6);
    } else {
      evtEl.style.opacity = '0';
    }
  } else {
    _eventLabel = '';
    evtEl.style.opacity = '0';
  }
}

// ── WebSocket ─────────────────────────────────────────────────────────────────

// userOverride = true when user manually picked a mode via keyboard.
// Prevents WebSocket state from overriding the user's choice on every heartbeat.
// Cleared only when the server explicitly sends a *different* visual_mode value.
let userOverride = false;
let wsLastMode = null;
let _hudDirty = false;
let _isRestarting = false;
let _restartingTimer = null;

// Journal accordion — expand 10s sur nouveau message, puis replie
let _lastJournalText = '';
let _journalTimer = null;
const JOURNAL_SHOW_MS = 10000;

function connect() {
  const ws = new WebSocket('ws://localhost:8765');
  ws.onopen = () => {
    _isRestarting = false;
    clearTimeout(_restartingTimer);
    document.getElementById('ws-status').className = 'connected';
    document.getElementById('ws-status').innerHTML = '<span class="status-dot dot-ok" style="margin-right:5px"></span>connected';
    updateHUD(liveState);  // preserve last known state on reconnect — avoids track name flash
    // Don't force neural here — wait for first WS message so user keeps current mode on reconnect
  };
  ws.onmessage = e => {
    const msg = JSON.parse(e.data);
    if (msg._restarting) {
      _isRestarting = true;
      clearTimeout(_restartingTimer);
      _restartingTimer = setTimeout(() => { _isRestarting = false; }, 90000); // 90s fallback
      document.getElementById('ws-status').className = 'restarting';
      document.getElementById('ws-status').innerHTML = '<span class="status-dot dot-warn" style="margin-right:5px"></span>updating…';
    }
    const st = msg.state || {};
    const newMode = st.visual_mode || 'neural';
    if (newMode !== wsLastMode) {
      // Server explicitly changed visual_mode — clear user override and follow
      wsLastMode = newMode;
      userOverride = false;
    }
    if (!userOverride && newMode !== activeModeName) switchMode(newMode);
    liveState = st;
    if (msg.nodes && msg.nodes.length) liveNodes = msg.nodes;
    _hudDirty = true;
  };
  ws.onclose = () => {
    document.getElementById('ws-status').className = _isRestarting ? 'restarting' : '';
    document.getElementById('ws-status').innerHTML = _isRestarting
      ? '<span class="status-dot dot-warn" style="margin-right:5px"></span>updating…'
      : '<span class="status-dot dot-off" style="margin-right:5px"></span>reconnecting…';
    setTimeout(connect, 2000);
  };
  document.getElementById('ws-status').innerHTML = '<span class="status-dot dot-off" style="margin-right:5px"></span>connecting…';
}

connect();

// ── Sources accordion (show 2min every 15min) ─────────────────────────────────
const SOURCES_SHOW_MS = 2 * 60 * 1000;
const SOURCES_HIDE_MS = 15 * 60 * 1000;
function sourcesAccordionCycle() {
  document.getElementById('sources').classList.add('expanded');
  setTimeout(() => {
    document.getElementById('sources').classList.remove('expanded');
    setTimeout(sourcesAccordionCycle, SOURCES_HIDE_MS);
  }, SOURCES_SHOW_MS);
}
sourcesAccordionCycle();

// ── OpenAI News panel — fetch RSS via rss2json, drop-in 30s every 5min ───────
const _NEWS_API = 'https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Fopenai.com%2Fblog%2Frss.xml&count=3';
const _NEWS_CYCLE_MS = 5 * 60 * 1000;
const _NEWS_SHOW_MS  = 30 * 1000;

function _relDate(s) {
  const d = new Date(s);
  if (isNaN(d)) return '';
  const m = Math.floor((Date.now() - d) / 60000);
  if (m < 60) return `${m}m`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}h`;
  return `${Math.floor(h / 24)}d`;
}

async function fetchNews() {
  try {
    const r = await fetch(_NEWS_API);
    if (!r.ok) return;
    const data = await r.json();
    const items = (data.items || []).slice(0, 3);
    if (!items.length) return;
    document.getElementById('news-detail').innerHTML = items.map(it => {
      const title = (it.title || '').replace(/&/g,'&amp;').replace(/</g,'&lt;');
      const age = _relDate(it.pubDate);
      const thumb = it.thumbnail
        ? `<img class="news-thumb" src="${it.thumbnail}" alt="" onerror="this.style.visibility='hidden'">`
        : `<div class="news-thumb"></div>`;
      return `<div class="news-item">${thumb}<div class="news-text"><div class="news-title">${title}</div><div class="news-date">${age}</div></div></div>`;
    }).join('');
    document.getElementById('news-age').textContent = _relDate(items[0].pubDate);
  } catch(e) { console.warn('news fetch', e); }
}

function _newsCycle() {
  fetchNews();
  const el = document.getElementById('news');
  el.classList.add('visible');
  setTimeout(() => el.classList.remove('visible'), _NEWS_SHOW_MS);
}
_newsCycle();  // show immediately on load
setTimeout(() => setInterval(_newsCycle, _NEWS_CYCLE_MS), _NEWS_CYCLE_MS);

// ── Render loop ───────────────────────────────────────────────────────────────
const _FRAME_MS = 1000 / 40;  // 40fps — matches x11grab capture rate
let _lastFrameTime = 0;

function animate() {
  setTimeout(animate, _FRAME_MS); // schedule first — prevents compounding delay when render takes >33ms
  const now = performance.now();
  const dt = Math.min((now - _lastFrameTime) * 0.001, 0.05); // capped at 50ms — prevents jump on lag spike
  _lastFrameTime = now;
  if (_hudDirty) { updateHUD(liveState); _hudDirty = false; }
  _updateEmotionWheel(dt);
  let handled = false;
  if (activeMode) handled = activeMode.update(liveState, dt) === true;
  if (!handled) {
    camera.position.x += (0 - camera.position.x) * 0.02;
    camera.position.y += (0 - camera.position.y) * 0.02;
    camera.lookAt(0,0,0);
    renderer.render(scene, camera);
  }
}
animate();

// Keyboard shortcuts: 1=neural 2=chaos 3=globe 4=network 5=nexus
window.addEventListener('keydown', (e) => {
  const map = { '1':'neural', '2':'chaos', '3':'globe', '4':'network', '5':'nexus', '6':'warp', '7':'logo' };
  if (map[e.key]) {
    userOverride = true;  // keep user's choice even when WS heartbeat sends visual_mode:'neural'
    switchMode(map[e.key]);
  }
});

window.addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
