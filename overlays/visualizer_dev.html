class SynapseMode {
  constructor() {
    this._cam = null; this._controls = null;
    this._starField = null;
    this._nMesh = null; this._cMesh = null;
    this._nodes = []; this._edges = [];
    this._clock = new THREE.Clock();
    this._currentFormation = -1;
    this._targetNodeScale = 1.0;
    this._currentNodeScale = 1.0;
    this._lastPulseTime = -1000;
    this._lastBurst = 0;
    this._animId = null;
    // B2+B3+B6 — attributs GPU dynamiques
    this._nodeColorAttr = null;
    this._connStrAttr = null; this._connStrData = null;
    this._nodeActAttr = null; this._nodeActivities = null;
    this._burstScale = 0; // B7 — spike de scale sur world_event_burst
    // Physique des nœuds — simulation de forces
    this._velocities = [];    // THREE.Vector3 par nœud
    this._anchors    = [];    // positions de formation (attracteurs)
    this._edgeRestLens = [];  // longueurs de repos des arêtes
    this._nodePosAttr  = null; this._nodePosData  = null;
    this._startPtAttr  = null; this._startPtData  = null;
    this._endPtAttr    = null; this._endPtData    = null;
    this._bgColor = new THREE.Color(0x000000);
    this._fx = null; this._fy = null; this._fz = null; // pre-alloués — évite GC 90/s
    // Synapse pulse state — per-edge traveling signals
    this._edgePulseT    = null; // Float32Array[E] — pulse progress 0→1
    this._edgePulseAct  = null; // Float32Array[E] — lerped activation (PE-driven)
    this._pulseFrontData = null; this._pulseFrontAttr = null; // per-vertex pulse front
    this._pulseActVData  = null; this._pulseActVAttr  = null; // per-vertex activation
    this._nodeFireFlash  = null; this._nodeFireFlashAttr = null; // per-node receive flash
  }

  _lerp(a, b, t) { return a + (b - a) * t; }

  _physicsStep(state, dt) {
    const N = this._nodes.length;
    if (!N || !this._velocities.length) return;
    const SEG = 12;

    const wt  = Math.max(0, Math.min(1, state.world_temperature || 0));
    const urg = Math.max(0, Math.min(1, state.urgency       || 0));
    const exc = Math.max(0, Math.min(1, state.excitement    || 0));
    const cur = Math.max(0, Math.min(1, state.curiosity     || 0));

    // Énergie signal globale — porte TOUTES les forces cinétiques (NO_FAKE)
    // Zéro si tous les signaux sont nuls → zéro mouvement au repos
    const signalEnergy = Math.min(1, wt * 0.45 + urg * 0.30 + cur * 0.15 + exc * 0.10);

    const dtClamped = Math.min(dt, 0.05); // sécurité si onglet endormi

    // Paramètres data-driven — kRepel et kEdge conditionnels sur signalEnergy
    const kAnchor  = 3.0 + urg * 2.0;           // spring vers formation : toujours actif (formation = f(territory))
    const kEdge    = wt  * 3.0 * signalEnergy;  // zéro au repos — porteur conditionnel
    const kRepel   = cur * 0.30 * signalEnergy;  // zéro au repos — porteur conditionnel
    // Amortissement correct : fraction de vitesse conservée par seconde → τ_position ≈ 0.67s
    const damping  = Math.pow(0.05, dtClamped);  // 5%/s → au repos nœuds stoppent en <2s
    const maxDisp  = 1.5 + wt * 2.0 + exc * 1.0; // débattement max depuis ancre

    // Calcul des forces — buffers pré-alloués (évite GC 90/s)
    if (!this._fx || this._fx.length !== N) {
      this._fx = new Float32Array(N); this._fy = new Float32Array(N); this._fz = new Float32Array(N);
    }
    const fx = this._fx, fy = this._fy, fz = this._fz;
    fx.fill(0); fy.fill(0); fz.fill(0);

    // 1. Spring vers ancre de formation
    for (let i = 0; i < N; i++) {
      const p = this._nodes[i].pos, a = this._anchors[i];
      fx[i] += kAnchor * (a.x - p.x);
      fy[i] += kAnchor * (a.y - p.y);
      fz[i] += kAnchor * (a.z - p.z);
    }

    // 2. Répulsion nœud↔nœud — skip si kRepel≈0 (évite O(N²) inutile au repos)
    if (kRepel > 0.001) {
      for (let i = 0; i < N; i++) {
        const pi = this._nodes[i].pos;
        for (let j = i + 1; j < N; j++) {
          const pj = this._nodes[j].pos;
          const dx = pi.x - pj.x, dy = pi.y - pj.y, dz = pi.z - pj.z;
          const d2 = Math.max(dx*dx + dy*dy + dz*dz, 0.04); // évite singularité
          const inv = kRepel / (d2 * Math.sqrt(d2));
          fx[i] += dx * inv; fy[i] += dy * inv; fz[i] += dz * inv;
          fx[j] -= dx * inv; fy[j] -= dy * inv; fz[j] -= dz * inv;
        }
      }
    }

    // 3. Ressorts d'arêtes — skip si kEdge≈0 (porteur conditionnel world_temp)
    if (kEdge > 0.001)
    for (let ei = 0; ei < this._edges.length; ei++) {
      const e = this._edges[ei];
      const pi = this._nodes[e.from].pos, pj = this._nodes[e.to].pos;
      const dx = pj.x - pi.x, dy = pj.y - pi.y, dz = pj.z - pi.z;
      const dist = Math.max(Math.sqrt(dx*dx + dy*dy + dz*dz), 0.001);
      const rest = this._edgeRestLens[ei];
      const stretch = (dist - rest) / rest;
      // Force modulée par activité moyenne — zéro si pas de données (pas de fallback 0.5)
      const actAvg = this._nodeActivities
        ? (this._nodeActivities[e.from] + this._nodeActivities[e.to]) * 0.5
        : 0;
      const f = kEdge * stretch * (0.5 + actAvg) / dist;
      fx[e.from] += dx * f; fy[e.from] += dy * f; fz[e.from] += dz * f;
      fx[e.to]   -= dx * f; fy[e.to]   -= dy * f; fz[e.to]   -= dz * f;
    }

    // 4. Intégration Euler + amortissement + clamp débattement
    for (let i = 0; i < N; i++) {
      const v = this._velocities[i], p = this._nodes[i].pos;
      v.x = (v.x + fx[i] * dtClamped) * damping;
      v.y = (v.y + fy[i] * dtClamped) * damping;
      v.z = (v.z + fz[i] * dtClamped) * damping;
      p.x += v.x * dtClamped;
      p.y += v.y * dtClamped;
      p.z += v.z * dtClamped;
      // Clamp distance à l'ancre (préserve formation)
      const a = this._anchors[i];
      const ddx = p.x - a.x, ddy = p.y - a.y, ddz = p.z - a.z;
      const disp = Math.sqrt(ddx*ddx + ddy*ddy + ddz*ddz);
      if (disp > maxDisp) {
        const sc = maxDisp / disp;
        p.x = a.x + ddx * sc; p.y = a.y + ddy * sc; p.z = a.z + ddz * sc;
      }
    }

    // 5. Mettre à jour buffer GPU positions nœuds
    if (this._nodePosData && this._nodePosAttr) {
      for (let i = 0; i < N; i++) {
        const p = this._nodes[i].pos;
        this._nodePosData[i*3] = p.x; this._nodePosData[i*3+1] = p.y; this._nodePosData[i*3+2] = p.z;
      }
      this._nodePosAttr.needsUpdate = true;
    }

    // 6. Mettre à jour startPt / endPt des arêtes depuis positions physiques
    if (this._startPtData && this._startPtAttr) {
      const V = SEG * 2; // vertices par arête (quads)
      for (let ei = 0; ei < this._edges.length; ei++) {
        const pf = this._nodes[this._edges[ei].from].pos;
        const pt = this._nodes[this._edges[ei].to].pos;
        for (let s = 0; s < V; s++) {
          const idx = (ei * V + s) * 3;
          this._startPtData[idx]   = pf.x; this._startPtData[idx+1] = pf.y; this._startPtData[idx+2] = pf.z;
          this._endPtData[idx]     = pt.x; this._endPtData[idx+1]   = pt.y; this._endPtData[idx+2]   = pt.z;
        }
      }
      this._startPtAttr.needsUpdate = true;
      this._endPtAttr.needsUpdate   = true;
    }
  }

  _buildNetwork(sc, formationIdx, paletteIdx) {
    // Dispose previous
    if (this._nMesh) { sc.remove(this._nMesh); this._nMesh.geometry.dispose(); this._nMesh.material.dispose(); this._nMesh = null; }
    if (this._cMesh) { sc.remove(this._cMesh); this._cMesh.geometry.dispose(); this._cMesh.material.dispose(); this._cMesh = null; }
    this._nodes = []; this._edges = [];
    this._nodeColorAttr = null; this._connStrAttr = null; this._connStrData = null;
    this._nodeActAttr = null; this._nodeActivities = null;
    this._velocities = []; this._anchors = []; this._edgeRestLens = [];
    this._nodePosAttr = null; this._nodePosData = null;
    this._startPtAttr = null; this._startPtData = null;
    this._endPtAttr   = null; this._endPtData   = null;
    this._nodeFireFlash = null; this._nodeFireFlashAttr = null;
    this._edgePulseT = null; this._edgePulseAct = null;
    this._pulseFrontData = null; this._pulseFrontAttr = null;
    this._pulseActVData = null; this._pulseActVAttr = null;

    const palette = _SYN_PALETTES[paletteIdx % 4];
    const NODE_COUNT = 60 + Math.floor(Math.random() * 20); // 60-80, seeded at init

    // Formation positions
    const positions = [];
    for (let i = 0; i < NODE_COUNT; i++) {
      let pos;
      if (formationIdx === 0) {
        // Sphere
        const phi = Math.acos(1 - 2 * (i + 0.5) / NODE_COUNT);
        const theta = Math.PI * (1 + Math.sqrt(5)) * i;
        const R = 12;
        pos = new THREE.Vector3(R * Math.sin(phi) * Math.cos(theta), R * Math.sin(phi) * Math.sin(theta), R * Math.cos(phi));
      } else if (formationIdx === 1) {
        // Expanded sphere
        const phi = Math.acos(1 - 2 * (i + 0.5) / NODE_COUNT);
        const theta = Math.PI * (1 + Math.sqrt(5)) * i;
        const R = 18;
        pos = new THREE.Vector3(R * Math.sin(phi) * Math.cos(theta), R * Math.sin(phi) * Math.sin(theta), R * Math.cos(phi));
      } else if (formationIdx === 2) {
        // Tight clusters (4 clusters)
        const cluster = Math.floor(i / (NODE_COUNT / 4));
        const clusterCenters = [new THREE.Vector3(-8, 5, 0), new THREE.Vector3(8, 5, 0), new THREE.Vector3(-8, -5, 0), new THREE.Vector3(8, -5, 0)];
        const center = clusterCenters[cluster];
        const phi = Math.acos(1 - 2 * (i % Math.ceil(NODE_COUNT / 4) + 0.5) / Math.ceil(NODE_COUNT / 4));
        const theta = Math.PI * (1 + Math.sqrt(5)) * i;
        const R = 4;
        pos = new THREE.Vector3(center.x + R * Math.sin(phi) * Math.cos(theta), center.y + R * Math.sin(phi) * Math.sin(theta), center.z + R * Math.cos(phi));
      } else {
        // Double hélice — brin A (pairs) + brin B (impairs) décalé de π
        const strand = i % 2;
        const si     = Math.floor(i / 2);
        const total  = Math.floor(NODE_COUNT / 2);
        const tY     = (si / Math.max(total - 1, 1)) * 2 - 1;
        const angle  = si * (Math.PI * 2 / 9) + strand * Math.PI; // ~9 paires/tour
        const R = 3.5;
        pos = new THREE.Vector3(R * Math.cos(angle), tY * 20, R * Math.sin(angle));
      }
      const colorBase = palette[i % palette.length].clone();
      this._nodes.push({ pos, color: colorBase, currentColor: colorBase.clone(), size: 0.4 + Math.random() * 0.3 });
    }

    // Build edges — ADN (formation 3) : backbone brins + barreaux ; autres : 3-4 voisins
    const MAX_EDGES = NODE_COUNT * 4;
    let edgeCount = 0;
    const added = new Set();
    if (formationIdx === 3) {
      // Double hélice : brin A (pairs), brin B (impairs), barreaux (A[k]↔B[k])
      const total = Math.floor(NODE_COUNT / 2);
      for (let k = 0; k < total && edgeCount < MAX_EDGES; k++) {
        const iA = k * 2, iB = k * 2 + 1;
        const iA2 = (k + 1) * 2, iB2 = (k + 1) * 2 + 1;
        if (iA2 < NODE_COUNT && !added.has(`${iA}_${iA2}`)) {
          added.add(`${iA}_${iA2}`);
          this._edges.push({ from: iA, to: iA2, str: 0.88 }); edgeCount++;
        }
        if (iB2 < NODE_COUNT && !added.has(`${iB}_${iB2}`)) {
          added.add(`${iB}_${iB2}`);
          this._edges.push({ from: iB, to: iB2, str: 0.88 }); edgeCount++;
        }
        if (!added.has(`${iA}_${iB}`)) {
          added.add(`${iA}_${iB}`);
          this._edges.push({ from: iA, to: iB,  str: 0.48 }); edgeCount++;
        }
      }
    } else {
      // Voisins proches — 3-4 connexions/nœud (vs 2-3 avant), graphe plus dense
      for (let i = 0; i < this._nodes.length && edgeCount < MAX_EDGES; i++) {
        const dists = [];
        for (let j = 0; j < this._nodes.length; j++) {
          if (i === j) continue;
          dists.push({ j, d: this._nodes[i].pos.distanceTo(this._nodes[j].pos) });
        }
        dists.sort((a, b) => a.d - b.d);
        const k = 3 + Math.floor(Math.random() * 2);
        for (let n = 0; n < k && n < dists.length && edgeCount < MAX_EDGES; n++) {
          const j = dists[n].j;
          const key = Math.min(i, j) + '_' + Math.max(i, j);
          if (!added.has(key)) {
            added.add(key);
            this._edges.push({ from: i, to: j, str: 0.5 + 0.5 * (1 - dists[n].d / 30) });
            edgeCount++;
          }
        }
      }
    }

    // Physique — anchors + velocités initiales (légère perturbation aléatoire à l'init)
    this._anchors    = this._nodes.map(n => n.pos.clone());
    this._velocities = this._nodes.map((_, i) => new THREE.Vector3(
      (((i * 7919) % 17) / 17 - 0.5) * 0.04,
      (((i * 6271) % 13) / 13 - 0.5) * 0.04,
      (((i * 4447) % 11) / 11 - 0.5) * 0.04
    ));
    this._edgeRestLens = this._edges.map(e =>
      this._anchors[e.from].distanceTo(this._anchors[e.to])
    );

    // Build node geometry — position dynamique (mise à jour chaque frame par physique)
    const N = this._nodes.length;
    const nodePosData = new Float32Array(N * 3);
    const nSz = [], nDist = [];
    const nColData = new Float32Array(N * 3);
    const naData   = new Float32Array(N);
    this._nodes.forEach((n, i) => {
      nodePosData[i*3]=n.pos.x; nodePosData[i*3+1]=n.pos.y; nodePosData[i*3+2]=n.pos.z;
      nSz.push(n.size);
      nColData[i*3]=n.color.r; nColData[i*3+1]=n.color.g; nColData[i*3+2]=n.color.b;
      nDist.push(n.pos.length());
    });
    this._nodePosData = nodePosData;
    const ng = new THREE.BufferGeometry();
    const npAttr = new THREE.BufferAttribute(nodePosData, 3); npAttr.setUsage(THREE.DynamicDrawUsage);
    ng.setAttribute('position', npAttr); this._nodePosAttr = npAttr;
    ng.setAttribute('nodeSize', new THREE.Float32BufferAttribute(nSz, 1));
    // B2 — nodeColor dynamique pour lerp territoire
    const ncAttr = new THREE.Float32BufferAttribute(nColData, 3); ncAttr.setUsage(THREE.DynamicDrawUsage);
    ng.setAttribute('nodeColor', ncAttr); this._nodeColorAttr = ncAttr;
    ng.setAttribute('distFromRoot', new THREE.Float32BufferAttribute(nDist, 1));
    // B6 — nodeActivity dynamique pour alpha + taille
    const naAttr = new THREE.BufferAttribute(naData, 1); naAttr.setUsage(THREE.DynamicDrawUsage);
    ng.setAttribute('nodeActivity', naAttr); this._nodeActAttr = naAttr; this._nodeActivities = naData;
    // nodeFireFlash — per-node receive flash, spikes when a pulse arrives, then decays
    const nffData = new Float32Array(N);
    const nffAttr = new THREE.BufferAttribute(nffData, 1); nffAttr.setUsage(THREE.DynamicDrawUsage);
    ng.setAttribute('nodeFireFlash', nffAttr);
    this._nodeFireFlash = nffData; this._nodeFireFlashAttr = nffAttr;
    const nm = new THREE.ShaderMaterial({
      uniforms: {
        uTime: { value: 0 }, uNodeScale: { value: 0.5 },
        uPulseTime: { value: -1000 }, uPulsePos: { value: new THREE.Vector3() }, uPulseSpeed: { value: 12.0 }
      },
      vertexShader: _SYN_NODE_VS, fragmentShader: _SYN_NODE_FS,
      transparent: true, depthWrite: false, blending: THREE.AdditiveBlending
    });
    this._nMesh = new THREE.Points(ng, nm);
    sc.add(this._nMesh);

    // Build connection geometry (quad-based for screen-space line width > 1px)
    if (this._edges.length) {
      const SEG = 12;
      // Each sample point is doubled (side=-1 and side=+1) → SEG*2 vertices per edge
      const csData = new Float32Array(this._edges.length * SEG * 2);
      const cPos = [], sp = [], ep = [], ci = [], cc = [], sd = [];
      this._edges.forEach((e, pi) => {
        const fn = this._nodes[e.from], tn = this._nodes[e.to];
        const mc = fn.color.clone().lerp(tn.color, 0.5);
        for (let s = 0; s < SEG; s++) {
          for (let k = 0; k < 2; k++) {          // k=0 → side=-1, k=1 → side=+1
            cPos.push(s / (SEG - 1), 0, 0);
            sp.push(fn.pos.x, fn.pos.y, fn.pos.z);
            ep.push(tn.pos.x, tn.pos.y, tn.pos.z);
            csData[pi * SEG * 2 + s * 2 + k] = e.str;
            ci.push(pi);
            cc.push(mc.r, mc.g, mc.b);
            sd.push(k === 0 ? -1.0 : 1.0);
          }
        }
      });
      // startPt + endPt dynamiques — mis à jour chaque frame depuis les positions physiques
      const spData = new Float32Array(sp);
      const epData = new Float32Array(ep);
      this._startPtData = spData; this._endPtData = epData;
      const cg = new THREE.BufferGeometry();
      cg.setAttribute('position', new THREE.Float32BufferAttribute(cPos, 3));
      const spAttr = new THREE.BufferAttribute(spData, 3); spAttr.setUsage(THREE.DynamicDrawUsage);
      cg.setAttribute('startPt', spAttr); this._startPtAttr = spAttr;
      const epAttr = new THREE.BufferAttribute(epData, 3); epAttr.setUsage(THREE.DynamicDrawUsage);
      cg.setAttribute('endPt', epAttr); this._endPtAttr = epAttr;
      const csAttr = new THREE.BufferAttribute(csData, 1); csAttr.setUsage(THREE.DynamicDrawUsage);
      cg.setAttribute('connStr', csAttr); this._connStrAttr = csAttr; this._connStrData = csData;
      cg.setAttribute('pathIdx', new THREE.Float32BufferAttribute(ci, 1));
      cg.setAttribute('connColor', new THREE.Float32BufferAttribute(cc, 3));
      cg.setAttribute('side', new THREE.Float32BufferAttribute(sd, 1));
      // Pulse attributes — traveling synapse signals per edge
      const pfData = new Float32Array(this._edges.length * SEG * 2);
      const pfAttr = new THREE.BufferAttribute(pfData, 1); pfAttr.setUsage(THREE.DynamicDrawUsage);
      cg.setAttribute('pulseFront', pfAttr);
      this._pulseFrontData = pfData; this._pulseFrontAttr = pfAttr;
      const paVData = new Float32Array(this._edges.length * SEG * 2);
      const paVAttr = new THREE.BufferAttribute(paVData, 1); paVAttr.setUsage(THREE.DynamicDrawUsage);
      cg.setAttribute('pulseActV', paVAttr);
      this._pulseActVData = paVData; this._pulseActVAttr = paVAttr;
      // Edge pulse state — staggered phases so pulses don't all fire simultaneously
      this._edgePulseT   = new Float32Array(this._edges.length);
      this._edgePulseAct = new Float32Array(this._edges.length);
      for (let i = 0; i < this._edges.length; i++) this._edgePulseT[i] = i / this._edges.length;
      // Two triangles per segment quad: [L0,R0,L1] + [R0,R1,L1]
      const idx = [];
      this._edges.forEach((_, ei) => {
        for (let s = 0; s < SEG - 1; s++) {
          const l0 = 2 * (ei * SEG + s), r0 = l0 + 1, l1 = 2 * (ei * SEG + s + 1), r1 = l1 + 1;
          idx.push(l0, r0, l1, r0, r1, l1);
        }
      });
      cg.setIndex(idx);
      const cm = new THREE.ShaderMaterial({
        uniforms: {
          uTime: { value: 0 },
          uFlowSpeed: { value: 0 },  // driven by chat_rate + urgency
          uCrisis:    { value: 0 },  // driven by crisis_level — teinte orange-rouge
          uPulseTime: { value: -1000 }, uPulsePos: { value: new THREE.Vector3() }, uPulseSpeed: { value: 12.0 },
          uLineWidth:  { value: 5.5 },
          uResolution: { value: new THREE.Vector2(innerWidth, innerHeight) }
        },
        vertexShader: _SYN_CONN_VS, fragmentShader: _SYN_CONN_FS,
        transparent: true, depthWrite: false, blending: THREE.AdditiveBlending,
        side: THREE.DoubleSide
      });
      this._cMesh = new THREE.Mesh(cg, cm);
      sc.add(this._cMesh);
    }
    this._currentFormation = formationIdx;
  }

  init(sc, cam) {
    this._cam = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 600);
    this._cam.position.set(0, 4, 30);

    this._controls = new OrbitControls(this._cam, renderer.domElement);
    Object.assign(this._controls, {
      enableDamping: true, dampingFactor: 0.05,
      autoRotate: true, autoRotateSpeed: 1.5,
      enablePan: false, enableZoom: false
    });

    // Build initial formation dès l'init (évite le flash globe→forme au 1er update)
    const initFormation = this._getFormation(null);
    this._buildNetwork(sc, initFormation, initFormation);
    this._clock.start();

    // Fond étoilé — 2000 pts, phase/freq aléatoires à l'init (jamais en RAF)
    {
      const N = 800, pos = [], phase = [], freq = [];
      for (let i = 0; i < N; i++) {
        const r = THREE.MathUtils.randFloat(60, 200);
        const phi = Math.acos(THREE.MathUtils.randFloatSpread(2));
        const theta = THREE.MathUtils.randFloat(0, Math.PI * 2);
        pos.push(r * Math.sin(phi) * Math.cos(theta), r * Math.sin(phi) * Math.sin(theta), r * Math.cos(phi));
        phase.push(Math.random() * Math.PI * 2);
        freq.push(0.3 + Math.random() * 1.7);
      }
      const sg = new THREE.BufferGeometry();
      sg.setAttribute('position',      new THREE.Float32BufferAttribute(pos,   3));
      sg.setAttribute('aTwinklePhase', new THREE.Float32BufferAttribute(phase, 1));
      sg.setAttribute('aTwinkleFreq',  new THREE.Float32BufferAttribute(freq,  1));
      this._starField = new THREE.Points(sg, new THREE.ShaderMaterial({
        uniforms: { uTime: { value: 0 }, uEnergy: { value: 0 } },
        vertexShader: _SYN_STAR_VS, fragmentShader: _SYN_STAR_FS,
        transparent: true, depthWrite: false, blending: THREE.AdditiveBlending,
      }));
      sc.add(this._starField);
    }

  }

  // B1 — territoire → topologie : ambient/lo-fi→sphère, wonder/mélancolie→sphère étendue,
  // euphoric/chaos→clusters, tense/industrial→hélice.  GlobeMode override retourne 0.
  _getFormation(state) {
    const t = (state && state.drift_territory) || 'ambient';
    if (t==='ambient'||t==='lo-fi'||t==='minimalist') return 3;        // hélice/ADN — distinct du globe sphère
    if (t==='wonder'||t==='melancholic'||t==='neoclassical'||t==='blues'||t==='jazz') return 1; // sphère étendue
    if (t==='euphoric'||t==='chaos'||t==='psych'||t==='cinematic'||t==='electronic') return 2; // clusters
    return 0; // tense, darkwave, industrial — sphère compacte (rare)
  }

  // B6 — signal par groupe de nœuds (5 catégories interleaved) — porteur conditionnel
  _nodeGroupSignal(state, nodeIdx) {
    switch(nodeIdx % 5) {
      case 0: return Math.min(1, Math.max(0, state.world_temperature || 0));
      case 1: return Math.min(1, Math.max(0, state.crisis_level || 0));
      case 2: return Math.min(1, Math.max(0, state.drift_energy || 0));
      case 3: return Math.min(1, Math.max(0, (state.chat_rate || 0) / 30));
      case 4: return Math.min(1, Math.max(0, (state.cpu_percent || 0) / 100));
      default: return 0;
    }
  }

  update(state, dt) {
    const t = this._clock.getElapsedTime();
    const burstSignal = state.world_event_burst ?? 0;
    const predErrors = state.prediction_errors ?? {};
    const sigVols = state.signal_volatilities ?? {};
    // Normaliser PE/σ, borné [0,1] — les valeurs brutes (ex: cpu_percent error=15)
    // rendaient targetNodeScale > 9, créant des sprites de 300px+ qui saturaient l'AdditiveBlending
    const normPEList = Object.keys(predErrors).map(k => {
      const err = Math.abs(Number(predErrors[k]) || 0);
      const vol = Math.max(Number(sigVols[k]) || 0.1, 0.001);
      return Math.min(err / vol, 3.0) / 3.0;
    }).filter(isFinite);
    const maxPredError = normPEList.length > 0 ? Math.max(0, ...normPEList) : 0;

    const formation = this._getFormation(state); // B1
    if (formation !== this._currentFormation) {
      this._buildNetwork(scene, formation, formation);
    }

    // B6 — activité par nœud (lerp pour éviter les sauts)
    if (this._nodeActivities && this._nodes.length) {
      for (let i = 0; i < this._nodes.length; i++) {
        this._nodeActivities[i] = this._lerp(this._nodeActivities[i], this._nodeGroupSignal(state, i), 0.06);
      }
      if (this._nodeActAttr) this._nodeActAttr.needsUpdate = true;
    }

    // B2 — lerp couleur vers teinte territoire (~25s transition)
    const territory = state.drift_territory || 'ambient';
    const tCol = _NN_TERRITORY_COLORS[territory] || _NN_TERRITORY_COLORS.ambient;
    if (this._nodeColorAttr && this._nodes.length) {
      const _tc = new THREE.Color();
      this._nodes.forEach((n, i) => {
        if (!n.currentColor) return;
        _tc.copy(n.color).lerp(tCol, 0.35);
        n.currentColor.lerp(_tc, 0.04);
        this._nodeColorAttr.setXYZ(i, n.currentColor.r, n.currentColor.g, n.currentColor.b);
      });
      this._nodeColorAttr.needsUpdate = true;
    }

    // B3 — connStr dynamique : moyenne activité des deux extrémités (×2 vertices par sample)
    if (this._connStrAttr && this._connStrData && this._nodeActivities) {
      const SEG = 12;
      this._edges.forEach((e, ei) => {
        const cs = Math.min(0.95, 0.20 + (this._nodeActivities[e.from] + this._nodeActivities[e.to]) * 0.40);
        for (let s = 0; s < SEG; s++) {
          this._connStrData[ei * SEG * 2 + s * 2]     = cs;
          this._connStrData[ei * SEG * 2 + s * 2 + 1] = cs;
        }
      });
      this._connStrAttr.needsUpdate = true;
    }

    // B7 — world_event_burst → explosion radiale sur les velocités + spike de scale
    if (burstSignal > 0.1 && this._lastBurst <= 0.1) {
      this._burstScale = 1.2;
      // Impulsion radiale depuis le centre (amplitude ~3 unités/s)
      for (let i = 0; i < this._nodes.length; i++) {
        const p = this._nodes[i].pos, len = Math.max(p.length(), 0.1);
        const amp = 3.0 + (i % 7) * 0.15; // variation déterministe
        this._velocities[i].x += (p.x / len) * amp;
        this._velocities[i].y += (p.y / len) * amp;
        this._velocities[i].z += (p.z / len) * amp;
      }
    }
    if (this._burstScale > 0) {
      this._burstScale *= Math.pow(0.88, (dt || 0.016) / 0.016);
      if (this._burstScale < 0.01) this._burstScale = 0;
    }
    this._targetNodeScale = Math.max(1.0 + maxPredError * 0.8, this._burstScale);
    this._currentNodeScale = this._lerp(this._currentNodeScale, this._targetNodeScale, 0.05);

    // Simulation de forces — graphe vivant
    this._physicsStep(state, dt || 0.016);

    // ── Synapse pulses — glowing signals travel along each connection ──────────
    // speed = f(excitement, bpm) — NO_FAKE; base 0.025 = ~2.5% minimal resting activity
    if (this._edgePulseT && this._pulseFrontData) {
      const SEG = 12;
      const peArr = Object.values(predErrors);
      const maxPE2 = Math.max(0.01, ...peArr.map(v => Math.abs(Number(v)||0)));
      const excite = Math.max(0, Math.min(1, state.excitement || 0));
      const pulseSpd = 0.025 + excite * 0.25 + ((state.drift_bpm || state.audio_bpm || 90) / 60) * 0.025;
      const E2 = this._edges.length;
      for (let ei = 0; ei < E2; ei++) {
        const e = this._edges[ei];
        const pA = peArr.length ? Math.abs(Number(peArr[e.from % peArr.length]||0)) / maxPE2 : 0;
        const pB = peArr.length ? Math.abs(Number(peArr[e.to   % peArr.length]||0)) / maxPE2 : 0;
        this._edgePulseAct[ei] += (Math.max(pA, pB) - this._edgePulseAct[ei]) * 0.05;
        const prevT = this._edgePulseT[ei];
        this._edgePulseT[ei] = (prevT + pulseSpd * (dt||0.016)) % 1.0;
        const pf = this._edgePulseT[ei], pa = this._edgePulseAct[ei];
        // Flash destination node when pulse arrives (porteur conditionnel: pa > 0.08)
        if (prevT > 0.85 && pf < 0.15 && this._nodeFireFlash && pa > 0.08) {
          this._nodeFireFlash[e.to] = Math.min(1.0, (this._nodeFireFlash[e.to]||0) + pa * 0.7);
        }
        for (let s = 0; s < SEG; s++) {
          const base = (ei * SEG + s) * 2;
          this._pulseFrontData[base] = this._pulseFrontData[base+1] = pf;
          this._pulseActVData[base]  = this._pulseActVData[base+1]  = pa;
        }
      }
      this._pulseFrontAttr.needsUpdate = true;
      this._pulseActVAttr.needsUpdate  = true;
    }
    // Decay node fire flashes (~0.06^dt ≈ 0.91/frame at 30fps → visible ~0.8s)
    if (this._nodeFireFlash && this._nodeFireFlashAttr) {
      const decay = Math.pow(0.06, dt||0.016);
      for (let i = 0; i < this._nodeFireFlash.length; i++) {
        if (this._nodeFireFlash[i] > 0.005) this._nodeFireFlash[i] *= decay;
        else this._nodeFireFlash[i] = 0;
      }
      this._nodeFireFlashAttr.needsUpdate = true;
    }

    if (this._nMesh) {
      this._nMesh.material.uniforms.uTime.value = t;
      this._nMesh.material.uniforms.uNodeScale.value = this._currentNodeScale;
    }
    if (this._cMesh) {
      this._cMesh.material.uniforms.uTime.value = t;
      this._cMesh.material.uniforms.uFlowSpeed.value = (state.chat_rate ?? 0) * 4.0 + (state.urgency ?? 0) * 2.0;
      this._cMesh.material.uniforms.uCrisis.value    = Math.min(1, Math.max(0, state.crisis_level ?? 0));
      // Épaisseur data-driven : 1.5px au repos → 3.5px en pic (world_temperature + urgency)
      const wt = Math.max(0, Math.min(1, state.world_temperature || 0));
      const urg = Math.max(0, Math.min(1, state.urgency || 0));
      this._cMesh.material.uniforms.uLineWidth.value  = 3.5 + wt * 2.5 + urg * 1.5;
      this._cMesh.material.uniforms.uResolution.value.set(innerWidth, innerHeight);
    }

    // B5+B7 — pulse depuis le nœud le plus actif (plus de Math.random en RAF)
    if (burstSignal > 0.1 && this._lastBurst <= 0.1) {
      let maxAct = -1, pNode = null;
      if (this._nodeActivities) {
        for (let i = 0; i < this._nodes.length; i++) {
          if (this._nodeActivities[i] > maxAct) { maxAct = this._nodeActivities[i]; pNode = this._nodes[i]; }
        }
      }
      if (!pNode && this._nodes.length) pNode = this._nodes[0];
      if (pNode) {
        if (this._nMesh) { this._nMesh.material.uniforms.uPulseTime.value = t; this._nMesh.material.uniforms.uPulsePos.value.copy(pNode.pos); }
        if (this._cMesh) { this._cMesh.material.uniforms.uPulseTime.value = t; this._cMesh.material.uniforms.uPulsePos.value.copy(pNode.pos); }
      }
    }
    this._lastBurst = burstSignal;

    // Étoiles — uniforms data-driven (scintillement = 0 si drift_energy nul)
    if (this._starField) {
      const energy = Math.min(1, Math.max(0, state.drift_energy || state.world_temperature || 0));
      this._starField.material.uniforms.uTime.value   = t;
      this._starField.material.uniforms.uEnergy.value = energy;
    }

    // Fond — lerp lent (~30s) vers teinte territoire sombre data-driven
    this._bgColor.lerp(_SYN_BG_COLORS[territory] || _SYN_BG_DEFAULT, 0.008);
    scene.background = this._bgColor;

    if (this._controls) {
      // autoRotateSpeed = f(world_temperature) — 0.5 repos → 2.5 pic
      const wt = Math.max(0, Math.min(1, state.world_temperature || 0));
      this._controls.autoRotateSpeed = 0.5 + wt * 2.0;
      this._controls.update();
    }
    if (this._cam.aspect !== innerWidth / innerHeight) {
      this._cam.aspect = innerWidth / innerHeight;
      this._cam.updateProjectionMatrix();
    }
    renderer.render(scene, this._cam);
    return true;
  }

  dispose(sc) {
    if (this._nMesh) { sc.remove(this._nMesh); this._nMesh.geometry.dispose(); this._nMesh.material.dispose(); this._nMesh = null; }
    if (this._cMesh) { sc.remove(this._cMesh); this._cMesh.geometry.dispose(); this._cMesh.material.dispose(); this._cMesh = null; }
    if (this._starField) { sc.remove(this._starField); this._starField.geometry.dispose(); this._starField.material.dispose(); this._starField = null; }
    if (this._controls) { this._controls.dispose(); this._controls = null; }
    this._nodes = []; this._edges = [];
    this._nodeColorAttr = null; this._connStrAttr = null; this._connStrData = null;
    this._nodeActAttr = null; this._nodeActivities = null;
    this._velocities = []; this._anchors = []; this._edgeRestLens = [];
    this._nodePosAttr = null; this._nodePosData = null;
    this._startPtAttr = null; this._startPtData = null;
    this._endPtAttr   = null; this._endPtData   = null;
    this._nodeFireFlash = null; this._nodeFireFlashAttr = null;
    this._edgePulseT = null; this._edgePulseAct = null;
    this._pulseFrontData = null; this._pulseFrontAttr = null;
    this._pulseActVData = null; this._pulseActVAttr = null;
    scene.background = new THREE.Color(0x000000);
    renderer.setSize(innerWidth, innerHeight);
  }
}

// ── Mode CHAOS ────────────────────────────────────────────────────────────────
// Métamorphose de particules entre 4 attracteurs chaotiques.
// La transition n'est déclenchée que par un changement de signal — jamais par timer.
// Math.random() utilisé uniquement à l'initialisation des particules.

class ChaosMode {
  constructor() {
    this._cam = null; this._controls = null;
    this._particles = null; this._sparkles = null; this._starField = null;
    this._clock = new THREE.Clock();
    this.targetAttractor = 0;
    this.lastEvalTime = 0;
    this.morphProgress = 0;
    this.morphing = false;
    this._fromPts = null;
    this._toPts = null;
  }

  _normalise(points, size) {
    if (points.length === 0) return [];
    const box = new THREE.Box3().setFromPoints(points);
    const dim = box.getSize(new THREE.Vector3());
    const maxDim = Math.max(dim.x, dim.y, dim.z) || 1;
    const centre = box.getCenter(new THREE.Vector3());
    return points.map(p => p.clone().sub(centre).multiplyScalar(size / maxDim));
  }

  _torusKnot(n) {
    const geo = new THREE.TorusKnotGeometry(10, 3, 200, 16, 2, 3);
    const pts = [];
    const pa = geo.attributes.position;
    for (let i = 0; i < pa.count; i++) pts.push(new THREE.Vector3().fromBufferAttribute(pa, i));
    geo.dispose();
    const result = [];
    for (let i = 0; i < n; i++) result.push(pts[i % pts.length].clone());
    return this._normalise(result, 50);
  }

  _halvorsen(n) {
    const pts = []; let x = 0.1, y = 0, z = 0; const a = 1.89, dt = 0.005;
    for (let i = 0; i < n * 25; i++) {
      const dx = -a * x - 4 * y - 4 * z - y * y;
      const dy = -a * y - 4 * z - 4 * x - z * z;
      const dz = -a * z - 4 * x - 4 * y - x * x;
      x += dx * dt; y += dy * dt; z += dz * dt;
      if (i > 200 && i % 25 === 0) pts.push(new THREE.Vector3(x, y, z));
      if (pts.length >= n) break;
    }
    while (pts.length < n) pts.push(pts[pts.length - 1].clone());
    return this._normalise(pts, 60);
  }

  _dualHelix(n) {
    const pts = []; const turns = 5, radius = 15, height = 40;
    for (let i = 0; i < n; i++) {
      const isSecond = i % 2 === 0;
      const angle = (i / n) * Math.PI * 2 * turns;
      const y = (i / n) * height - height / 2;
      const r = radius + (isSecond ? 5 : -5);
      pts.push(new THREE.Vector3(Math.cos(angle) * r, y, Math.sin(angle) * r));
    }
    return this._normalise(pts, 60);
  }

  _deJong(n) {
    const pts = []; let x = 0.1, y = 0.1;
    const a = 1.4, b = -2.3, c = 2.4, d = -2.1;
    for (let i = 0; i < n; i++) {
      const xn = Math.sin(a * y) - Math.cos(b * x);
      const yn = Math.sin(c * x) - Math.cos(d * y);
      x = xn; y = yn;
      pts.push(new THREE.Vector3(x, y, Math.sin(x * y * 0.5)));
    }
    return this._normalise(pts, 55);
  }

  _getPattern(idx, n) {
    if (idx === 0) return this._torusKnot(n);
    if (idx === 1) return this._halvorsen(n);
    if (idx === 2) return this._dualHelix(n);
    return this._deJong(n);
  }

  _applyPattern(pts) {
    const COUNT = 2000;
    const arr = this._particles.geometry.attributes.position.array;
    for (let i = 0; i < COUNT; i++) {
      const idx = i * 3, p = pts[i] || new THREE.Vector3();
      arr[idx] = p.x; arr[idx + 1] = p.y; arr[idx + 2] = p.z;
    }
    this._particles.geometry.attributes.position.needsUpdate = true;
  }

  _computeTargetAttractor(state) {
    const territory = state.drift_territory ?? 0;
    const predErrors = state.prediction_errors ?? {};
    const sigVols = state.signal_volatilities ?? {};
    const maxPredError = Math.max(0, ...Object.values(predErrors).map(Number).filter(isFinite));
    const maxVolatility = Math.max(0, ...Object.values(sigVols).map(Number).filter(isFinite));

    if (maxVolatility > 0.3 && maxVolatility >= maxPredError) return 1; // halvorsen
    if (territory >= 0.5 && territory < 0.75) return 2;                 // dualHelix
    if (maxPredError > 0.3) return 3;                                    // deJong
    return 0;                                                            // torusKnot (rest/fallback)
  }

  _makeParticles(count) {
    const geo = new THREE.BufferGeometry();
    const pos = new Float32Array(count * 3);
    const col = new Float32Array(count * 3);
    const size = new Float32Array(count);
    const rnd = new Float32Array(count * 3);
    const palette = [0xff3c78, 0xff8c00, 0xfff200, 0x00cfff, 0xb400ff, 0xffffff, 0xff4040].map(c => new THREE.Color(c));
    // Math.random() only at initialization — not in animation loop
    for (let i = 0; i < count; i++) {
      const base = palette[Math.floor(Math.random() * palette.length)];
      const hsl = { h: 0, s: 0, l: 0 };
      base.getHSL(hsl);
      hsl.h += (Math.random() - 0.5) * 0.05;
      hsl.s = Math.min(1, Math.max(0.7, hsl.s + (Math.random() - 0.5) * 0.3));
      hsl.l = Math.min(0.9, Math.max(0.5, hsl.l + (Math.random() - 0.5) * 0.4));
      const c = new THREE.Color().setHSL(hsl.h, hsl.s, hsl.l);
      col[i * 3] = c.r; col[i * 3 + 1] = c.g; col[i * 3 + 2] = c.b;
      size[i] = 0.7 + Math.random() * 1.1;
      rnd[i * 3] = Math.random() * 10;
      rnd[i * 3 + 1] = Math.random() * Math.PI * 2;
      rnd[i * 3 + 2] = 0.5 + 0.5 * Math.random();
    }
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    geo.setAttribute('color', new THREE.BufferAttribute(col, 3));
    geo.setAttribute('size', new THREE.BufferAttribute(size, 1));
    geo.setAttribute('random', new THREE.BufferAttribute(rnd, 3));

    // Particle vertex shader: positional turbulence uses pre-seeded random attributes,
    // NOT Math.random() in the loop. The turbulence amplitude is bounded and non-fake
    // because it only adds micro-variation to data-set positions (attractor shape is data-driven).
    const mat = new THREE.ShaderMaterial({
      uniforms: {
        time:         { value: 0 },
        uWonder:      { value: 0 },
        uAnomalyScore:{ value: 0 },
        uCrisisLevel: { value: 0 },
        uMelancholy:  { value: 0 },
        uDriftEnergy: { value: 0 },
        uExcitement:  { value: 0 },
        uUrgency:     { value: 0 },
        uBPMRate:     { value: 1.0 },
      },
      vertexShader: `
uniform float time;
uniform float uAnomalyScore;
uniform float uDriftEnergy;
uniform float uExcitement;
uniform float uUrgency;
uniform float uBPMRate;
attribute float size;
attribute vec3 random;
varying vec3 vCol;
varying float vR;
void main(){
  vCol = color; vR = random.z;
  vec3 p = position;
  // Speed modulated by excitement — base 0.15 est le floor anti-dead-screen
  float speed = 0.15 * (1.0 + uExcitement * 2.2);
  float tx = time * speed * random.z;
  float ax = tx + random.y, ay = tx * 0.75 + random.x;
  // floor 1.5% du range — anti-dead-screen sur forme attractor data-driven
  float amp = (0.015 + uAnomalyScore * 0.30 + uUrgency * 0.22) * random.z;
  p.x += sin(ax + p.y * 0.04 + random.x * 0.1) * amp;
  p.y += cos(ay + p.z * 0.04 + random.y * 0.1) * amp;
  p.z += sin(ax * 0.85 + p.x * 0.04 + random.z * 0.1) * amp;
  vec4 mv = modelViewMatrix * vec4(p, 1.0);
  // BPM size pulse par particule — porteur conditionnel: zéro si excitement = 0
  float bpmPulse = sin(time * uBPMRate * 1.8 + random.y * 6.2832) * max(0.0, uExcitement - 0.08) * 0.65;
  gl_PointSize = clamp(size * (350.0 / -mv.z) * (1.25 + uDriftEnergy * 0.40 + bpmPulse), 1.0, 64.0);
  gl_Position = projectionMatrix * mv;
}`,
      fragmentShader: `
uniform float time;
uniform float uWonder;
uniform float uCrisisLevel;
uniform float uMelancholy;
uniform float uExcitement;
uniform float uUrgency;
varying vec3 vCol;
varying float vR;
vec3 hueShift(vec3 c, float h){
  const vec3 k = vec3(0.57735);
  float ca = cos(h), sa = sin(h);
  return c * ca + cross(k, c) * sa + k * dot(k, c) * (1.0 - ca);
}
void main(){
  vec2 uv = gl_PointCoord - 0.5;
  float d = length(uv);
  // Glow radius se resserre avec excitement → apparence plus lumineuse
  float glowR = 0.40 - uExcitement * 0.12;
  float glow = smoothstep(glowR, 0.08, d);
  float core = smoothstep(0.05, 0.0, d);
  // Urgency spark sur particules "rapides" (vR > 0.72) — porteur conditionnel
  float spark = step(0.72, vR) * smoothstep(0.08, 0.0, d) * uUrgency * 1.10;
  float alpha = core + glow * (0.58 + uExcitement * 0.32) + spark;
  if(alpha < 0.01) discard;
  vec3 col = mix(hueShift(vCol, time * 0.06 * uWonder), vec3(1.0), core);
  // Excitement : brightening vers blanc — porteur conditionnel
  col = mix(col, vec3(1.0), uExcitement * 0.25 * core);
  // Urgency spark : teinte dorée — porteur conditionnel
  col = mix(col, vec3(1.0, 0.85, 0.3), spark * 0.80);
  // Crisis : tinte rouge — porteur conditionnel
  col = mix(col, vec3(1.0,0.15,0.1), uCrisisLevel * 0.45);
  // Melancholy : désaturation — porteur conditionnel
  float luma = dot(col, vec3(0.299,0.587,0.114));
  col = mix(col, vec3(luma), uMelancholy * 0.55);
  gl_FragColor = vec4(col, alpha);
}`,
      transparent: true, depthWrite: false, vertexColors: true, blending: THREE.AdditiveBlending
    });
    return new THREE.Points(geo, mat);
  }

  _makeStars(count) {
    const geo = new THREE.BufferGeometry();
    const pos = new Float32Array(count * 3);
    for (let i = 0; i < count; i++) {
      const theta = Math.random() * 2 * Math.PI;
      const phi = Math.acos(2 * Math.random() - 1);
      const r = 400 + Math.random() * 500;
      pos[i * 3] = r * Math.sin(phi) * Math.cos(theta);
      pos[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
      pos[i * 3 + 2] = r * Math.cos(phi);
    }
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    return new THREE.Points(geo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.5, depthWrite: false, transparent: true, opacity: 0.6 }));
  }

  init(sc, cam) {
    this._cam = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 2500);
    this._cam.position.set(0, 0, 55);

    this._controls = new OrbitControls(this._cam, renderer.domElement);
    Object.assign(this._controls, {
      enableDamping: true, dampingFactor: 0.05,
      minDistance: 15, maxDistance: 120,
      autoRotate: true, autoRotateSpeed: 0.3
    });

    this._starField = this._makeStars(600);
    sc.add(this._starField);

    this._particles = this._makeParticles(2000);
    sc.add(this._particles);

    // Set initial pattern (torusKnot)
    const initPts = this._getPattern(0, 2000);
    this._applyPattern(initPts);
    this._fromPts = this._particles.geometry.attributes.position.array.slice();
    this._clock.start();

  }

  update(state, dt) {
    const now = this._clock.getElapsedTime();
    const burst = state.world_event_burst ?? 0;

    // Re-evaluate attractor every 30s or on burst spike
    if (now - this.lastEvalTime > 30 || burst > 0.1) {
      const newTarget = this._computeTargetAttractor(state);
      if (newTarget !== this.targetAttractor && !this.morphing) {
        // Store current positions as from-points
        this._fromPts = this._particles.geometry.attributes.position.array.slice();
        // Compute destination
        const pts = this._getPattern(newTarget, 2000);
        this._toPts = new Float32Array(2000 * 3);
        for (let i = 0; i < 2000; i++) {
          const p = pts[i] || new THREE.Vector3();
          this._toPts[i * 3] = p.x; this._toPts[i * 3 + 1] = p.y; this._toPts[i * 3 + 2] = p.z;
        }
        this.targetAttractor = newTarget;
        this.morphing = true;
        this.morphProgress = 0;
      }
      this.lastEvalTime = now;
    }

    // Advance morph — speed gated by burst signal
    if (this.morphing && this._fromPts && this._toPts) {
      const speed = 0.3 + burst * 2.0;
      this.morphProgress += speed * (dt || 0.016);
      if (this.morphProgress >= 1) { this.morphProgress = 1; this.morphing = false; }
      const eased = 1 - Math.pow(1 - Math.min(this.morphProgress, 1), 3);
      const arr = this._particles.geometry.attributes.position.array;
      for (let i = 0; i < arr.length; i++) {
        arr[i] = this._fromPts[i] + (this._toPts[i] - this._fromPts[i]) * eased;
      }
      this._particles.geometry.attributes.position.needsUpdate = true;
    }

    // Update time and signal-gated uniforms
    const t = this._clock.getElapsedTime();
    if (this._particles) {
      const mat = this._particles.material;
      mat.uniforms.time.value          = t;
      mat.uniforms.uWonder.value       = Math.max(0, Math.min(1, state.wonder        || 0));
      mat.uniforms.uAnomalyScore.value = Math.max(0, Math.min(1, state.anomaly_score || 0));
      mat.uniforms.uCrisisLevel.value  = Math.max(0, Math.min(1, state.crisis_level  || 0));
      mat.uniforms.uMelancholy.value   = Math.max(0, Math.min(1, state.melancholy    || 0));
      mat.uniforms.uDriftEnergy.value  = Math.max(0, Math.min(1, state.drift_energy  || 0));
      mat.uniforms.uExcitement.value   = Math.max(0, Math.min(1, state.excitement   || 0));
      mat.uniforms.uUrgency.value      = Math.max(0, Math.min(1, state.urgency      || 0));
      mat.uniforms.uBPMRate.value      = ((state.drift_bpm || 90) / 90);
    }

    // Vitesse rotation : excitement booste jusqu'à ×6 — porteur conditionnel
    if (this._controls) {
      this._controls.autoRotateSpeed = 0.3 + (Math.max(0, Math.min(1, state.excitement || 0))) * 1.5;
    }

    // Background: dark
    scene.background = new THREE.Color(0, 0, 0);

    if (this._controls) this._controls.update();
    renderer.render(scene, this._cam);
    return true;
  }

  dispose(sc) {
    if (this._particles) { sc.remove(this._particles); this._particles.geometry.dispose(); this._particles.material.dispose(); this._particles = null; }
    if (this._starField) { sc.remove(this._starField); this._starField.geometry.dispose(); this._starField.material.dispose(); this._starField = null; }
    if (this._controls) { this._controls.dispose(); this._controls = null; }
    this._fromPts = null; this._toPts = null;
    scene.background = new THREE.Color(0x000000);
  }
}

// ── Helper : territoire string → fraction 0-1 ─────────────────────────────────
// Ordre croissant : calme/ambient → intense/noise.  Utilisé par SynapseMode.
const _TERRITORY_LIST = [
  'ambient','lo-fi','minimalist','blues','jazz','neoclassical',
  'cinematic','electronic','drone','psych','experimental',
  'techno','darkwave','industrial','noise'
];
function _terr2frac(t) {
  const i = _TERRITORY_LIST.indexOf(String(t));
  return i >= 0 ? i / (_TERRITORY_LIST.length - 1) : 0;
}


// ── Mode GLOBE — sphère synaptique, formation 0 forcée ───────────────────────
// Même réseau que SynapseMode mais figé sur la formation sphère quelle que soit
// la dérive territoriale.  Tous les autres signaux (PE, burst, chat) restent actifs.
class GlobeMode extends SynapseMode {
  _getFormation(state) { return 0; }  // Globe = sphère toujours (R=12)

  constructor() {
    super();
    this._outerGroup = null;
    this._outerNodeDots = null; this._outerEdges = null;
    this._outerParticles = null; this._outerParticleMat = null;
    this._outerNodeMat = null; this._outerEdgeMat = null;
    this._outerNodePositions = null; this._outerEdgePairs = null;
    this._outerPulseT = null;
    this._outerNodeActData = null; this._outerNodeActAttr = null;
    this._outerNodeFlashData = null; this._outerNodeFlashAttr = null;
    this._outerEdgePulseTData = null; this._outerEdgePulseTAttr = null;
    this._outerEdgeActData = null; this._outerEdgeActAttr = null;
    this._outerTime = 0;
    this._NX_COLS = {
      ambient:new THREE.Color(0x00D4FF), crisis:new THREE.Color(0xFF4444),
      peak:new THREE.Color(0xFFD700), drift:new THREE.Color(0xAA44FF),
      storm:new THREE.Color(0xFF8844), contemplative:new THREE.Color(0x44AAFF),
    };
  }

  init(sc, cam) {
    super.init(sc, cam);
    this._buildOuterNetwork(sc);
  }

  _buildOuterNetwork(sc) {
    const N = 28, SEGS = 6, R = 18; // outer radius > GlobeMode sphere (R=12)
    const phi = Math.PI * (3 - Math.sqrt(5));
    const nodePos = [];
    for (let i = 0; i < N; i++) {
      const y = 1 - (i / (N-1)) * 2, r = Math.sqrt(Math.max(0, 1-y*y)), th = phi*i;
      nodePos.push(new THREE.Vector3(Math.cos(th)*r*R, y*R, Math.sin(th)*r*R));
    }
    this._outerNodePositions = nodePos;

    const edgePairs = [], edgeSet = new Set();
    for (let i = 0; i < N; i++) {
      const d = [];
      for (let j = 0; j < N; j++) { if (i !== j) d.push([j, nodePos[i].distanceTo(nodePos[j])]); }
      d.sort((a, b) => a[1] - b[1]);
      for (let k = 0; k < 3; k++) {
        const j = d[k][0], key = Math.min(i,j)+','+Math.max(i,j);
        if (!edgeSet.has(key)) { edgeSet.add(key); edgePairs.push([i,j]); }
      }
    }
    this._outerEdgePairs = edgePairs;
    const E = edgePairs.length;

    this._outerGroup = new THREE.Group(); sc.add(this._outerGroup);

    // Node dots — PE-driven activation
    const nodePosArr = new Float32Array(N*3);
    const nodeActArr = new Float32Array(N).fill(0.3);
    nodePos.forEach((v,i)=>{ nodePosArr[i*3]=v.x; nodePosArr[i*3+1]=v.y; nodePosArr[i*3+2]=v.z; });
    const nodeGeo = new THREE.BufferGeometry();
    nodeGeo.setAttribute('position', new THREE.BufferAttribute(nodePosArr, 3));
    const nodeActAttr = new THREE.BufferAttribute(nodeActArr, 1); nodeActAttr.setUsage(THREE.DynamicDrawUsage);
    nodeGeo.setAttribute('aActivation', nodeActAttr);
    const nodeFlashArr = new Float32Array(N);
    const nodeFlashAttr = new THREE.BufferAttribute(nodeFlashArr, 1); nodeFlashAttr.setUsage(THREE.DynamicDrawUsage);
    nodeGeo.setAttribute('nodeFireFlash', nodeFlashAttr);
    this._outerNodeMat = new THREE.ShaderMaterial({
      uniforms: { uAudioLevel:{value:0}, uHealthRatio:{value:1}, uColor:{value:new THREE.Color(0x00D4FF)} },
      vertexShader: _NX_NODE_VS, fragmentShader: _NX_NODE_FS,
      transparent:true, depthWrite:false, blending:THREE.AdditiveBlending,
    });
    this._outerNodeDots = new THREE.Points(nodeGeo, this._outerNodeMat);
    this._outerNodeActData = nodeActArr; this._outerNodeActAttr = nodeActAttr;
    this._outerNodeFlashData = nodeFlashArr; this._outerNodeFlashAttr = nodeFlashAttr;
    this._outerGroup.add(this._outerNodeDots);

    // Subdivided edges — billboard quads with pulse (NO_FAKE: BPM+PE-driven)
    const VERTS = E*SEGS*4;
    const edgePosArr=new Float32Array(VERTS*3), edgeTArr=new Float32Array(VERTS);
    const edgeDirArr=new Float32Array(VERTS*3), edgeSideArr=new Float32Array(VERTS);
    const edgePulseTArr=new Float32Array(VERTS), edgeActArr=new Float32Array(VERTS);
    edgePairs.forEach(([ai,bi],ei)=>{
      const a=nodePos[ai], b=nodePos[bi];
      const dx=b.x-a.x, dy=b.y-a.y, dz=b.z-a.z;
      const len=Math.sqrt(dx*dx+dy*dy+dz*dz)||1;
      const dirX=dx/len, dirY=dy/len, dirZ=dz/len;
      for (let s=0; s<SEGS; s++) {
        const t0=s/SEGS, t1=(s+1)/SEGS;
        for (let k=0; k<4; k++) {
          const vi=(ei*SEGS+s)*4+k, t=(k<2)?t0:t1, side=(k%2===0)?-1:1;
          edgePosArr[vi*3]=a.x+(b.x-a.x)*t; edgePosArr[vi*3+1]=a.y+(b.y-a.y)*t; edgePosArr[vi*3+2]=a.z+(b.z-a.z)*t;
          edgeTArr[vi]=t;
          edgeDirArr[vi*3]=dirX; edgeDirArr[vi*3+1]=dirY; edgeDirArr[vi*3+2]=dirZ;
          edgeSideArr[vi]=side;
        }
      }
    });
    const edgeIdx=[];
    edgePairs.forEach((_,ei)=>{ for(let s=0;s<SEGS;s++){const b0=(ei*SEGS+s)*4; edgeIdx.push(b0,b0+1,b0+2,b0+1,b0+3,b0+2);} });
    const edgeGeo=new THREE.BufferGeometry();
    edgeGeo.setAttribute('position', new THREE.BufferAttribute(edgePosArr,3));
    edgeGeo.setAttribute('aT',       new THREE.BufferAttribute(edgeTArr,1));
    edgeGeo.setAttribute('aEdgeDir', new THREE.BufferAttribute(edgeDirArr,3));
    edgeGeo.setAttribute('aSide',    new THREE.BufferAttribute(edgeSideArr,1));
    edgeGeo.setIndex(edgeIdx);
    const ePulseTAttr=new THREE.BufferAttribute(edgePulseTArr,1); ePulseTAttr.setUsage(THREE.DynamicDrawUsage);
    edgeGeo.setAttribute('aPulseT', ePulseTAttr);
    const eActAttr=new THREE.BufferAttribute(edgeActArr,1); eActAttr.setUsage(THREE.DynamicDrawUsage);
    edgeGeo.setAttribute('aActivation', eActAttr);
    this._outerEdgeMat = new THREE.ShaderMaterial({
      uniforms:{uColor:{value:new THREE.Color(0x00D4FF)},uAudioLevel:{value:0},uAnomalyScore:{value:0},
               uLineWidth:{value:2.5},uResolution:{value:new THREE.Vector2(innerWidth,innerHeight)}},
      vertexShader:_NX_EDGE_VS, fragmentShader:_NX_EDGE_FS,
      transparent:true, depthWrite:false, blending:THREE.AdditiveBlending, side:THREE.DoubleSide,
    });
    this._outerEdges = new THREE.Mesh(edgeGeo, this._outerEdgeMat);
    this._outerEdgePulseTData=edgePulseTArr; this._outerEdgePulseTAttr=ePulseTAttr;
    this._outerEdgeActData=edgeActArr; this._outerEdgeActAttr=eActAttr;
    this._outerPulseT = new Float32Array(E); for(let i=0;i<E;i++) this._outerPulseT[i]=i/E;
    this._outerGroup.add(this._outerEdges);

    // Background particles (sparse deep-field — init-only random, OK per NO_FAKE)
    const NP=150, ppos=new Float32Array(NP*3), pcol=new Float32Array(NP*3);
    const c1=new THREE.Color(0x00D4FF), c2=new THREE.Color(0x003355);
    for(let i=0;i<NP;i++){
      ppos[i*3]=(Math.random()-0.5)*60; ppos[i*3+1]=(Math.random()-0.5)*60; ppos[i*3+2]=(Math.random()-0.5)*60;
      const t=Math.random();
      pcol[i*3]=c1.r*t+c2.r*(1-t); pcol[i*3+1]=c1.g*t+c2.g*(1-t); pcol[i*3+2]=c1.b*t+c2.b*(1-t);
    }
    const pgeo=new THREE.BufferGeometry();
    pgeo.setAttribute('position',new THREE.BufferAttribute(ppos,3));
    pgeo.setAttribute('color',new THREE.BufferAttribute(pcol,3));
    this._outerParticleMat=new THREE.ShaderMaterial({
      uniforms:{uTime:{value:0},uAudioLevel:{value:0}},
      vertexShader:_NX_PART_VS, fragmentShader:_NX_PART_FS,
      transparent:true, depthWrite:false, blending:THREE.AdditiveBlending,
    });
    this._outerParticles=new THREE.Points(pgeo,this._outerParticleMat); sc.add(this._outerParticles);
  }

  _updateOuter(state, dt) {
    if (!this._outerGroup) return;
    this._outerTime += dt;
    const energy  = state.audio_energy_level||0;
    const bpm     = state.audio_bpm||state.drift_bpm||90;
    const anomaly = Math.min(1,(state.anomaly_score||0)/10);
    const terr    = state.drift_territory||'ambient';
    const col     = this._NX_COLS[terr]||this._NX_COLS.ambient;
    const hVals   = Object.values(state.source_health||{});
    const healthRatio = hVals.length ? hVals.filter(Boolean).length/hVals.length : 1;
    const peVals  = Object.values(state.prediction_errors||{});
    const maxPE   = peVals.length ? Math.max(0.01,...peVals.map(v=>Math.abs(v))) : 1;

    this._outerNodeMat.uniforms.uAudioLevel.value  = energy;
    this._outerNodeMat.uniforms.uHealthRatio.value = healthRatio;
    this._outerNodeMat.uniforms.uColor.value.copy(col);
    this._outerEdgeMat.uniforms.uAudioLevel.value  = energy;
    this._outerEdgeMat.uniforms.uAnomalyScore.value= anomaly;
    this._outerEdgeMat.uniforms.uColor.value.copy(col);
    this._outerEdgeMat.uniforms.uResolution.value.set(innerWidth,innerHeight);

    // Pulse: speed = BPM/60 * 0.30, activation = PE per-edge (NO_FAKE)
    const pulseSpeed = (bpm/60)*dt*0.30;
    const SEGS=6, ep=this._outerEdgePairs;
    for (let ei=0; ei<ep.length; ei++) {
      const prevT=this._outerPulseT[ei];
      this._outerPulseT[ei]=(prevT+pulseSpeed)%1.0;
      const pev=peVals.length ? Math.min(1,Math.abs(peVals[ei%peVals.length]||0)/maxPE) : energy*0.5;
      const pT=this._outerPulseT[ei];
      if(prevT>0.85&&pT<0.15&&this._outerNodeFlashData&&pev>0.08){
        const destIdx=ep[ei][1];
        this._outerNodeFlashData[destIdx]=Math.max(this._outerNodeFlashData[destIdx],pev*0.7);
      }
      for(let s=0;s<SEGS;s++){
        const b=(ei*SEGS+s)*4;
        this._outerEdgePulseTData[b]=this._outerEdgePulseTData[b+1]=this._outerEdgePulseTData[b+2]=this._outerEdgePulseTData[b+3]=pT;
        this._outerEdgeActData[b]=this._outerEdgeActData[b+1]=this._outerEdgeActData[b+2]=this._outerEdgeActData[b+3]=pev;
      }
    }
    this._outerEdgePulseTAttr.needsUpdate=true;
    this._outerEdgeActAttr.needsUpdate=true;

    if(this._outerNodeFlashData){
      for(let ni=0;ni<this._outerNodeFlashData.length;ni++) this._outerNodeFlashData[ni]*=0.91;
      this._outerNodeFlashAttr.needsUpdate=true;
    }

    // Per-node activation — PE-driven, different index offset from inner globe
    const N=this._outerNodePositions.length;
    for(let ni=0;ni<N;ni++){
      this._outerNodeActData[ni]=peVals.length
        ? Math.min(1,Math.abs(peVals[(ni*3+7)%peVals.length]||0)/maxPE*1.3)
        : energy*0.4;
    }
    this._outerNodeActAttr.needsUpdate=true;

    if(this._outerParticleMat){
      this._outerParticleMat.uniforms.uTime.value=this._outerTime;
      this._outerParticleMat.uniforms.uAudioLevel.value=energy;
    }

    // Slow independent rotation — visual parallax vs inner globe (NO_FAKE: display constant)
    // rotSpeed in rad/s: 0.010 was per-frame at 40fps → ×40 to convert to per-second
    const rotSpeed=(bpm/120)*0.40;
    this._outerGroup.rotation.y+=rotSpeed*0.55*dt+(state.drift_velocity||0)*0.16*dt;
    this._outerGroup.rotation.x+=rotSpeed*0.18*dt;
  }

  update(state, dt) {
    this._updateOuter(state, dt);  // update outer uniforms before render
    return super.update(state, dt);
  }

  dispose(sc) {
    super.dispose(sc);
    if(this._outerGroup){
      this._outerGroup.traverse(c=>{if(c.geometry)c.geometry.dispose();if(c.material)c.material.dispose();});
      sc.remove(this._outerGroup); this._outerGroup=null;
    }
    if(this._outerParticles){sc.remove(this._outerParticles);this._outerParticles.geometry.dispose();this._outerParticles.material.dispose();this._outerParticles=null;}
    this._outerNodeDots=this._outerEdges=null;
    this._outerNodeMat=this._outerEdgeMat=this._outerParticleMat=null;
    this._outerNodeFlashData=this._outerNodeFlashAttr=null;
  }
}


// ── Mode NETWORK — Graphe computé du self-model ───────────────────────────────
// 54 particules = 54 signaux GlobalState (5 catégories colorées).
// Vitesse    = signal_volatilities[key]          — signaux volatils bougent vite
// Taille     = prediction_error / volatility      — "surprise" (écart au modèle ÷ σ)
// Arête A    = drift_weights[territory][i*j]      — couplage sémantique du self-model
// Arête B    = proximité × (pe_i + pe_j)/2        — signaux anormaux proches
// Rotation constante (approuvée). Tout à plat quand le système est silencieux.

const _NET_CONN_VS = `
attribute vec3  connColor;
attribute float lineT;
attribute float connStr;
attribute float connFlow; // vitesse de flux per-arête — 0 = signal inactif
varying vec3  vColor;
varying float vStr;
varying float vT;
varying float vFlow;
void main(){
  vColor = connColor;
  vStr   = connStr;
  vT     = lineT;
  vFlow  = connFlow;
  gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
}`;

const _NET_CONN_FS = `
uniform float uTime;
varying vec3  vColor;
varying float vStr;
varying float vT;
varying float vFlow;
void main(){
  // Porteur conditionnel — impulsion absente si vFlow = 0
  float amp   = min(1.0, vFlow * 0.12);
  float pulse = pow(max(0.0, sin(vT * 6.28318 - uTime * vFlow)), 8.0) * amp;
  // Ligne lumineuse + flash blanc au pic
  vec3  col   = vColor * (0.90 + 0.10 * amp) + vec3(pulse * 3.0);
  float alpha = max(0.48, vStr) * (0.88 + pulse * 0.12)
    * smoothstep(0.0, 0.03, vT) * smoothstep(1.0, 0.97, vT);
  if(alpha < 0.004) discard;
  gl_FragColor = vec4(col, alpha);
}`;

const _NET_POINT_VS = `
attribute float surpriseVal;
attribute float activityVal;
attribute vec3  catColor;
uniform   float uUrgency;
uniform   float uTime;
varying   vec3  vColor;
varying   float vGlow;
void main(){
  vColor = catColor;
  // porteur conditionnel : pulsation taille uniquement si urgency > 0
  float pulse = 1.0 + sin(uTime * uUrgency * 10.0) * uUrgency * 0.3;
  vGlow = 0.55 + activityVal * 0.50 + surpriseVal * 0.45;
  float sz = (7.0 + activityVal * 10.0 + surpriseVal * 20.0) * pulse;
  vec4 mv = modelViewMatrix * vec4(position, 1.0);
  gl_PointSize = clamp(sz * (1200.0 / -mv.z), 4.0, 80.0);
  gl_Position  = projectionMatrix * mv;
}`;

const _NET_POINT_FS = `
varying vec3  vColor;
varying float vGlow;
void main(){
  vec2  c = 2.0 * gl_PointCoord - 1.0;
  float d = length(c);
  if(d > 1.0) discard;
  // Cœur brillant + halo large pour que le bloom se propage loin
  float core = pow(1.0 - smoothstep(0.0, 0.30, d), 7.0);
  float halo = pow(1.0 - smoothstep(0.15, 0.95, d), 2.0) * 0.4;
  gl_FragColor = vec4(vColor, (core + halo) * vGlow);
}`;

class NetworkMode {
  constructor(){
    this._cam=null; this._group=null; this._starField=null;
    this._pointMat=null; this._connMat=null; this._connStrAttr=null;
    this._pointCloud=null; this._linesMesh=null; this._boxHelper=null;
    this._clock=new THREE.Clock();

      {cat:'world',   key:'hn_ai_score',           max:1   },
      {cat:'world',   key:'google_trends_chatgpt', max:1   },
      {cat:'world',   key:'google_trends_openai',  max:1   },
      {cat:'world',   key:'newsapi_volume',        max:1   },
      {cat:'world',   key:'newsapi_sentiment',     max:1   },
      {cat:'world',   key:'gdelt_global_tone',     max:1   },
      {cat:'world',   key:'gdelt_conflict_intensity',max:1 },
      {cat:'world',   key:'hedonometer_happiness', max:1   },
      {cat:'world',   key:'fear_greed_index',      max:100 },
      {cat:'world',   key:'world_temperature',     max:1   },
      {cat:'world',   key:'msft_delta',            max:0.05},
      {cat:'world',   key:'nvda_delta',            max:0.05},
      {cat:'world',   key:'wikipedia_views_ai',    max:1   },
      {cat:'world',   key:'media_cloud_ai_volume', max:1   },
      {cat:'world',   key:'arxiv_papers_today',    max:2   },
      {cat:'world',   key:'github_ai_stars',       max:1   },
      // INFRA (orange) — 8 signaux
      // INFRA (orange) — 6 signaux
      {cat:'infra',   key:'openai_status',         max:1   },
      {cat:'infra',   key:'openai_latency_ms',     max:2000},
      {cat:'infra',   key:'openai_incident_age_h', max:48  },
      {cat:'infra',   key:'crisis_level',          max:1   },
